<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機密調査書</title>
<style>
html, body{
  margin:0;
  padding:0;
  background:#efefef;
  font-family:"Source Han Code JP","Courier New",monospace;
  color:#1a1a1a;
}

/* ===== 文書本体 ===== */
.document{
  max-width:820px;
  margin:6vh auto;
  padding:3.2em 2.4em;
  background:#ffffff;
  border:1px solid #cfcfcf;
  box-shadow:0 0 0 1px #e5e5e5 inset;
}

h1{
  font-size:0.95em;
  letter-spacing:0.18em;
  border-bottom:1px solid #cfcfcf;
  padding-bottom:0.4em;
  margin:0 0 1.6em 0;
  text-align:left;
}

/* ===== 本文 ===== */
p{
  font-size:0.82em;
  line-height:1.9;
  margin:1.15em 0;
  text-align:left;
}

/* ===== 項目ラベル強調 ===== */
.label{
  display:inline-block;
  min-width:6.5em;
  letter-spacing:0.12em;
}

/* ===== 黒塗り ===== */
del{
  background:#bdbdbd;
  color:transparent;
  text-shadow:0 0 5px #000;
  padding:0.08em 0.25em;
  border-radius:1px;
}

body.unlocked del{
  background:transparent;
  color:#111;
  text-shadow:none;
  box-shadow:inset 0 -0.45em 0 rgba(0,0,0,0.06);
}

/* ===== 写真 ===== */
.photo-wrap{
  display:flex;
  justify-content:flex-end;
  margin:0 0 1.6em;
}

.photo{
  width:230px;
  background:#fafafa;
  border:1px solid #d4d4d4;
  box-shadow:2px 2px 0 rgba(0,0,0,0.05);
  padding:12px 12px 6px;
  transform:rotate(1deg);
  position:relative;
}

.photo::before{
  content:"";
  position:absolute;
  top:-12px; left:20px;
  width:70px; height:18px;
  background:#ececec;
  border:1px solid #d0d0d0;
  transform:rotate(-7deg);
}

.photo img{
  width:100%;
  display:block;
  filter:contrast(1.05) grayscale(0.15);
}

.photo figcaption{
  font-size:0.65em;
  color:#666;
  margin-top:4px;
  line-height:1.4;
  letter-spacing:0.05em;
}

/* ===== 照合UI ===== */
.auth{
  margin-top:2.4em;
  padding:1em 1.2em;
  border:1px dashed #bdbdbd;
  background:#fafafa;
}

.auth p{
  margin:0 0 0.7em;
  font-size:0.78em;
  color:#555;
}

.row{
  display:flex;
  gap:0.6em;
  align-items:center;
  flex-wrap:wrap;
}

.auth input{
  font-family:inherit;
  padding:0.6em 0.7em;
  width:220px;
  border:1px solid #cfcfcf;
  background:#fff;
}

.auth button{
  font-family:inherit;
  padding:0.62em 1em;
  border:1px solid #cfcfcf;
  background:#fff;
  cursor:pointer;
}

.auth button:hover{ background:#f1f1f1; }

.hint{
  margin-top:0.8em;
  font-size:0.7em;
  color:#888;
}

.status{
  margin-top:0.8em;
  font-size:0.75em;
  color:#666;
}

.status.bad{ color:#8a3b3b; }
.status.good{ color:#3b6a3b; }

/* ===== 参照レコード ===== */
.record-link{
  display:none;
  margin-top:1.4em;
  padding-top:1em;
  border-top:1px dashed #cfcfcf;
  font-size:0.78em;
  line-height:1.9;
  color:#444;
}

body.unlocked .record-link{
  display:block;
}

.record-link a{
  color:#444;
  text-decoration:none;
  border-bottom:1px solid #999;
  padding-bottom:1px;
}

.record-link a:hover{
  color:#000;
  border-bottom-color:#000;
}

/* ===== 戻る ===== */
a.back{
  display:block;
  text-align:center;
  color:#666;
  text-decoration:none;
  margin-top:1.6em;
  font-size:0.8em;
}

a.back:hover{ text-decoration:underline; }

footer{
  text-align:center;
  font-size:0.68em;
  color:#888;
  margin:3em 0 1em;
  letter-spacing:0.08em;
}
</style>
</head>

<body>
<div class="document">
<h1>機密調査書</h1>

<div class="photo-wrap">
<figure class="photo">
<img src="assets/profile/20520515.jpg" alt="調査対象 写真">
<figcaption>撮影日時：2052-05-15-10:52:06</figcaption>
<figcaption>撮影場所：市街地（詳細不明）</figcaption>
<figcaption>取得元　：都市監視カメラ映像</figcaption>
</figure>
</div>

<p><span class="label">記録</span>：2054年 XX月 XX日</p>

<p>
<span class="label">氏名</span>：不明（本人証言：村落消失以降の記憶欠損）<br>
　　　　フィラーと自称。戸籍照会記録なし。<br>
<span class="label">追記</span>：<del>防衛省地方支部治安部局 通称S局所属</del>
</p>

<p><span class="label">年齢</span>：推定20歳前後</p>

<p>
<span class="label">処置内容</span>：記憶改変処置<br>
　　　　<del>笹井綾</del>名義の戸籍を暫定付与。
</p>

<div class="auth">
<p>閲覧権限照合（要認証）</p>
<div class="row">
<input id="key" type="password" placeholder="ACCESS KEY" autocomplete="off">
<button id="unlock" type="button">照合</button>
</div>
<div class="hint">※照合失敗履歴は自動保存されます</div>
<div class="status" id="status"></div>

<div class="record-link" id="recordLink">
  関連記録参照：<br>
  ▶ <a href="archive_filler.html">SUBJECT RECORD / F12-5101</a>
</div>
</div>

<a href="Character.html" class="back">◀ 戻る</a>
</div>

<footer>ARCHIVE RECORD : CLASSIFIED</footer>

<script>
const ACCESS_KEY = "SASAI";
const MAX_FAIL = 3;
let fail = 0;

const key = document.getElementById("key");
const btn = document.getElementById("unlock");
const status = document.getElementById("status");

function setStatus(msg, type){
  status.textContent = msg;
  status.className = "status " + (type || "");
}

function unlock(){
  document.body.classList.add("unlocked");
  setStatus("照合成功：閲覧権限確認済", "good");
  key.disabled = true;
  btn.disabled = true;
  btn.textContent = "照合済";
}

btn.addEventListener("click", ()=>{
  const v = (key.value || "").trim();
  if(v === ACCESS_KEY){
    unlock();
  }else{
    fail++;
    setStatus(`照合失敗：${fail}/${MAX_FAIL}`, "bad");
    if(fail >= MAX_FAIL){
      setStatus("警告：不正アクセス検知", "bad");
      key.disabled = true;
      btn.disabled = true;
      btn.textContent = "LOCK";
    }
  }
});

key.addEventListener("keydown", e=>{
  if(e.key === "Enter") btn.click();
});
</script>
</body>
</html>
