<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>__fmm_tn_ // inception</title>
    <style>
        :root {
            --bg-white: #f7f7f7;
            /* 桜の色：透き通るようでいて、どこか吸い込まれる濃い桃色 */
            --sakura-base: rgba(255, 182, 193, 0.6);
            --sakura-deep: rgba(231, 76, 116, 0.5);
            --shadow-sepia: rgba(60, 50, 50, 0.07);
            --text-color: rgba(90, 80, 80, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-white);
            font-family: "serif", "YuMincho", "Hiragino Mincho ProN", serif;
        }

        /* 1. 記憶のノイズ：古い夢のような質感 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.04;
            z-index: 10;
            pointer-events: none;
            animation: grain 0.5s steps(1) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            30% { transform: translate(1%, 1%); }
            60% { transform: translate(-1%, 1%); }
            90% { transform: translate(1%, -1%); }
        }

        /* 2. 「見上げる」視界：巨大な幹の影 */
        .trunk-overlay {
            position: fixed;
            bottom: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 140vw;
            height: 120vh;
            background: radial-gradient(circle at 50% 100%, var(--shadow-sepia) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 1;
            pointer-events: none;
        }

        /* 3. 風に舞う花びら：奥から手前へ押し寄せる */
        .petal {
            position: absolute;
            background: var(--sakura-base);
            border-radius: 150% 0 150% 0;
            pointer-events: none;
            z-index: 4;
            filter: blur(1px);
            box-shadow: 0 0 10px rgba(255, 192, 203, 0.3);
            animation: wind-flow linear infinite;
        }

        @keyframes wind-flow {
            0% {
                transform: translate(0, -10vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                /* 風で横に流されながら、手前に迫ってくる */
                transform: translate(40vw, 110vh) rotate(720deg) scale(2);
                opacity: 0;
                filter: blur(4px);
            }
        }

        /* 4. メインコンテンツ：迷い込んだ後に浮かび上がる */
        .content {
            position: relative;
            z-index: 20;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: wake-up 4s ease-in forwards;
            animation-delay: 1.5s;
        }

        @keyframes wake-up {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0px); }
        }

        .title {
            font-size: 1rem;
            letter-spacing: 0.8em;
            color: var(--text-color);
            margin-bottom: 60px;
            font-weight: 200;
        }

        .nav-link {
            display: block;
            font-size: 0.8rem;
            color: var(--text-color);
            text-decoration: none;
            margin: 20px 0;
            letter-spacing: 0.4em;
            transition: 1s;
        }

        .nav-link:active {
            color: #d35400;
            letter-spacing: 0.6em;
        }

        /* 5. 画面の明滅：呼吸のようなゆらぎ */
        .breathing-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 100;
            pointer-events: none;
            animation: breath 8s ease-in-out infinite;
        }

        @keyframes breath {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.05; }
        }
    </style>
</head>
<body>

    <div class="breathing-overlay"></div>
    <div class="trunk-overlay"></div>
    
    <div class="content">
        <h1 class="title">__fmm_tn_</h1>
        <nav>
            <a href="#" class="nav-link">STORY</a>
            <a href="#" class="nav-link">WHERE</a>
            <a href="#" class="nav-link">WORKS</a>
            <a href="#" class="nav-link">LOG</a>
        </nav>
    </div>

    <script>
        // 花びらを生成する関数
        function spawnPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            // サイズのばらつき
            const size = Math.random() * 7 + 5 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            
            // 開始位置（横方向のランダム）
            petal.style.left = Math.random() * 120 - 20 + 'vw';
            
            // 風の強さ（アニメーション秒数）のばらつき
            const duration = Math.random() * 5 + 4 + 's';
            petal.style.animationDuration = duration;
            
            // 色のわずかな変化
            if(Math.random() > 0.7) petal.style.background = 'var(--sakura-deep)';
            
            document.body.appendChild(petal);
            
            // アニメーション終了後に削除
            setTimeout(() => {
                petal.remove();
            }, duration * 1000);
        }

        // 一定間隔で花びらを降らせる
        setInterval(spawnPetal, 150);

        // 懐かしい「揺らぎ」：スマホの傾きに合わせて幹が微動する（簡易版）
        window.addEventListener('deviceorientation', (event) => {
            const x = event.beta;  // 傾き
            const trunk = document.querySelector('.trunk-overlay');
            if(trunk) {
                trunk.style.transform = `translateX(calc(-50% + ${x * 0.2}px))`;
            }
        });
    </script>
</body>
</html>
