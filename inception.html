<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>__fmm_tn_ // inception</title>
    <style>
        :root {
            /* 1. 背景：湿り気を帯びた、吸い込まれるような白 */
            --bg-dream: #fdfdfd;
            /* 2. 桜：躑躅色。土埃に見えないよう、彩度を高く、クリアに */
            --sakura-rich: #e74c74;
            --sakura-petal: rgba(255, 182, 193, 0.9);
            --text-main: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dream);
            font-family: "serif", "YuMincho", "Hiragino Mincho ProN", serif;
        }

        /* 視界の端の「影」：土埃ではなく、巨木の根元にいる暗がりの演出 */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 80%, transparent 20%, rgba(255, 255, 255, 0.8) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* 巨大な「幹」の気配：画面の下半分を重く沈める */
        .trunk-shadow {
            position: absolute;
            bottom: -20vh;
            left: 50%;
            transform: translateX(-50%);
            width: 120vw;
            height: 100vh;
            background: linear-gradient(to top, rgba(0,0,0,0.04) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 1;
        }

        /* 桜の花弁：形を鋭くし、影を「しっとり」させる */
        .petal {
            position: absolute;
            background: var(--sakura-rich);
            /* 花びらの形をよりリアルに：ハート型に近い非対称 */
            border-radius: 100% 0% 100% 20% / 100% 20% 100% 0%;
            pointer-events: none;
            z-index: 10;
            box-shadow: 2px 5px 15px rgba(231, 76, 116, 0.15);
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translate(0, -10vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% {
                /* 風に煽られ、手前に「ぶつかる」ように拡大 */
                transform: translate(25vw, 110vh) rotate(630deg) scale(2.5);
                opacity: 0;
                filter: blur(3px);
            }
        }

        /* 至近距離を横切る「大きな花弁」：これがあるだけで圧が変わる */
        .petal.foreground {
            z-index: 100;
            filter: blur(6px); /* ぼかしてカメラのすぐ前を飛んでいる演出 */
            opacity: 0.4;
        }

        /* メインコンテンツ */
        .content {
            position: relative;
            z-index: 50;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: fadeIn 4s ease-out forwards;
            animation-delay: 1s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .title {
            font-size: 1.1rem;
            letter-spacing: 0.8em;
            color: var(--text-main);
            margin-bottom: 50px;
            font-weight: 200;
            text-shadow: 0 0 20px white;
        }

        .nav-list {
            list-style: none;
            text-align: center;
        }

        .nav-item {
            display: block;
            font-size: 0.85rem;
            color: var(--text-main);
            text-decoration: none;
            margin: 25px 0;
            letter-spacing: 0.4em;
            transition: 1.5s cubic-bezier(0.2, 0, 0.2, 1);
            opacity: 0.5;
        }

        .nav-item:active {
            color: #d35400;
            opacity: 1;
            letter-spacing: 0.6em;
        }

    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="trunk-shadow"></div>
    
    <div class="content">
        <h1 class="title">__fmm_tn_</h1>
        <ul class="nav-list">
            <li><a href="#" class="nav-item">STORY</a></li>
            <li><a href="#" class="nav-item">WHERE</a></li>
            <li><a href="#" class="nav-list"><a href="#" class="nav-item">WORKS</a></a></li>
            <li><a href="#" class="nav-item">LOG</a></li>
        </ul>
    </div>

    <script>
        function createPetal() {
            const petal = document.createElement('div');
            
            // 20%の確率で「手前の大きな花びら」にする
            const isForeground = Math.random() > 0.8;
            petal.className = isForeground ? 'petal foreground' : 'petal';
            
            const sizeBase = isForeground ? 25 : 10;
            const size = Math.random() * 10 + sizeBase + 'px';
            petal.style.width = size;
            petal.style.height = size;
            
            petal.style.left = Math.random() * 110 - 10 + 'vw';
            
            // 落下速度：手前ほど速く、奥ほどゆっくり
            const duration = isForeground ? (Math.random() * 3 + 3) : (Math.random() * 5 + 6);
            petal.style.animationDuration = duration + 's';
            
            // 色のバリエーション
            if(Math.random() > 0.5) petal.style.background = 'var(--sakura-petal)';
            
            document.body.appendChild(petal);
            
            setTimeout(() => {
                petal.remove();
            }, duration * 1000);
        }

        // 150msごとに生成。手前の花びらが混じることで「土埃」感を消す。
        setInterval(createPetal, 150);
    </script>
</body>
</html>
