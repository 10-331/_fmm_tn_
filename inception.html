<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>__fmm_tn_ // inception</title>
    <style>
        :root {
            --bg-white: #fcfcfc;
            /* 桜の色：少し湿度と重みのある濃い桃色 */
            --sakura-deep: rgba(231, 76, 116, 0.6);
            --trunk-shadow: rgba(40, 30, 30, 0.08);
            --deep-orange: #d35400;
            --text-main: rgba(80, 70, 70, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-white);
            font-family: "serif", "YuMincho", "Hiragino Mincho ProN", serif;
        }

        /* 視界の「歪み」と「ノイズ」：夢の不確実さ */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: 10;
            pointer-events: none;
        }

        /* 見上げる視点のビネット：周辺を白く飛ばして中央の「圧」を強調 */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 70%, transparent 20%, rgba(255, 255, 255, 0.9) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* 巨大な「幹」：画面下部からせり出す重厚な影 */
        .giant-trunk {
            position: absolute;
            bottom: -10vh;
            left: 50%;
            transform: translateX(-50%);
            width: 40vw;
            height: 110vh;
            background: linear-gradient(to top, var(--trunk-shadow) 0%, transparent 80%);
            border-radius: 50% 50% 0 0;
            filter: blur(40px);
            z-index: 1;
        }

        /* 花びら：色が濃くなり、舞い方に「重力」を持たせる */
        .petal {
            position: absolute;
            background-color: var(--sakura-deep);
            border-radius: 150% 0 150% 0;
            pointer-events: none;
            z-index: 4;
            filter: blur(0.3px);
            box-shadow: 0 0 5px rgba(231, 76, 116, 0.2);
            animation: fall-down linear infinite;
        }

        @keyframes fall-down {
            0% {
                transform: translate(0, -10vh) rotate(0deg) scale(0.8);
                opacity: 0;
            }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% {
                /* 見上げる視線なので、手前（下）に来るほど大きく、少しボケる */
                transform: translate(15vw, 110vh) rotate(540deg) scale(1.5);
                opacity: 0;
                filter: blur(2px);
            }
        }

        /* ナビゲーション：あえて「幹」の影が薄くなる中段に配置 */
        .nav-container {
            position: relative;
            z-index: 20;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 10vh;
        }

        .site-title {
            font-size: 1.1rem;
            letter-spacing: 0.8em;
            color: var(--text-main);
            margin-bottom: 5vh;
            font-weight: 200;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        .menu-list {
            list-style: none;
            text-align: center;
        }

        .menu-item {
            display: block;
            font-size: 0.85rem;
            color: var(--text-main);
            text-decoration: none;
            margin: 25px 0;
            letter-spacing: 0.4em;
            transition: 0.8s cubic-bezier(0.2, 0, 0.2, 1);
            opacity: 0.6;
        }

        /* タップ時の違和感（圧） */
        .menu-item:active {
            color: var(--deep-orange);
            transform: scale(0.95);
            filter: blur(2px);
            opacity: 1;
        }

        /* 隠された「本名」の残滓：背景に溶け込ませる */
        .latent-word {
            position: fixed;
            bottom: 5vh;
            right: 5vw;
            font-size: 0.7rem;
            color: rgba(0, 0, 0, 0.03);
            letter-spacing: 0.5em;
            z-index: 2;
            writing-mode: vertical-rl;
        }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="giant-trunk"></div>
    <div class="latent-word">誰モ知ラナイ夢</div>
    
    <div class="nav-container">
        <h1 class="site-title">__fmm_tn_</h1>
        <ul class="menu-list">
            <li><a href="#" class="menu-item">STORY</a></li>
            <li><a href="#" class="menu-item">WHERE</a></li>
            <li><a href="#" class="menu-item">WORKS</a></li>
            <li><a href="#" class="menu-item">LOG</a></li>
        </ul>
    </div>

    <script>
        // 花びらの生成：見上げる視点を意識したランダム性
        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            const size = Math.random() * 8 + 6 + 'px';
            petal.style.width = size;
            petal.style.height = size;
            
            // 幹の周辺（中央寄り）から多く降るように調整
            const startX = (Math.random() * 120) - 10; 
            petal.style.left = startX + 'vw';
            
            // 落下速度に「個体差（重み）」を出す
            const duration = Math.random() * 4 + 6 + 's';
            petal.style.animationDuration = duration;
            
            // 花びらごとに微妙に色を変えて「湿度」を出す
            const opacity = Math.random() * 0.5 + 0.3;
            petal.style.opacity = opacity;
            
            document.body.appendChild(petal);
            
            setTimeout(() => {
                petal.remove();
            }, 10000);
        }

        // 密度の調整：180msごとに生成
        setInterval(createPetal, 180);

        // スクロールによる微細な「視差」：スマホを動かしている感覚
        document.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            document.querySelector('.giant-trunk').style.transform = `translateX(-50%) translateY(${scrolled * 0.1}px)`;
        });
    </script>
</body>
</html>
