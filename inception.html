<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__fmm_tn_ // inception</title>
<style>
  :root {
    --bg-gradient: linear-gradient(180deg, #f8e9e9 0%, #f1ecf6 40%, #e8f0f8 100%);
    --text-solid: #222; /* 以前より濃く、はっきりと */
    --accent-shadow: rgba(0, 0, 0, 0.08);
  }

  html, body {
    margin: 0;
    padding: 0;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background: var(--bg-gradient);
    color: var(--text-solid);
    overflow-x: hidden;
  }

  /* セクション1：導入（ここを「重く」する） */
  section.intro {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.2); /* わずかな膜を張る */
  }

  /* 波紋：もっと「重い」質感へ */
  .ripple-container {
    position: absolute;
    top: 0; right: 0; width: 100%; height: 100%;
    z-index: 1;
  }
  .ripple-layer {
    position: absolute;
    top: 0; right: 0;
    width: 160vmax; height: 160vmax;
    border-radius: 50%;
    transform: translate(50%, -50%) scale(0);
    /* 線の太さと影を強くして、存在感を出す */
    border: 3px solid rgba(0, 0, 0, 0.05); 
    box-shadow: inset 0 0 30px rgba(0,0,0,0.02);
    opacity: 0;
    animation: rippleSpread 10s cubic-bezier(0.15, 0, 0.2, 1) infinite;
  }
  .layer1 { animation-delay: 0s; }
  .layer2 { animation-delay: 3s; }

  @keyframes rippleSpread {
    0% { transform: translate(50%, -50%) scale(0); opacity: 0; }
    5% { opacity: 1; }
    100% { transform: translate(50%, -50%) scale(1.2); opacity: 0; }
  }

  /* 文章の塊：3行で1つとして魅せる */
  .novel-block {
    display: flex;
    flex-direction: row-reverse;
    justify-content: center;
    align-items: center;
    gap: 4em;
    position: relative;
    z-index: 2;
    padding: 0 10%;
  }

  .line {
    writing-mode: vertical-rl;
    text-orientation: upright;
    font-size: 1.05rem; /* 少し大きく */
    line-height: 1.6;
    letter-spacing: 0.3em;
    opacity: 0;
    transform: translateY(10px);
    filter: blur(5px);
    animation: revealLine 2.5s cubic-bezier(0.2, 0, 0.2, 1) forwards;
  }

  /* 3行が流れるように揃う */
  .line:nth-child(1) { animation-delay: 0.5s; }
  .line:nth-child(2) { animation-delay: 1.5s; }
  .line:nth-child(3) { animation-delay: 2.5s; }

  @keyframes revealLine {
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  /* 下のコンテンツへ誘う矢印（迷子防止） */
  .scroll-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    opacity: 0.4;
    animation: bounce 2s infinite;
  }
  @keyframes bounce { 0%, 100% { bottom: 30px; } 50% { bottom: 40px; } }

  /* セクション2：コンテンツ */
  section.works {
    min-height: 100vh;
    padding: 10vh 0;
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5em;
  }

  .work-item {
    width: 85%;
    max-width: 400px;
    padding: 1.5em;
    text-decoration: none;
    color: var(--text-solid);
    border: 1px solid #eee;
    background: #fafafa;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    transition: 0.4s;
  }
  .work-item:hover { border-color: #aaa; background: #fff; transform: translateX(5px); }

  /* 右上メニューは元の良い部分を継承 */
  .menu-btn {
    position: fixed; top: 20px; right: 20px; z-index: 1000;
    cursor: pointer; padding: 10px;
  }
  .menu-btn span { display: block; width: 25px; height: 1px; background: #333; margin: 6px 0; }
</style>
</head>
<body>

<div class="menu-btn" id="menuBtn"><span></span><span></span><span></span></div>

<section class="intro">
  <div class="ripple-container">
    <div class="ripple-layer layer1"></div>
    <div class="ripple-layer layer2"></div>
  </div>

  <div class="novel-block">
    <div class="line">これは、迷子になった私を助けてくれた彼と</div>
    <div class="line">たくさん笑って、ふざけあって、恋人になった私たちが</div>
    <div class="line">また、他人に戻るまでのお話。</div>
  </div>

  <div class="scroll-hint">SCROLL</div>
</section>

<section class="works" id="works">
  <a href="#" class="work-item">Character Profile</a>
  <a href="#" class="work-item">Worldbuilding</a>
  <a href="#" class="work-item">Story</a>
  <a href="#" class="work-item">Media</a>
</section>

</body>
</html>
