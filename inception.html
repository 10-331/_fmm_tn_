<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__fmm_tn_ // inception</title>
<style>
  :root {
    --bg-main: #fdfdfd;
    --sakura: #e74c74;
    --text-color: #333;
  }

  html, body {
    margin: 0;
    padding: 0;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background-color: var(--bg-main);
    color: var(--text-color);
    overflow-x: hidden;
    scroll-behavior: smooth;
  }

  /* 画面全体の淡い色の変化（固定背景） */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #f8e9e9 0%, #f1ecf6 50%, #e8f0f8 100%);
    opacity: 0.6;
    z-index: -2;
  }

  /* セクション1：迷い込む場所 */
  section.intro {
    height: 300vh; /* スクロール量を持たせて「潜る」感覚を出す */
    position: relative;
  }

  .sticky-container {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* 波紋を「歪み」の層に変える */
  .distortion-layer {
    position: absolute;
    width: 150vmax;
    height: 150vmax;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.8);
    background: radial-gradient(circle, transparent 40%, rgba(255, 255, 255, 0.2) 100%);
    box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.5);
    transform: translate(30%, -30%) scale(0);
    animation: ripplePulse 10s cubic-bezier(0.15, 0, 0.2, 1) infinite;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes ripplePulse {
    0% { transform: translate(30%, -30%) scale(0); opacity: 0; }
    20% { opacity: 0.8; }
    100% { transform: translate(30%, -30%) scale(1.5); opacity: 0; }
  }

  /* 小説テキスト：一行ずつの「圧」 */
  .novel-line {
    writing-mode: vertical-rl;
    position: absolute;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    line-height: 1.5;
    opacity: 0;
    filter: blur(10px);
    transition: all 1.5s ease;
  }

  /* JSでスクロール位置に合わせて表示 */
  .novel-line.active {
    opacity: 1;
    filter: blur(0);
    transform: translateY(-20px);
  }

  /* セクション2：コンテンツ */
  section.works {
    min-height: 100vh;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 10vh 0;
    z-index: 10;
    position: relative;
  }

  .work-item {
    width: 280px;
    margin: 1.5em 0;
    padding: 1.2em;
    text-align: center;
    text-decoration: none;
    color: var(--text-color);
    font-size: 0.85em;
    letter-spacing: 0.2em;
    border: 1px solid rgba(0,0,0,0.1);
    transition: 0.6s;
    background: white;
  }

  .work-item:hover {
    border-color: var(--sakura);
    color: var(--sakura);
    background: transparent;
  }

  /* 固定のハッシュタグ（呪いのような気配） */
  .fixed-tag {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-size: 0.6rem;
    color: rgba(0,0,0,0.2);
    letter-spacing: 0.1em;
    z-index: 100;
    pointer-events: none;
    writing-mode: vertical-rl;
  }

  /* メニューボタン（最小限） */
  .menu-toggle {
    position: fixed;
    top: 25px;
    right: 25px;
    width: 20px;
    height: 20px;
    cursor: pointer;
    z-index: 1001;
  }
  .menu-toggle span {
    display: block;
    width: 100%;
    height: 1px;
    background: #333;
    margin-bottom: 6px;
    transition: 0.4s;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    gap: 2em;
  }
  .overlay a { text-decoration: none; color: #333; font-size: 0.9em; letter-spacing: 0.4em; }

</style>
</head>
<body>

<div class="fixed-tag">#溶けて、そのまま雲隠れ</div>

<div class="menu-toggle" id="menuToggle">
  <span></span><span></span>
</div>

<div class="overlay" id="menuOverlay">
  <a href="#">home</a>
  <a href="#">Character</a>
  <a href="#">Story</a>
  <a href="#">Media</a>
</div>

<section class="intro">
  <div class="sticky-container">
    <div class="distortion-layer"></div>
    <div class="novel-line" id="line1" style="right: 55%;">これは、迷子になった私を助けてくれた彼と</div>
    <div class="novel-line" id="line2" style="right: 50%;">たくさん笑って、ふざけあって、恋人になった私たちが</div>
    <div class="novel-line" id="line3" style="right: 45%;">また、他人に戻るまでのお話。</div>
  </div>
</section>

<section class="works">
  <a href="#" class="work-item">Character Profile</a>
  <a href="#" class="work-item">Worldbuilding</a>
  <a href="#" class="work-item">Story</a>
  <a href="#" class="work-item">Media</a>
</section>

<script>
  // スクロールに応じたテキストの浮上
  window.addEventListener('scroll', () => {
    const scroll = window.scrollY;
    const height = window.innerHeight;
    
    const l1 = document.getElementById('line1');
    const l2 = document.getElementById('line2');
    const l3 = document.getElementById('line3');

    if(scroll > height * 0.2) l1.classList.add('active'); else l1.classList.remove('active');
    if(scroll > height * 0.8) l2.classList.add('active'); else l2.classList.remove('active');
    if(scroll > height * 1.4) l3.classList.add('active'); else l3.classList.remove('active');
    
    // スクロールに合わせて波紋の速度を変える
    document.querySelector('.distortion-layer').style.opacity = 1 - (scroll / (height * 2));
  });

  // メニュー
  const btn = document.getElementById('menuToggle');
  const overlay = document.getElementById('menuOverlay');
  btn.onclick = () => {
    overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
  };
</script>

</body>
</html>
