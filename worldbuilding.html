<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Worldbuilding</title>

<style>
:root{
  --bg1:#0b0c10;
  --bg2:#151821;
  --text:#ece8df;
  --muted:rgba(236,232,223,.68);
  --line:rgba(255,255,255,.12);
  --panel:rgba(10,12,18,.58);
  --panel-strong:rgba(10,12,18,.80);

  --village-sky-1:#dde2dc;
  --village-sky-2:#c6cdc6;
  --village-sky-3:#98a297;

  --hama-sky-1:#8fc7dc;
  --hama-sky-2:#96cee0;
  --hama-sky-3:#a9dae7;
  --hama-sky-4:#d7eef4;

  --s-sky-1:#808995;
  --s-sky-2:#5d6674;
  --s-sky-3:#202631;
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.04), transparent 22%),
    linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
  color:var(--text);
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(to bottom, rgba(255,255,255,.02), transparent 14%, transparent 86%, rgba(255,255,255,.012));
  opacity:.75;
}

.page{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  isolation:isolate;
}

.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:30;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:18px 20px 0;
}

.backLink{
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  letter-spacing:.12em;
  transition:opacity .25s ease, transform .25s ease;
}

.backLink:hover{
  opacity:1;
  transform:translateX(-2px);
}

.titleWrap{
  text-align:right;
}

.pageTitle{
  margin:0;
  font-size:15px;
  letter-spacing:.14em;
  font-weight:500;
}

.pageLead{
  margin:6px 0 0;
  font-size:11px;
  line-height:1.8;
  letter-spacing:.08em;
  color:var(--muted);
}

.scene{
  position:absolute;
  inset:0;
  z-index:1;
}

/* 背景 */
.sky{
  position:absolute;
  inset:0;
  transition:background .45s ease, filter .45s ease;
}

.page[data-view="village"] .sky{
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.18), transparent 18%),
    linear-gradient(180deg, var(--village-sky-1) 0%, var(--village-sky-2) 44%, var(--village-sky-3) 100%);
  filter:saturate(.72) brightness(.95);
}

.page[data-view="hama"] .sky{
  background:
    radial-gradient(circle at 50% 15%, rgba(255,255,255,.08), transparent 18%),
    linear-gradient(180deg, var(--hama-sky-1) 0%, var(--hama-sky-2) 28%, var(--hama-sky-3) 64%, var(--hama-sky-4) 100%);
}

.page[data-view="s"] .sky{
  background:
    radial-gradient(circle at 50% 16%, rgba(255,255,255,.08), transparent 18%),
    linear-gradient(180deg, var(--s-sky-1) 0%, var(--s-sky-2) 36%, var(--s-sky-3) 100%);
}

.atmosphere{
  position:absolute;
  inset:0;
  pointer-events:none;
  transition:opacity .35s ease;
}

.page[data-view="hama"] .atmosphere{
  background:
    radial-gradient(circle at 50% 72%, rgba(255,255,255,.12), transparent 30%),
    radial-gradient(circle at 24% 66%, rgba(255,255,255,.10), transparent 16%),
    radial-gradient(circle at 74% 70%, rgba(255,255,255,.08), transparent 18%);
  opacity:.9;
}

.page[data-view="village"] .atmosphere{
  background:
    radial-gradient(circle at 50% 64%, rgba(255,255,255,.10), transparent 30%),
    radial-gradient(circle at 22% 68%, rgba(255,255,255,.08), transparent 18%);
  opacity:.85;
}

.page[data-view="s"] .atmosphere{
  background:
    radial-gradient(circle at 50% 68%, rgba(255,255,255,.05), transparent 28%);
  opacity:.7;
}

/* 地面 */
.ground{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:27vh;
  transition:background .45s ease;
}

.page[data-view="village"] .ground{
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), transparent 20%),
    linear-gradient(180deg, #6f766f 0%, #4d534d 100%);
}

.page[data-view="hama"] .ground{
  background:
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0) 20%),
    linear-gradient(180deg, #3e5871 0%, #24374a 52%, #172332 100%);
}

.page[data-view="s"] .ground{
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), transparent 16%),
    linear-gradient(180deg, #48515d 0%, #2a313b 100%);
}

/* 風景の見せ場を中央に寄せる */
.landmarkStage{
  position:absolute;
  left:50%;
  bottom:14vh;
  width:min(920px, 90vw);
  height:min(340px, 34vh);
  transform:translateX(-50%);
  z-index:6;
  pointer-events:none;
}

.landmark{
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .4s ease, transform .4s ease;
  transform:translateY(6px) scale(.985);
}

.page[data-view="village"] .landmark.village,
.page[data-view="hama"] .landmark.hama,
.page[data-view="s"] .landmark.s{
  opacity:1;
  transform:translateY(0) scale(1);
}

.landmark svg{
  width:100%;
  height:100%;
  display:block;
}

/* 看板 */
.signpost{
  position:absolute;
  left:50%;
  bottom:12.5vh;
  transform:translateX(-50%);
  width:132px;
  height:150px;
  z-index:9;
  pointer-events:none;
}

.signpost::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:0;
  width:6px;
  height:86px;
  background:rgba(255,255,255,.20);
  transform:translateX(-50%);
}

.signpost::after{
  content:"";
  position:absolute;
  left:50%;
  top:8px;
  width:112px;
  height:50px;
  transform:translateX(-50%) rotate(-2deg);
  border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

/* 補助メモ */
.traceNote{
  position:absolute;
  left:50%;
  bottom:23.5vh;
  transform:translateX(-50%);
  z-index:10;
  color:rgba(255,255,255,.24);
  font-size:11px;
  letter-spacing:.18em;
  opacity:0;
  transition:opacity .3s ease;
  pointer-events:none;
}

.page[data-view="village"] .traceNote{
  opacity:1;
}

/* 左右矢印 */
.dirArrows{
  position:absolute;
  inset:0;
  z-index:12;
  pointer-events:none;
}

.pcArrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:46px;
  height:46px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(10,12,18,.28);
  color:rgba(255,255,255,.38);
  font:inherit;
  font-size:18px;
  cursor:pointer;
  pointer-events:auto;
  backdrop-filter:blur(6px);
}

.pcArrow.left{ left:16px; }
.pcArrow.right{ right:16px; }

/* 情報パネル */
.infoPanel{
  position:absolute;
  top:72px;
  right:16px;
  z-index:20;
  width:min(360px, 27vw);
  min-height:180px;
  padding:18px 18px 16px;
  border:1px solid var(--line);
  background:var(--panel-strong);
  backdrop-filter:blur(12px);
  box-shadow:0 18px 44px rgba(0,0,0,.24), 0 0 0 1px rgba(255,255,255,.02) inset;
}

.infoKicker{
  font-size:10px;
  letter-spacing:.18em;
  color:rgba(236,232,223,.42);
  margin-bottom:8px;
}

.infoTitle{
  font-size:18px;
  line-height:1.6;
  letter-spacing:.08em;
  margin-bottom:8px;
}

.infoText{
  font-size:12px;
  line-height:1.95;
  letter-spacing:.04em;
  color:var(--muted);
  margin-bottom:14px;
}

.infoMeta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag{
  display:inline-block;
  padding:6px 8px;
  font-size:10px;
  letter-spacing:.12em;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
}

/* 項目ボタン */
.poiList{
  position:absolute;
  left:16px;
  bottom:14vh;
  z-index:18;
  display:flex;
  flex-direction:column;
  gap:8px;
  width:min(280px, 24vw);
}

.poiBtn{
  text-align:left;
  padding:12px 14px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(10,12,18,.32);
  backdrop-filter:blur(10px);
  color:var(--text);
  font:inherit;
  font-size:12px;
  letter-spacing:.08em;
  cursor:pointer;
  transition:background .25s ease, border-color .25s ease, transform .25s ease;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}

.poiBtn:hover,
.poiBtn.active{
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.20);
  transform:translateX(2px);
}

.poiSub{
  display:block;
  margin-top:6px;
  font-size:10px;
  letter-spacing:.12em;
  color:var(--muted);
}

/* 方向切替 */
.directionUI{
  position:absolute;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  z-index:22;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:blur(10px);
  box-shadow:0 12px 28px rgba(0,0,0,.18);
}

.dirBtn{
  min-width:86px;
  padding:10px 12px;
  border:1px solid rgba(255,255,255,.08);
  background:transparent;
  color:var(--muted);
  font:inherit;
  font-size:12px;
  letter-spacing:.12em;
  cursor:pointer;
  transition:background .25s ease, color .25s ease, border-color .25s ease;
}

.dirBtn.active{
  color:var(--text);
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.16);
}

/* モバイル */
@media (max-width: 980px){
  .pageLead{
    display:none;
  }

  .infoPanel{
    width:auto;
    left:14px;
    right:14px;
    top:auto;
    bottom:96px;
    min-height:150px;
    padding:15px 14px 14px;
  }

  .poiList{
    left:14px;
    right:14px;
    width:auto;
    bottom:192px;
  }

  .landmarkStage{
    width:min(92vw, 760px);
    height:min(240px, 25vh);
    bottom:21vh;
  }

  .pcArrow{
    display:none;
  }
}

@media (max-width: 768px){
  .topbar{
    padding:14px 14px 0;
  }

  .backLink{
    font-size:11px;
  }

  .pageTitle{
    font-size:14px;
  }

  .signpost{
    width:110px;
    height:128px;
    bottom:18vh;
  }

  .signpost::after{
    width:94px;
    height:42px;
  }

  .landmarkStage{
    width:94vw;
    height:200px;
    bottom:22vh;
  }

  .ground{
    height:23vh;
  }

  .traceNote{
    bottom:31vh;
    font-size:10px;
  }

  .poiList{
    bottom:198px;
    gap:8px;
  }

  .poiBtn{
    padding:11px 12px;
    font-size:11px;
  }

  .infoTitle{
    font-size:16px;
  }

  .infoText{
    font-size:11.5px;
    line-height:1.85;
  }

  .directionUI{
    left:14px;
    right:14px;
    transform:none;
    justify-content:space-between;
    gap:8px;
    padding:10px;
  }

  .dirBtn{
    min-width:0;
    flex:1 1 auto;
    font-size:11px;
    padding:10px 8px;
  }
}
</style>
</head>
<body>

<div class="page" id="page" data-view="hama">
  <div class="topbar">
    <a class="backLink" href="./where.html">← 入口へ戻る</a>

    <div class="titleWrap">
      <h1 class="pageTitle">Worldbuilding</h1>
      <div class="pageLead">看板の前で立ち止まり、向きを変える。</div>
    </div>
  </div>

  <main class="scene">
    <div class="sky"></div>
    <div class="atmosphere"></div>
    <div class="ground"></div>

    <div class="landmarkStage" aria-hidden="true">
      <!-- VILLAGE -->
      <div class="landmark village">
        <svg viewBox="0 0 1000 360" preserveAspectRatio="xMidYMid meet">
          <defs>
            <filter id="vBlur" x="-10%" y="-10%" width="120%" height="120%">
              <feGaussianBlur stdDeviation="1.8"/>
            </filter>
          </defs>

          <ellipse cx="500" cy="320" rx="240" ry="18" fill="rgba(0,0,0,.12)"/>
          <rect x="486" y="170" width="28" height="135" rx="8" fill="#544438"/>
          <g filter="url(#vBlur)">
            <circle cx="500" cy="118" r="98" fill="#dfe4dd"/>
            <circle cx="430" cy="142" r="62" fill="#d2d8d1"/>
            <circle cx="570" cy="140" r="60" fill="#d2d8d1"/>
            <circle cx="500" cy="72" r="52" fill="#edf1ea"/>
          </g>
          <g opacity=".55">
            <circle cx="466" cy="100" r="3" fill="#ffffff"/>
            <circle cx="520" cy="128" r="3" fill="#ffffff"/>
            <circle cx="542" cy="88" r="2.5" fill="#ffffff"/>
            <circle cx="432" cy="142" r="2.5" fill="#ffffff"/>
            <circle cx="575" cy="143" r="2.5" fill="#ffffff"/>
          </g>

          <rect x="612" y="228" width="78" height="46" fill="rgba(255,255,255,.10)" stroke="rgba(255,255,255,.18)"/>
          <rect x="624" y="206" width="54" height="24" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)"/>
          <line x1="651" y1="203" x2="651" y2="170" stroke="rgba(255,255,255,.16)" stroke-width="3"/>
          <line x1="632" y1="182" x2="670" y2="182" stroke="rgba(255,255,255,.16)" stroke-width="3"/>
        </svg>
      </div>

      <!-- HAMA -->
      <div class="landmark hama">
        <svg viewBox="0 0 1000 360" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="bld1" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,.18)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,.05)"/>
            </linearGradient>
          </defs>

          <ellipse cx="500" cy="326" rx="310" ry="16" fill="rgba(0,0,0,.10)"/>

          <!-- skyline -->
          <rect x="172" y="168" width="62" height="120" fill="url(#bld1)" stroke="rgba(255,255,255,.16)"/>
          <rect x="248" y="188" width="82" height="106" fill="rgba(255,255,255,.08)"/>
          <rect x="354" y="176" width="76" height="114" fill="rgba(255,255,255,.07)"/>
          <rect x="450" y="160" width="120" height="132" fill="rgba(255,255,255,.06)"/>
          <rect x="488" y="130" width="76" height="34" fill="rgba(255,255,255,.10)" stroke="rgba(255,255,255,.16)"/>
          <rect x="586" y="194" width="52" height="84" fill="rgba(255,255,255,.06)"/>
          <rect x="680" y="170" width="60" height="118" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)"/>

          <!-- bridge-ish line -->
          <line x1="120" y1="262" x2="880" y2="262" stroke="rgba(255,255,255,.10)" stroke-width="3"/>
          <line x1="220" y1="262" x2="260" y2="216" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
          <line x1="420" y1="262" x2="462" y2="214" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
          <line x1="610" y1="262" x2="650" y2="222" stroke="rgba(255,255,255,.08)" stroke-width="2"/>

          <!-- ferris wheel -->
          <g transform="translate(708 138)" opacity=".45">
            <circle cx="0" cy="0" r="46" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="2"/>
            <line x1="-46" y1="0" x2="46" y2="0" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
            <line x1="0" y1="-46" x2="0" y2="46" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
            <line x1="-32" y1="-32" x2="32" y2="32" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
            <line x1="32" y1="-32" x2="-32" y2="32" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
            <line x1="0" y1="46" x2="0" y2="92" stroke="rgba(255,255,255,.12)" stroke-width="3"/>
          </g>
        </svg>
      </div>

      <!-- S -->
      <div class="landmark s">
        <svg viewBox="0 0 1000 360" preserveAspectRatio="xMidYMid meet">
          <ellipse cx="500" cy="325" rx="260" ry="18" fill="rgba(0,0,0,.12)"/>

          <rect x="310" y="102" width="380" height="182" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.14)"/>
          <rect x="452" y="78" width="96" height="30" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)"/>

          <ellipse cx="500" cy="212" rx="74" ry="36" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.16)"/>
          <rect x="480" y="176" width="40" height="90" rx="12" fill="rgba(255,255,255,.08)"/>
          <rect x="440" y="230" width="120" height="18" rx="8" fill="rgba(255,255,255,.10)"/>

          <rect x="372" y="148" width="54" height="18" fill="rgba(255,255,255,.08)"/>
          <rect x="578" y="148" width="54" height="18" fill="rgba(255,255,255,.08)"/>
          <line x1="399" y1="166" x2="399" y2="236" stroke="rgba(255,255,255,.10)" stroke-width="3"/>
          <line x1="605" y1="166" x2="605" y2="236" stroke="rgba(255,255,255,.10)" stroke-width="3"/>
        </svg>
      </div>
    </div>

    <div class="traceNote">……誰かがいたはずだ</div>

    <div class="signpost"></div>

    <div class="dirArrows" aria-hidden="true">
      <button class="pcArrow left" id="leftArrow" type="button">←</button>
      <button class="pcArrow right" id="rightArrow" type="button">→</button>
    </div>

    <section class="infoPanel" aria-live="polite">
      <div class="infoKicker" id="infoKicker">VIEW / HAMA</div>
      <div class="infoTitle" id="infoTitle">HAMA / 現在</div>
      <div class="infoText" id="infoText">都市の光と、日常の輪郭。いま立っている場所に最も近い視点。</div>
      <div class="infoMeta" id="infoMeta"></div>
    </section>

    <div class="poiList" id="poiList"></div>

    <nav class="directionUI" aria-label="向きを選ぶ">
      <button class="dirBtn" data-view="village" type="button">左を見る</button>
      <button class="dirBtn active" data-view="hama" type="button">正面を見る</button>
      <button class="dirBtn" data-view="s" type="button">右を見る</button>
    </nav>
  </main>
</div>

<script>
const page = document.getElementById('page');
const infoKicker = document.getElementById('infoKicker');
const infoTitle = document.getElementById('infoTitle');
const infoText = document.getElementById('infoText');
const infoMeta = document.getElementById('infoMeta');
const poiList = document.getElementById('poiList');

const dirButtons = [...document.querySelectorAll('.dirBtn')];
const leftArrow = document.getElementById('leftArrow');
const rightArrow = document.getElementById('rightArrow');

const viewOrder = ['village', 'hama', 's'];

const views = {
  village: {
    kicker: 'VIEW / VILLAGE',
    title: '因習村 / 過去',
    text: '白く抜けたような景色。場所の輪郭はあるのに、そこにいた人だけがうまく定まらない。',
    tags: ['記憶', '神様', '欠落'],
    items: [
      {
        label: 'かみさまのおうち',
        sub: '大きな木のそば',
        title: 'かみさまのおうち',
        text: '幼い綾が小さな宝物を供えていた場所。祠の中身が空だったという感覚だけが妙に残る。',
        tags: ['祠', '供物', '鈴の音']
      },
      {
        label: '蔵',
        sub: '罰と沈黙',
        title: '蔵',
        text: '目隠しと宙吊り、濃い匂い。記憶の輪郭は曖昧なのに、不快だけが異様にはっきりしている。',
        tags: ['拘束', '香', '空白']
      },
      {
        label: '影',
        sub: '人物は見えない',
        title: '綾の痕跡',
        text: 'ここには本来、人の姿があったはずだ。けれど村の中では、彼女は立ち絵として現れない。残るのは気配と断片だけ。',
        tags: ['不在', '幼少', '断片']
      }
    ]
  },

  hama: {
    kicker: 'VIEW / HAMA',
    title: 'HAMA / 現在',
    text: '都市の光と、生活の手触り。失ったものを抱えたまま、いま現在の輪郭だけはたしかにある。',
    tags: ['現在', '都市', '日常'],
    items: [
      {
        label: '綾',

let currentView = 'hama';
let currentItemIndex = 0;

function renderMeta(tags){
  infoMeta.innerHTML = '';
  tags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = tag;
    infoMeta.appendChild(span);
  });
}

function renderItemList(viewKey){
  poiList.innerHTML = '';
  const view = views[viewKey];

  view.items.forEach((item, index) => {
    const btn = document.createElement('button');
    btn.className = 'poiBtn' + (index === currentItemIndex ? ' active' : '');
    btn.type = 'button';
    btn.innerHTML = `
      ${item.label}
      <span class="poiSub">${item.sub}</span>
    `;

    btn.addEventListener('click', () => {
      currentItemIndex = index;
      renderContent();
    });

    poiList.appendChild(btn);
  });
}

function renderContent(){
  const view = views[currentView];
  const item = view.items[currentItemIndex];

  infoKicker.textContent = view.kicker;
  infoTitle.textContent = item.title || view.title;
  infoText.textContent = item.text || view.text;

  renderMeta(item.tags || view.tags);
  renderItemList(currentView);

  dirButtons.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === currentView);
  });

  page.dataset.view = currentView;
}

function setView(viewKey){
  if (!views[viewKey]) return;
  currentView = viewKey;
  currentItemIndex = 0;
  renderContent();
}

function moveView(direction){
  const currentIndex = viewOrder.indexOf(currentView);
  const nextIndex = currentIndex + direction;
  if (nextIndex < 0 || nextIndex >= viewOrder.length) return;
  setView(viewOrder[nextIndex]);
}

dirButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    setView(btn.dataset.view);
  });
});

leftArrow.addEventListener('click', () => moveView(-1));
rightArrow.addEventListener('click', () => moveView(1));

window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') moveView(-1);
  if (e.key === 'ArrowRight') moveView(1);
});

renderContent();
</script>
