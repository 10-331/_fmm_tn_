<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Worldbuilding</title>

<style>
:root{
  --bg1:#0b0c10;
  --bg2:#151821;
  --text:#ece8df;
  --muted:rgba(236,232,223,.66);
  --line:rgba(255,255,255,.12);
  --panel:rgba(10,12,18,.62);
  --panel-strong:rgba(10,12,18,.82);
  --accent:rgba(255,255,255,.14);

  --village1:#d9ddd7;
  --village2:#bfc5bf;

  --hama1:#2f3d66;
  --hama2:#0f1628;

  --s1:#677281;
  --s2:#1c222d;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 20%, rgba(110,120,145,.10), transparent 24%),
    linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
  color:var(--text);
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(to bottom, rgba(255,255,255,.025), transparent 14%, transparent 86%, rgba(255,255,255,.012)),
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.025), transparent 22%);
  opacity:.72;
}

.page{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  isolation:isolate;
}

.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:18px 20px 0;
}

.backLink{
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  letter-spacing:.12em;
  transition:opacity .25s ease, transform .25s ease;
}

.backLink:hover{
  opacity:1;
  transform:translateX(-2px);
}

.titleWrap{
  text-align:right;
}

.pageTitle{
  margin:0;
  font-size:15px;
  letter-spacing:.14em;
  font-weight:500;
}

.pageLead{
  margin:6px 0 0;
  font-size:11px;
  line-height:1.8;
  letter-spacing:.08em;
  color:var(--muted);
}

.scene{
  position:absolute;
  inset:0;
  z-index:1;
}

.sky{
  position:absolute;
  inset:0;
  transition:background .45s ease, filter .45s ease;
}

.page[data-view="village"] .sky{
  background:
    radial-gradient(circle at 50% 22%, rgba(255,255,255,.22), transparent 20%),
    linear-gradient(180deg, var(--village1) 0%, var(--village2) 38%, #8e978f 100%);
  filter:saturate(.68) brightness(.94);
}

.page[data-view="hama"] .sky{
  background:
    radial-gradient(circle at 50% 18%, rgba(174,192,255,.14), transparent 18%),
    linear-gradient(180deg, #445686 0%, var(--hama1) 36%, var(--hama2) 100%);
}

.page[data-view="s"] .sky{
  background:
    radial-gradient(circle at 50% 18%, rgba(235,245,255,.10), transparent 18%),
    linear-gradient(180deg, #7e8794 0%, var(--s1) 34%, var(--s2) 100%);
}

.mist{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.18;
  background:
    radial-gradient(circle at 24% 66%, rgba(255,255,255,.18), transparent 18%),
    radial-gradient(circle at 70% 74%, rgba(255,255,255,.12), transparent 16%);
}

.ground{
  position:absolute;
  left:-8%;
  right:-8%;
  bottom:-4vh;
  height:38vh;
  border-radius:50% 50% 0 0 / 24% 24% 0 0;
  transition:background .45s ease, transform .45s ease;
}

.page[data-view="village"] .ground{
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,.08), transparent 28%),
    linear-gradient(180deg, #6d736f 0%, #505650 100%);
}

.page[data-view="hama"] .ground{
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), transparent 24%),
    linear-gradient(180deg, #1e2639 0%, #111722 100%);
}

.page[data-view="s"] .ground{
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), transparent 20%),
    linear-gradient(180deg, #444d59 0%, #262d37 100%);
}

/* 遠景 */
.backdrop{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.hamaCity,
.villageTree,
.sRoom{
  position:absolute;
  left:50%;
  bottom:20vh;
  transform:translateX(-50%);
  transition:opacity .35s ease, transform .45s ease;
  opacity:0;
}

.page[data-view="hama"] .hamaCity{
  opacity:1;
}

.page[data-view="village"] .villageTree{
  opacity:1;
}

.page[data-view="s"] .sRoom{
  opacity:1;
}

.hamaCity{
  width:min(720px, 92vw);
  height:220px;
}

.hamaCity::before,
.hamaCity::after{
  content:"";
  position:absolute;
  bottom:0;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.08);
}

.hamaCity::before{
  left:8%;
  width:120px;
  height:160px;
  box-shadow:
    180px 22px 0 -8px rgba(255,255,255,.03),
    315px 40px 0 -16px rgba(255,255,255,.03),
    430px 10px 0 -6px rgba(255,255,255,.03);
}

.hamaCity::after{
  right:12%;
  width:96px;
  height:126px;
  box-shadow:
    -142px 18px 0 -8px rgba(255,255,255,.03),
    -275px 32px 0 -14px rgba(255,255,255,.03);
}

.villageTree{
  width:min(560px, 84vw);
  height:280px;
  filter:saturate(.72);
}

.villageTree::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:0;
  width:18px;
  height:126px;
  background:linear-gradient(180deg, #6b5645, #413228);
  transform:translateX(-50%);
}

.villageTree::after{
  content:"";
  position:absolute;
  left:50%;
  top:18px;
  width:240px;
  height:180px;
  border-radius:50%;
  transform:translateX(-50%);
  background:
    radial-gradient(circle at 50% 44%, rgba(255,255,255,.28), transparent 22%),
    radial-gradient(circle at 34% 50%, rgba(255,255,255,.18), transparent 22%),
    radial-gradient(circle at 66% 54%, rgba(255,255,255,.14), transparent 20%),
    linear-gradient(180deg, #e7ebe5 0%, #b8c0b8 100%);
  box-shadow:
    -92px 36px 0 -26px rgba(207,214,207,.82),
    88px 28px 0 -24px rgba(207,214,207,.82);
}

.sRoom{
  width:min(720px, 92vw);
  height:250px;
}

.sRoom::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:8px;
  width:380px;
  height:180px;
  transform:translateX(-50%);
  border:1px solid rgba(255,255,255,.12);
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.01));
  box-shadow:0 0 40px rgba(255,255,255,.04) inset;
}

.sRoom::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:42px;
  width:120px;
  height:70px;
  transform:translateX(-50%);
  border-radius:999px 999px 20px 20px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.12);
}

/* 看板 */
.signpost{
  position:absolute;
  left:50%;
  bottom:18vh;
  transform:translateX(-50%);
  width:140px;
  height:170px;
  z-index:4;
  pointer-events:none;
}

.signpost::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:0;
  width:6px;
  height:92px;
  background:rgba(255,255,255,.20);
  transform:translateX(-50%);
}

.signpost::after{
  content:"";
  position:absolute;
  left:50%;
  top:8px;
  width:120px;
  height:52px;
  transform:translateX(-50%) rotate(-2deg);
  border:1px solid rgba(255,255,255,.18);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

/* 視点UI */
.directionUI{
  position:absolute;
  left:50%;
  bottom:6.4vh;
  transform:translateX(-50%);
  z-index:12;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:blur(10px);
}

.dirBtn{
  min-width:86px;
  padding:10px 12px;
  border:1px solid rgba(255,255,255,.08);
  background:transparent;
  color:var(--muted);
  font:inherit;
  font-size:12px;
  letter-spacing:.12em;
  cursor:pointer;
  transition:background .25s ease, color .25s ease, border-color .25s ease;
}

.dirBtn.active{
  color:var(--text);
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.16);
}

.dirArrows{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:8;
}

.pcArrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:46px;
  height:46px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(10,12,18,.34);
  color:rgba(255,255,255,.38);
  font:inherit;
  font-size:18px;
  pointer-events:auto;
  cursor:pointer;
  backdrop-filter:blur(6px);
}

.pcArrow.left{
  left:18px;
}

.pcArrow.right{
  right:18px;
}

/* 情報パネル */
.infoPanel{
  position:absolute;
  top:88px;
  right:20px;
  z-index:16;
  width:min(360px, calc(100vw - 40px));
  min-height:180px;
  padding:18px 18px 16px;
  border:1px solid var(--line);
  background:var(--panel-strong);
  backdrop-filter:blur(12px);
  box-shadow:0 18px 44px rgba(0,0,0,.24);
}

.infoKicker{
  font-size:10px;
  letter-spacing:.18em;
  color:rgba(236,232,223,.42);
  margin-bottom:8px;
}

.infoTitle{
  font-size:18px;
  line-height:1.6;
  letter-spacing:.08em;
  margin-bottom:8px;
}

.infoText{
  font-size:12px;
  line-height:1.95;
  letter-spacing:.04em;
  color:var(--muted);
  margin-bottom:14px;
}

.infoMeta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag{
  display:inline-block;
  padding:6px 8px;
  font-size:10px;
  letter-spacing:.12em;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
}

/* 項目一覧 */
.poiList{
  position:absolute;
  left:20px;
  bottom:18vh;
  z-index:15;
  display:flex;
  flex-direction:column;
  gap:10px;
  width:min(280px, calc(100vw - 40px));
}

.poiBtn{
  text-align:left;
  padding:12px 14px;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(8,10,16,.46);
  backdrop-filter:blur(10px);
  color:var(--text);
  font:inherit;
  font-size:12px;
  letter-spacing:.08em;
  cursor:pointer;
  transition:background .25s ease, border-color .25s ease, transform .25s ease;
}

.poiBtn:hover,
.poiBtn.active{
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.20);
  transform:translateX(2px);
}

.poiSub{
  display:block;
  margin-top:6px;
  font-size:10px;
  letter-spacing:.12em;
  color:var(--muted);
}

/* 村の人物は立ち絵なし */
.traceNote{
  position:absolute;
  left:50%;
  bottom:25.4vh;
  transform:translateX(-50%);
  z-index:6;
  color:rgba(255,255,255,.22);
  font-size:11px;
  letter-spacing:.18em;
  opacity:0;
  transition:opacity .3s ease;
  pointer-events:none;
}

.page[data-view="village"] .traceNote{
  opacity:1;
}

/* 方向ごとの微調整 */
.page[data-view="village"] .signpost{
  transform:translateX(-50%) rotate(-1deg);
}

.page[data-view="hama"] .signpost{
  transform:translateX(-50%);
}

.page[data-view="s"] .signpost{
  transform:translateX(-50%) rotate(1deg);
}

@media (max-width: 900px){
  .infoPanel{
    top:auto;
    right:14px;
    left:14px;
    bottom:100px;
    width:auto;
    min-height:160px;
  }

  .poiList{
    left:14px;
    right:14px;
    width:auto;
    bottom:166px;
  }

  .pcArrow{
    display:none;
  }
}

@media (max-width: 768px){
  .topbar{
    padding:14px 14px 0;
  }

  .titleWrap{
    text-align:right;
  }

  .pageLead{
    display:none;
  }

  .directionUI{
    left:14px;
    right:14px;
    bottom:14px;
    transform:none;
    justify-content:space-between;
    gap:8px;
    padding:10px;
  }

  .dirBtn{
    min-width:0;
    flex:1 1 auto;
    font-size:11px;
    padding:10px 8px;
  }

  .poiList{
    bottom:188px;
    gap:8px;
  }

  .poiBtn{
    padding:11px 12px;
    font-size:11px;
  }

  .infoPanel{
    bottom:96px;
    min-height:150px;
    padding:15px 14px 14px;
  }

  .infoTitle{
    font-size:16px;
  }

  .infoText{
    font-size:11.5px;
    line-height:1.85;
  }

  .signpost{
    bottom:22vh;
    width:120px;
    height:150px;
  }

  .signpost::after{
    width:102px;
    height:46px;
  }

  .traceNote{
    bottom:29vh;
    font-size:10px;
  }
}
</style>
</head>
<body>

<div class="page" id="page" data-view="hama">
  <div class="topbar">
    <a class="backLink" href="./where.html">← 入口へ戻る</a>

    <div class="titleWrap">
      <h1 class="pageTitle">Worldbuilding</h1>
      <div class="pageLead">看板の前で立ち止まり、向きを変える。</div>
    </div>
  </div>

  <main class="scene">
    <div class="sky"></div>
    <div class="mist"></div>
    <div class="ground"></div>

    <div class="backdrop">
      <div class="hamaCity"></div>
      <div class="villageTree"></div>
      <div class="sRoom"></div>
    </div>

    <div class="traceNote">……誰かがいたはずだ</div>

    <div class="signpost"></div>

    <div class="dirArrows" aria-hidden="true">
      <button class="pcArrow left" id="leftArrow" type="button">←</button>
      <button class="pcArrow right" id="rightArrow" type="button">→</button>
    </div>

    <section class="infoPanel" aria-live="polite">
      <div class="infoKicker" id="infoKicker">VIEW / HAMA</div>
      <div class="infoTitle" id="infoTitle">HAMA / 現在</div>
      <div class="infoText" id="infoText">都市の光と、日常の輪郭。いま立っている場所に最も近い視点。</div>
      <div class="infoMeta" id="infoMeta"></div>
    </section>

    <div class="poiList" id="poiList"></div>

    <nav class="directionUI" aria-label="向きを選ぶ">
      <button class="dirBtn" data-view="village" type="button">左を見る</button>
      <button class="dirBtn active" data-view="hama" type="button">正面を見る</button>
      <button class="dirBtn" data-view="s" type="button">右を見る</button>
    </nav>
  </main>
</div>

<script>
const page = document.getElementById('page');
const infoKicker = document.getElementById('infoKicker');
const infoTitle = document.getElementById('infoTitle');
const infoText = document.getElementById('infoText');
const infoMeta = document.getElementById('infoMeta');
const poiList = document.getElementById('poiList');

const dirButtons = [...document.querySelectorAll('.dirBtn')];
const leftArrow = document.getElementById('leftArrow');
const rightArrow = document.getElementById('rightArrow');

const viewOrder = ['village', 'hama', 's'];

const views = {
  village: {
    kicker: 'VIEW / VILLAGE',
    title: '因習村 / 過去',
    text: '白く抜けたような景色。場所の輪郭はあるのに、そこにいた人だけがうまく定まらない。',
    tags: ['記憶', '神様', '欠落'],
    items: [
      {
        label: 'かみさまのおうち',
        sub: '大きな木のそば',
        title: 'かみさまのおうち',
        text: '幼い綾が小さな宝物を供えていた場所。祠の中身が空だったという感覚だけが妙に残る。',
        tags: ['祠', '供物', '鈴の音']
      },
      {
        label: '蔵',
        sub: '罰と沈黙',
        title: '蔵',
        text: '目隠しと宙吊り、濃い匂い。記憶の輪郭は曖昧なのに、不快だけが異様にはっきりしている。',
        tags: ['拘束', '香', '空白']
      },
      {
        label: '影',
        sub: '人物は見えない',
        title: '綾の痕跡',
        text: 'ここには本来、人の姿があったはずだ。けれど村の中では、彼女は立ち絵として現れない。残るのは気配と断片だけ。',
        tags: ['不在', '幼少', '断片']
      }
    ]
  },

  hama: {
    kicker: 'VIEW / HAMA',
    title: 'HAMA / 現在',
    text: '都市の光と、生活の手触り。失ったものを抱えたまま、いま現在の輪郭だけはたしかにある。',
    tags: ['現在', '都市', '日常'],
    items: [
      {
        label: '綾',
        sub: '現在の姿',
        title: '笹井綾',
        text: '明るく見える現在の綾。けれどその輪郭の裏側には、忘れられた過去と監視された日常が折り重なっている。',
        tags: ['145cm', '現在', '記憶改変後']
      },
      {
        label: '添',
        sub: '曖昧な距離',
        title: '叢雲添',
        text: '大学生としての顔と、別の名で生きる裏側。綾にとっては今に繋がる存在だが、全部はまだ見えていない。',
        tags: ['叢雲添', '二曲輪貂', 'HAMA']
      },
      {
        label: 'mahorova / 街',
        sub: '都市の輪郭',
        title: 'HAMAの現在',
        text: '働く場所、通る場所、日常が続いていく場所。明るさそのものが、逆に不自然なくらい穏やかに見えることがある。',
        tags: ['mahorova', '18区', '生活']
      }
    ]
  },

  s: {
    kicker: 'VIEW / S局',
    title: 'S局 / かつて',
    text: '冷たく記録される側の場所。ここでは人も記憶も、部品のように処理される。',
    tags: ['S局', '変異体', '記録'],
    items: [
      {
        label: 'Filler',
        sub: '綾 / S局時代',
        title: 'Filler',
        text: '綾が与えられていた蔑称めいた呼び名。役に立つことだけが存在理由になっていく、冷たい実務の側面。',
        tags: ['Filler', '綾', '処理']
      },
      {
        label: '破壊装置',
        sub: '記憶の消去',
        title: '口腔投入型デバイス',
        text: '小さな球状デバイス。アンドロイドの記憶を破壊するための、個人的で冷たい方法。',
        tags: ['記憶破壊', 'アンドロイド', '冷却媒体']
      },
      {
        label: '収容室',
        sub: '記録と管理',
        title: 'S局の空間',
        text: '記録、収容、初期化。誰かの人生や自己同一性が、ただの運用手順みたいに扱われる場所。',
        tags: ['収容', '初期化', '管理']
      }
    ]
  }
};

let currentView = 'hama';
let currentItemIndex = 0;

function renderMeta(tags){
  infoMeta.innerHTML = '';
  tags.forEach(tag => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = tag;
    infoMeta.appendChild(span);
  });
}

function renderItemList(viewKey){
  poiList.innerHTML = '';
  const view = views[viewKey];

  view.items.forEach((item, index) => {
    const btn = document.createElement('button');
    btn.className = 'poiBtn' + (index === currentItemIndex ? ' active' : '');
    btn.type = 'button';
    btn.innerHTML = `
      ${item.label}
      <span class="poiSub">${item.sub}</span>
    `;

    btn.addEventListener('click', () => {
      currentItemIndex = index;
      renderContent();
    });

    poiList.appendChild(btn);
  });
}

function renderContent(){
  const view = views[currentView];
  const item = view.items[currentItemIndex];

  infoKicker.textContent = view.kicker;
  infoTitle.textContent = item.title || view.title;
  infoText.textContent = item.text || view.text;

  renderMeta(item.tags || view.tags);
  renderItemList(currentView);

  dirButtons.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === currentView);
  });

  page.dataset.view = currentView;
}

function setView(viewKey){
  if (!views[viewKey]) return;
  currentView = viewKey;
  currentItemIndex = 0;
  renderContent();
}

function moveView(direction){
  const currentIndex = viewOrder.indexOf(currentView);
  const nextIndex = currentIndex + direction;
  if (nextIndex < 0 || nextIndex >= viewOrder.length) return;
  setView(viewOrder[nextIndex]);
}

dirButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    setView(btn.dataset.view);
  });
});

leftArrow.addEventListener('click', () => moveView(-1));
rightArrow.addEventListener('click', () => moveView(1));

window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') moveView(-1);
  if (e.key === 'ArrowRight') moveView(1);
});

renderContent();
</script>
</body>
</html>
