<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Record</title>

<style>
:root{
  --bg-1:#0a0b0f;
  --bg-2:#141821;
  --text:#ece8df;
  --muted:rgba(236,232,223,.56);

  --paper-1:#ece5d8;
  --paper-2:#ddd3c2;
  --paper-edge:rgba(70,58,48,.14);
  --paper-shadow:0 22px 52px rgba(0,0,0,.44);

  --ink:#2f2a25;
  --ink-soft:rgba(47,42,37,.74);
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 22%, rgba(110,120,145,.09), transparent 26%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
  color:var(--text);
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(to bottom, rgba(255,255,255,.02), transparent 16%, transparent 84%, rgba(255,255,255,.01)),
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.025), transparent 22%);
  opacity:.75;
}

.stage{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  isolation:isolate;
}

.stage::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at center, transparent 24%, rgba(0,0,0,.14) 72%, rgba(0,0,0,.38) 100%);
  z-index:0;
}

.backLink{
  position:absolute;
  top:3.2vh;
  left:3.4vw;
  z-index:10;
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  letter-spacing:.12em;
  transition:opacity .25s ease, transform .25s ease;
}

.backLink:hover{
  opacity:1;
  transform:translateX(-2px);
}

.stackWrap{
  position:absolute;
  left:50%;
  top:50%;
  width:min(420px, 84vw);
  height:min(610px, 78vh);
  transform:translate(-50%, -50%);
  z-index:2;
  pointer-events:none;
}

/* 後ろの紙束 */
.stackBack{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.stackBack .sheetBack{
  position:absolute;
  inset:0;
  border-radius:2px;
  background:linear-gradient(180deg, rgba(226,219,207,.68), rgba(205,197,185,.58));
  border:1px solid rgba(65,52,42,.12);
  box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.stackBack .sheetBack.back1{
  transform:translate(14px, 12px) rotate(2.2deg);
  opacity:.42;
}

.stackBack .sheetBack.back2{
  transform:translate(6px, 8px) rotate(-1.1deg);
  opacity:.55;
}

.stackBack .sheetBack.back3{
  transform:translate(-4px, 4px) rotate(.8deg);
  opacity:.62;
}

/* メインの紙 */
.paper{
  position:absolute;
  inset:0;
  pointer-events:auto;
  cursor:pointer;
  border-radius:2px;
  background:
    linear-gradient(180deg, var(--paper-1), var(--paper-2));
  border:1px solid var(--paper-edge);
  box-shadow:var(--paper-shadow);
  overflow:hidden;
  will-change:transform, opacity;
  transition:
    opacity .58s ease,
    box-shadow .35s ease,
    filter .35s ease;
  transform-origin:50% 56%;
}

.paper:hover{
  box-shadow:0 28px 60px rgba(0,0,0,.5);
  filter:brightness(1.01);
}

.paper::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.16), transparent 18%, transparent 84%, rgba(70,58,48,.04)),
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 23px,
      rgba(70,58,48,.035) 23px,
      rgba(70,58,48,.035) 24px
    );
  opacity:.38;
  z-index:1;
}

.paper::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 14% 12%, rgba(255,255,255,.12), transparent 16%),
    radial-gradient(circle at 84% 88%, rgba(0,0,0,.06), transparent 18%);
  mix-blend-mode:multiply;
  opacity:.55;
  z-index:1;
}

/* 紙をめくる時 */
.paper.leaving{
  opacity:0;
  transition:
    transform .68s cubic-bezier(.18,.7,.15,1),
    opacity .58s ease;
}

/* とめてる感じの小物 */
.clip{
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%) rotate(2deg);
  width:54px;
  height:14px;
  background:rgba(224,216,185,.44);
  border:1px solid rgba(110,102,82,.14);
  z-index:3;
  opacity:.9;
}

.pin{
  position:absolute;
  top:12px;
  right:16px;
  width:12px;
  height:12px;
  border-radius:999px;
  background:rgba(118,44,44,.78);
  box-shadow:0 0 0 2px rgba(255,255,255,.14);
  z-index:3;
}

.paperInner{
  position:relative;
  width:100%;
  height:100%;
  padding:24px 24px 18px;
  z-index:2;
}

.visualWrap{
  position:relative;
  width:100%;
  height:76%;
  border:1px solid rgba(60,48,40,.14);
  background:#d7d0c4;
  overflow:hidden;
}

.visualWrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  filter:saturate(.96) contrast(.985);
}

.visualShadow{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), transparent 28%, transparent 72%, rgba(0,0,0,.04));
}

.meta{
  padding-top:16px;
  color:var(--ink);
}

.metaTop{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:8px;
}

.recordNo{
  font-size:10px;
  letter-spacing:.18em;
  color:rgba(47,42,37,.5);
}

.title{
  font-size:15px;
  letter-spacing:.08em;
  line-height:1.7;
}

.caption{
  font-size:12px;
  line-height:1.95;
  color:var(--ink-soft);
  min-height:3.9em;
}

.subHint{
  position:absolute;
  right:3.8vw;
  bottom:5.4vh;
  z-index:6;
  text-align:right;
  color:rgba(236,232,223,.34);
  font-size:11px;
  letter-spacing:.14em;
  line-height:1.9;
  pointer-events:none;
}

.peek{
  position:absolute;
  right:max(8vw, 22px);
  top:50%;
  width:min(112px, 24vw);
  height:min(150px, 21vh);
  transform:translateY(-48%) rotate(6deg);
  background:linear-gradient(180deg, rgba(230,223,212,.26), rgba(204,197,186,.18));
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 12px 24px rgba(0,0,0,.15);
  opacity:.34;
  pointer-events:none;
  z-index:1;
}

.peek::before{
  content:"";
  position:absolute;
  inset:10px;
  border:1px solid rgba(255,255,255,.06);
}

.listLink{
  position:absolute;
  right:3.6vw;
  top:3.2vh;
  z-index:10;
  color:var(--muted);
  text-decoration:none;
  font-size:11px;
  letter-spacing:.14em;
  transition:opacity .25s ease, transform .25s ease;
}

.listLink:hover{
  opacity:1;
  transform:translateX(2px);
}

.flash{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle at 50% 46%, rgba(255,255,255,.08), transparent 28%);
  opacity:0;
  z-index:5;
}

.flash.show{
  animation:paperFlash .48s ease;
}

@keyframes paperFlash{
  0%{ opacity:0; }
  40%{ opacity:.22; }
  100%{ opacity:0; }
}

@media (max-width: 768px){
  .backLink{
    top:2.8vh;
    left:5vw;
  }

  .listLink{
    top:2.8vh;
    right:5vw;
  }

  .stackWrap{
    width:min(360px, 86vw);
    height:min(560px, 74vh);
    top:51%;
  }

  .paperInner{
    padding:20px 18px 16px;
  }

  .visualWrap{
    height:74%;
  }

  .meta{
    padding-top:14px;
  }

  .title{
    font-size:14px;
  }

  .caption{
    font-size:11.5px;
    line-height:1.9;
  }

  .subHint{
    right:5vw;
    bottom:5.2vh;
    font-size:10px;
  }

  .peek{
    right:4vw;
    width:92px;
    height:126px;
    opacity:.24;
  }
}
</style>
</head>
<body>

<main class="stage" aria-label="拾い上げた紙の記録">
  <a class="backLink" href="./where.html">← 入口へ戻る</a>
  <a class="listLink" href="./gallery-list.html">記録一覧 →</a>

  <div class="peek" aria-hidden="true"></div>

  <section class="stackWrap">
    <div class="stackBack" aria-hidden="true">
      <div class="sheetBack back1"></div>
      <div class="sheetBack back2"></div>
      <div class="sheetBack back3"></div>
    </div>

    <div class="paper" id="paper" role="button" tabindex="0" aria-label="紙をめくる">
      <div class="clip"></div>
      <div class="pin"></div>

      <div class="paperInner">
        <div class="visualWrap">
          <img id="recordImage" src="./images/gallery/sample01.jpg" alt="記録 01">
          <div class="visualShadow"></div>
        </div>

        <div class="meta">
          <div class="metaTop">
            <div class="title" id="recordTitle">綾 / 記録断片</div>
            <div class="recordNo" id="recordNo">RECORD 01</div>
          </div>
          <div class="caption" id="recordCaption">……そこに残されていたものを、ただ捨てきれずに見ている。</div>
        </div>
      </div>
    </div>
  </section>

  <div class="flash" id="flash"></div>

  <div class="subHint" aria-hidden="true">
    触れて、めくる<br>
    まだ数枚、重なっている
  </div>
</main>

<script>
const records = [
  {
    img: "./images/gallery/sample01.jpg",
    no: "RECORD 01",
    title: "綾 / 記録断片",
    text: "……そこに残されていたものを、ただ捨てきれずに見ている。"
  },
  {
    img: "./images/gallery/sample02.jpg",
    no: "RECORD 02",
    title: "添 / 記録断片",
    text: "触れたあとに、まだ次があると気づく。その感覚だけが少し嫌に残る。"
  },
  {
    img: "./images/gallery/sample03.jpg",
    no: "RECORD 03",
    title: "二人 / 記録断片",
    text: "重なっていた紙は、誰かがまとめたのか、それとも偶然そうなっただけなのか。"
  }
];

let currentIndex = 0;
let isTurning = false;

/* DOM */
const paper = document.getElementById("paper");
const recordImage = document.getElementById("recordImage");
const recordTitle = document.getElementById("recordTitle");
const recordCaption = document.getElementById("recordCaption");
const recordNo = document.getElementById("recordNo");
const flash = document.getElementById("flash");

/* 揺れ用 */
let pointerX = 0;
let pointerY = 0;
let currentX = 0;
let currentY = 0;
let baseRotate = -1.8;

function applyRecord(index){
  const item = records[index];
  recordImage.src = item.img;
  recordImage.alt = item.no;
  recordTitle.textContent = item.title;
  recordCaption.textContent = item.text;
  recordNo.textContent = item.no;
}

function updatePointerTarget(clientX, clientY){
  const x = (clientX / window.innerWidth) - 0.5;
  const y = (clientY / window.innerHeight) - 0.5;

  pointerX = x * 5.2;
  pointerY = y * 3.6;
}

window.addEventListener("mousemove", (e) => {
  updatePointerTarget(e.clientX, e.clientY);
}, { passive:true });

window.addEventListener("touchmove", (e) => {
  if (!e.touches || !e.touches[0]) return;
  updatePointerTarget(e.touches[0].clientX, e.touches[0].clientY);
}, { passive:true });

window.addEventListener("touchend", () => {
  pointerX = 0;
  pointerY = 0;
}, { passive:true });

window.addEventListener("mouseleave", () => {
  pointerX = 0;
  pointerY = 0;
});

function animatePaper(){
  currentX += (pointerX - currentX) * 0.08;
  currentY += (pointerY - currentY) * 0.08;

  const t = Date.now() * 0.001;
  const swayX = Math.sin(t * 0.95) * 1.3;
  const swayY = Math.cos(t * 0.78) * 1.05;
  const rotate = baseRotate + currentX * 0.22 + Math.sin(t * 0.72) * 0.35;

  if (!paper.classList.contains("leaving")) {
    paper.style.transform =
      `translate(${currentX + swayX}px, ${currentY + swayY}px) rotate(${rotate}deg)`;
  }

  requestAnimationFrame(animatePaper);
}

function turnPaper(){
  if (isTurning) return;
  isTurning = true;

  flash.classList.remove("show");
  void flash.offsetWidth;
  flash.classList.add("show");

  const leavingRotate = baseRotate - 6.5;
  paper.classList.add("leaving");
  paper.style.transform = `translate(-105%, -8px) rotate(${leavingRotate}deg) scale(.985)`;

  setTimeout(() => {
    currentIndex = (currentIndex + 1) % records.length;
    applyRecord(currentIndex);

    paper.classList.remove("leaving");
    paper.style.opacity = "0";

    const reenterRotate = baseRotate + 3.2;
    paper.style.transform = `translate(12%, 4px) rotate(${reenterRotate}deg) scale(.995)`;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        paper.style.opacity = "1";
      });
    });

    setTimeout(() => {
      isTurning = false;
    }, 180);
  }, 210);
}

paper.addEventListener("click", turnPaper);
paper.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    turnPaper();
  }
});

applyRecord(currentIndex);
animatePaper();
</script>
</body>
</html>
