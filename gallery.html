<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record</title>

<style>
:root{
  --bg-1:#0a0b0f;
  --bg-2:#141821;
  --text:#ece8df;
  --muted:rgba(236,232,223,.58);

  --paper-1:#ece5d8;
  --paper-2:#ddd3c2;
  --paper-edge:rgba(70,58,48,.14);
  --paper-shadow:0 22px 52px rgba(0,0,0,.44);

  --ink:#2f2a25;
  --ink-soft:rgba(47,42,37,.74);

  --panel:rgba(11,13,18,.92);
  --line:rgba(255,255,255,.10);
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 22%, rgba(110,120,145,.09), transparent 26%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
  color:var(--text);
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(to bottom, rgba(255,255,255,.02), transparent 16%, transparent 84%, rgba(255,255,255,.01)),
    radial-gradient(circle at 50% 18%, rgba(255,255,255,.025), transparent 22%);
  opacity:.75;
}

img{
  -webkit-user-drag:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.stage{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  isolation:isolate;
}

.stage::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at center, transparent 24%, rgba(0,0,0,.14) 72%, rgba(0,0,0,.38) 100%);
  z-index:0;
}

.backLink{
  position:absolute;
  top:3.2vh;
  left:3.4vw;
  z-index:20;
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  letter-spacing:.12em;
  transition:opacity .25s ease, transform .25s ease;
}

.backLink:hover{
  opacity:1;
  transform:translateX(-2px);
}

.listButton{
  position:absolute;
  top:3.2vh;
  right:3.6vw;
  z-index:20;
  border:none;
  background:transparent;
  color:var(--muted);
  font:inherit;
  font-size:11px;
  letter-spacing:.14em;
  cursor:pointer;
  transition:opacity .25s ease, transform .25s ease;
}

.listButton:hover{
  opacity:1;
  transform:translateX(2px);
}

.stackWrap{
  position:absolute;
  left:50%;
  top:50%;
  width:min(420px, 84vw);
  height:min(610px, 78vh);
  transform:translate(-50%, -50%);
  z-index:2;
  pointer-events:none;
}

.stackBack{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.stackBack .sheetBack{
  position:absolute;
  inset:0;
  border-radius:2px;
  background:linear-gradient(180deg, rgba(226,219,207,.68), rgba(205,197,185,.58));
  border:1px solid rgba(65,52,42,.12);
  box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.stackBack .sheetBack.back1{
  transform:translate(14px, 12px) rotate(2.2deg);
  opacity:.42;
}

.stackBack .sheetBack.back2{
  transform:translate(6px, 8px) rotate(-1.1deg);
  opacity:.55;
}

.stackBack .sheetBack.back3{
  transform:translate(-4px, 4px) rotate(.8deg);
  opacity:.62;
}

.paper{
  position:absolute;
  inset:0;
  pointer-events:auto;
  border-radius:2px;
  background:linear-gradient(180deg, var(--paper-1), var(--paper-2));
  border:1px solid var(--paper-edge);
  box-shadow:var(--paper-shadow);
  overflow:hidden;
  will-change:transform, opacity;
  transition:
    opacity .56s ease,
    transform .56s ease,
    box-shadow .35s ease,
    filter .35s ease;
  transform-origin:12% 56%;
}

.paper:hover{
  box-shadow:0 28px 60px rgba(0,0,0,.5);
  filter:brightness(1.01);
}

.paper::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.16), transparent 18%, transparent 84%, rgba(70,58,48,.04)),
    repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 23px,
      rgba(70,58,48,.035) 23px,
      rgba(70,58,48,.035) 24px
    );
  opacity:.38;
  z-index:1;
}

.paper::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 14% 12%, rgba(255,255,255,.12), transparent 16%),
    radial-gradient(circle at 84% 88%, rgba(0,0,0,.06), transparent 18%);
  mix-blend-mode:multiply;
  opacity:.55;
  z-index:1;
}

.clip{
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%) rotate(2deg);
  width:54px;
  height:14px;
  background:rgba(224,216,185,.44);
  border:1px solid rgba(110,102,82,.14);
  z-index:3;
  opacity:.9;
}

.pin{
  position:absolute;
  top:12px;
  right:16px;
  width:12px;
  height:12px;
  border-radius:999px;
  background:rgba(118,44,44,.78);
  box-shadow:0 0 0 2px rgba(255,255,255,.14);
  z-index:3;
}

.navZone{
  position:absolute;
  top:0;
  bottom:0;
  width:24%;
  z-index:4;
  cursor:pointer;
  background:transparent;
}

.navLeft{
  left:0;
}

.navRight{
  right:0;
}

.navLeft::before,
.navRight::before{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  color:rgba(255,255,255,.14);
  font-size:16px;
  pointer-events:none;
}

.navLeft::before{
  content:"←";
  left:12px;
}

.navRight::before{
  content:"→";
  right:12px;
}

.paperInner{
  position:relative;
  width:100%;
  height:100%;
  padding:24px 24px 18px;
  z-index:2;
}

.visualWrap{
  position:relative;
  width:100%;
  height:76%;
  border:1px solid rgba(60,48,40,.14);
  background:#d7d0c4;
  overflow:hidden;
  z-index:5;
  cursor:zoom-in;
}

.visualWrap img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  filter:saturate(.96) contrast(.985);
  background:#d7d0c4;
}

.visualShadow{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(180deg, rgba(255,255,255,.06), transparent 28%, transparent 72%, rgba(0,0,0,.04));
}

.meta{
  padding-top:16px;
  color:var(--ink);
}

.metaTop{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:8px;
}

.recordNo{
  font-size:10px;
  letter-spacing:.18em;
  color:rgba(47,42,37,.5);
}

.title{
  font-size:15px;
  letter-spacing:.08em;
  line-height:1.7;
}

.caption{
  font-size:12px;
  line-height:1.95;
  color:var(--ink-soft);
  min-height:3.9em;
}

.subHint{
  position:absolute;
  right:3.8vw;
  bottom:5.4vh;
  z-index:6;
  text-align:right;
  color:rgba(236,232,223,.34);
  font-size:11px;
  letter-spacing:.14em;
  line-height:1.9;
  pointer-events:none;
}

.peek{
  position:absolute;
  right:max(8vw, 22px);
  top:50%;
  width:min(112px, 24vw);
  height:min(150px, 21vh);
  transform:translateY(-48%) rotate(6deg);
  background:linear-gradient(180deg, rgba(230,223,212,.26), rgba(204,197,186,.18));
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 12px 24px rgba(0,0,0,.15);
  opacity:.34;
  pointer-events:none;
  z-index:1;
}

.peek::before{
  content:"";
  position:absolute;
  inset:10px;
  border:1px solid rgba(255,255,255,.06);
}

.flash{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:radial-gradient(circle at 50% 46%, rgba(255,255,255,.08), transparent 28%);
  opacity:0;
  z-index:5;
}

.flash.show{
  animation:paperFlash .42s ease;
}

@keyframes paperFlash{
  0%{ opacity:0; }
  40%{ opacity:.22; }
  100%{ opacity:0; }
}

.listOverlay{
  position:fixed;
  inset:0;
  z-index:40;
  background:rgba(5,7,12,.72);
  backdrop-filter:blur(6px);
  opacity:0;
  pointer-events:none;
  transition:opacity .28s ease;
}

.listOverlay.show{
  opacity:1;
  pointer-events:auto;
}

.listPanel{
  position:absolute;
  left:50%;
  bottom:0;
  width:min(1100px, 100%);
  max-height:78vh;
  transform:translate(-50%, 100%);
  background:var(--panel);
  border-top:1px solid var(--line);
  box-shadow:0 -24px 60px rgba(0,0,0,.35);
  transition:transform .34s ease;
  padding:18px 18px 20px;
}

.listOverlay.show .listPanel{
  transform:translate(-50%, 0);
}

.listHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:14px;
}

.listTitle{
  font-size:13px;
  letter-spacing:.14em;
  color:var(--text);
}

.closeList{
  border:none;
  background:transparent;
  color:var(--muted);
  font:inherit;
  font-size:12px;
  letter-spacing:.12em;
  cursor:pointer;
}

.thumbGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
  gap:14px;
  overflow:auto;
  max-height:calc(78vh - 64px);
  padding-right:4px;
}

.thumbCard{
  border:none;
  background:transparent;
  color:inherit;
  padding:0;
  margin:0;
  text-align:left;
  cursor:pointer;
}

.thumbFigure{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  overflow:hidden;
}

.thumbFigure img{
  width:100%;
  aspect-ratio:4 / 5;
  object-fit:cover;
  display:block;
}

.thumbMeta{
  margin-top:6px;
  font-size:11px;
  line-height:1.6;
  color:var(--muted);
}

.thumbCard.active .thumbFigure{
  border-color:rgba(255,255,255,.28);
}

.thumbCard.active .thumbMeta{
  color:var(--text);
}

.lightbox{
  position:fixed;
  inset:0;
  z-index:60;
  background:rgba(0,0,0,.9);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
  padding:24px;
}

.lightbox.show{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:92%;
  max-height:92%;
  display:block;
}

@media (max-width: 768px){
  .backLink,
  .listButton{
    top:2.2vh;
  }

  .backLink{
    left:5vw;
  }

  .listButton{
    right:5vw;
  }

  .stackWrap{
    width:min(340px, 82vw);
    height:min(520px, 70vh);
    top:50%;
  }

  .paperInner{
    padding:20px 18px 16px;
  }

  .visualWrap{
    height:74%;
  }

  .meta{
    padding-top:14px;
  }

  .title{
    font-size:14px;
  }

  .caption{
    font-size:11.5px;
    line-height:1.9;
  }

  .subHint{
    display:none;
  }

  .peek{
    right:4vw;
    width:92px;
    height:126px;
    opacity:.24;
  }

  .listPanel{
    padding:14px 14px 18px;
    max-height:82vh;
  }

  .thumbGrid{
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:10px;
  }

  .navZone{
    width:22%;
  }
}
</style>
</head>
<body>

<main class="stage" aria-label="拾い上げた紙の記録">
  <a class="backLink" href="./where.html">← 入口へ戻る</a>
  <button class="listButton" id="listButton" type="button">記録一覧 →</button>

  <div class="peek" aria-hidden="true"></div>

  <section class="stackWrap">
    <div class="stackBack" aria-hidden="true">
      <div class="sheetBack back1"></div>
      <div class="sheetBack back2"></div>
      <div class="sheetBack back3"></div>
    </div>

    <div class="paper" id="paper" tabindex="0" aria-label="左右で記録を送る">
      <div class="clip"></div>
      <div class="pin"></div>

      <div class="navZone navLeft" id="navLeft" aria-hidden="true"></div>
      <div class="navZone navRight" id="navRight" aria-hidden="true"></div>

      <div class="paperInner">
        <div class="visualWrap" id="visualWrap">
          <img id="recordImage" src="" alt="">
          <div class="visualShadow"></div>
        </div>

        <div class="meta">
          <div class="metaTop">
            <div class="title" id="recordTitle"></div>
            <div class="recordNo" id="recordNo"></div>
          </div>
          <div class="caption" id="recordCaption"></div>
        </div>
      </div>
    </div>
  </section>

  <div class="flash" id="flash"></div>

  <div class="subHint" aria-hidden="true">
    左で戻る / 右で進む<br>
    画像を押すと拡大
  </div>
</main>

<div class="listOverlay" id="listOverlay" aria-hidden="true">
  <div class="listPanel" role="dialog" aria-label="記録一覧">
    <div class="listHeader">
      <div class="listTitle">記録一覧</div>
      <button class="closeList" id="closeList" type="button">閉じる</button>
    </div>
    <div class="thumbGrid" id="thumbGrid"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const BASE_PATH = "./gallery-project/images/gallery/";

let records = [];
let currentIndex = 0;
let isTurning = false;

const paper = document.getElementById("paper");
const navLeft = document.getElementById("navLeft");
const navRight = document.getElementById("navRight");
const visualWrap = document.getElementById("visualWrap");
const recordImage = document.getElementById("recordImage");
const recordTitle = document.getElementById("recordTitle");
const recordCaption = document.getElementById("recordCaption");
const recordNo = document.getElementById("recordNo");
const flash = document.getElementById("flash");

const listButton = document.getElementById("listButton");
const listOverlay = document.getElementById("listOverlay");
const closeList = document.getElementById("closeList");
const thumbGrid = document.getElementById("thumbGrid");

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");

function safeTitle(item){
  return item.title || item.file || "記録";
}

function safeText(item){
  return item.text || "";
}

function safeNo(index){
  return `RECORD ${String(index + 1).padStart(2, "0")}`;
}

function applyRecord(index){
  const item = records[index];
  if (!item) return;

  recordImage.src = BASE_PATH + item.file;
  recordImage.alt = safeTitle(item);
  recordTitle.textContent = safeTitle(item);
  recordCaption.textContent = safeText(item);
  recordNo.textContent = item.no || safeNo(index);

  updateActiveThumb();
}

function moveToIndex(nextIndex){
  if (isTurning || !records.length) return;
  if (nextIndex < 0 || nextIndex >= records.length) return;
  if (nextIndex === currentIndex) return;

  isTurning = true;

  flash.classList.remove("show");
  void flash.offsetWidth;
  flash.classList.add("show");

  const goingForward = nextIndex > currentIndex;

  paper.style.transition = "transform .36s ease, opacity .28s ease";
  paper.style.transform = goingForward
    ? "translate(-14%, -3%) rotate(-6deg) scale(.988)"
    : "translate(14%, -3%) rotate(6deg) scale(.988)";
  paper.style.opacity = "0.18";

  setTimeout(() => {
    currentIndex = nextIndex;
    applyRecord(currentIndex);

    paper.style.transition = "none";
    paper.style.transform = goingForward
      ? "translate(5%, 2%) rotate(1.8deg) scale(.994)"
      : "translate(-5%, 2%) rotate(-1.8deg) scale(.994)";
    paper.style.opacity = "0";

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        paper.style.transition = "transform .32s ease, opacity .22s ease";
        paper.style.transform = "translate(0,0) rotate(0deg) scale(1)";
        paper.style.opacity = "1";
      });
    });

    setTimeout(() => {
      isTurning = false;
    }, 120);
  }, 150);
}

function nextRecord(){
  if (currentIndex >= records.length - 1) return;
  moveToIndex(currentIndex + 1);
}

function prevRecord(){
  if (currentIndex <= 0) return;
  moveToIndex(currentIndex - 1);
}

function buildThumbs(){
  thumbGrid.innerHTML = "";

  records.forEach((item, index) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "thumbCard";
    btn.dataset.index = index;

    btn.innerHTML = `
      <div class="thumbFigure">
        <img src="${BASE_PATH + item.file}" alt="${safeTitle(item)}">
      </div>
      <div class="thumbMeta">
        <div>${item.no || safeNo(index)}</div>
        <div>${safeTitle(item)}</div>
      </div>
    `;

    btn.addEventListener("click", () => {
      currentIndex = index;
      applyRecord(currentIndex);
      closeListOverlay();
    });

    thumbGrid.appendChild(btn);
  });

  updateActiveThumb();
}

function updateActiveThumb(){
  thumbGrid.querySelectorAll(".thumbCard").forEach(btn => {
    btn.classList.toggle("active", Number(btn.dataset.index) === currentIndex);
  });
}

function openListOverlay(){
  listOverlay.classList.add("show");
  listOverlay.setAttribute("aria-hidden", "false");
}

function closeListOverlay(){
  listOverlay.classList.remove("show");
  listOverlay.setAttribute("aria-hidden", "true");
}

function openLightbox(){
  if (!records[currentIndex]) return;
  lightboxImg.src = BASE_PATH + records[currentIndex].file;
  lightboxImg.alt = safeTitle(records[currentIndex]);
  lightbox.classList.add("show");
  lightbox.setAttribute("aria-hidden", "false");
}

function closeLightbox(){
  lightbox.classList.remove("show");
  lightbox.setAttribute("aria-hidden", "true");
  lightboxImg.src = "";
  lightboxImg.alt = "";
}

listButton.addEventListener("click", openListOverlay);
closeList.addEventListener("click", closeListOverlay);

listOverlay.addEventListener("click", (e) => {
  if (e.target === listOverlay) {
    closeListOverlay();
  }
});

navLeft.addEventListener("click", (e) => {
  e.stopPropagation();
  prevRecord();
});

navRight.addEventListener("click", (e) => {
  e.stopPropagation();
  nextRecord();
});

visualWrap.addEventListener("click", (e) => {
  e.stopPropagation();
  openLightbox();
});

paper.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") {
    e.preventDefault();
    nextRecord();
  }
  if (e.key === "ArrowLeft") {
    e.preventDefault();
    prevRecord();
  }
  if (e.key === "Enter") {
    e.preventDefault();
    openLightbox();
  }
});

lightbox.addEventListener("click", closeLightbox);

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    closeLightbox();
    closeListOverlay();
  }
});

fetch(BASE_PATH + "data.json")
  .then(res => {
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }
    return res.json();
  })
  .then(data => {
    records = Array.isArray(data) ? data : [];
    if (!records.length) {
      throw new Error("data.json が空です");
    }

    buildThumbs();
    applyRecord(currentIndex);
  })
  .catch(err => {
    console.error("JSON読み込みエラー:", err);
    recordTitle.textContent = "読み込み失敗";
    recordCaption.textContent = "data.json または画像パスを確認してください。";
    recordNo.textContent = "ERROR";
  });
</script>

</body>
</html>
