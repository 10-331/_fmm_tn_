<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record</title>

<style>
body{
  margin:0;
  background:#0a0b0f;
  color:#ece8df;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
}

.stage{
  width:100%;
  min-height:100vh;
  padding:60px 20px;
  box-sizing:border-box;
}

.title{
  text-align:center;
  margin-bottom:40px;
  opacity:.7;
}

#gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
  gap:24px;
}

.card{
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:4px;
}

.meta{
  margin-top:6px;
  font-size:12px;
  opacity:.8;
}

/* ライトボックス */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:999;
}

.lightbox.show{
  opacity:1;
  pointer-events:auto;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div class="stage">
  <div class="title">拾い上げた記録</div>
  <div id="gallery"></div>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg">
</div>

<script>
const BASE_PATH = "./gallery-project/images/gallery/";

fetch(BASE_PATH + "data.json")
  .then(res => res.json())
  .then(data => {
    const gallery = document.getElementById("gallery");

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      const title = item.title || item.file;
      const text = item.text || "";

      card.innerHTML = `
        <img src="${BASE_PATH + item.file}" alt="${title}">
        <div class="meta">
          <div>${title}</div>
          <div>${text}</div>
        </div>
      `;

      card.addEventListener("click", () => {
        openLightbox(BASE_PATH + item.file);
      });

      gallery.appendChild(card);
    });
  })
  .catch(err => {
    console.error("JSON読み込みエラー:", err);
  });

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");

function openLightbox(src){
  lightboxImg.src = src;
  lightbox.classList.add("show");
}

lightbox.addEventListener("click", () => {
  lightbox.classList.remove("show");
});
</script>

</body>
</html>
