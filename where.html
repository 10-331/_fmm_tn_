<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>入口</title>

<style>
:root{
  --bg:#0b0c10;
  --text:#ece8df;
}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:radial-gradient(circle,#1a1d24,#0b0c10);
  color:var(--text);
  font-family:"Yu Mincho",serif;
}

.scene{position:relative;height:100%;}

/* ▼ 縦書き */
.intro{
  position:absolute;inset:0;
  display:flex;justify-content:center;align-items:center;
  writing-mode:vertical-rl;
  font-size:24px;line-height:2;
  transition:.5s;
}
.intro.dim{opacity:.2;}

/* ▼ タップ */
.tap{
  position:absolute;inset:0;
  z-index:5;
}

/* ▼ 選択肢 */
.choice{
  position:absolute;
  opacity:0;
  transition:.4s;
}
.choice.show{opacity:1}

/* 声 */
.voice{left:10vw;top:50%;}
.voice::before,.voice::after{
  content:"";position:absolute;
  border:1px solid rgba(255,255,255,.4);
  border-left:transparent;border-top:transparent;border-bottom:transparent;
  border-radius:50%;
}
.voice::before{width:20px;height:30px;left:-10px;}
.voice::after{width:40px;height:60px;left:-20px;}

/* 看板 */
.sign{right:10vw;top:45%;border:1px solid #aaa;padding:10px;}

/* 紙 */
.paper{
  left:50%;bottom:10%;
  transform:translateX(-50%) rotate(-5deg);
  border:1px solid #aaa;padding:10px;
}

/* ▼ 説明 */
.desc{
  position:absolute;
  top:5%;left:50%;transform:translateX(-50%);
  opacity:0;transition:.3s;
}
.desc.show{opacity:1}

/* ▼ 白フェード */
.fade{
  position:fixed;inset:0;
  background:#fff;
  opacity:0;
  transition:1s;
  pointer-events:none;
}
.fade.show{opacity:1}

</style>
</head>

<body>

<div class="scene">

<div class="intro" id="intro">
気づくと、知らない場所に立っていた。
風はないのに、何かが揺れている。
</div>

<div class="tap" id="tap"></div>

<div class="choice voice" id="c1">声</div>
<div class="choice sign" id="c2">看板</div>
<div class="choice paper" id="c3">紙</div>

<div class="desc" id="desc"></div>

</div>

<div class="fade" id="fade"></div>

<script>
const tap=document.getElementById('tap');
const intro=document.getElementById('intro');
const desc=document.getElementById('desc');
const fade=document.getElementById('fade');

const data={
c1:{t:'声',d:'物語へ',url:'story.html'},
c2:{t:'看板',d:'世界観',url:'worldbuilding.html'},
c3:{t:'紙',d:'展示',url:'gallery.html'}
};

let stage=0;
let active=null;

tap.onclick=()=>{

// 初回 → 選択肢表示
if(stage===0){
intro.classList.add('dim');
document.querySelectorAll('.choice').forEach(c=>c.classList.add('show'));
stage=1;
return;
}

// 説明状態 → リセット
if(stage===2){
stage=0;
active=null;
desc.classList.remove('show');
intro.classList.remove('dim');
document.querySelectorAll('.choice').forEach(c=>c.classList.remove('show'));
}
};

document.querySelectorAll('.choice').forEach(c=>{
c.onclick=(e)=>{
e.stopPropagation();

if(stage===1){
active=c.id;
desc.textContent=data[c.id].d;
desc.classList.add('show');
stage=2;
return;
}

if(stage===2){

// 別選択
if(active!==c.id){
active=c.id;
desc.textContent=data[c.id].d;
return;
}

// 遷移
sessionStorage.setItem('fromEntrance','1');
fade.classList.add('show');

setTimeout(()=>{
location.href=data[c.id].url;
},800);
}
};
});
</script>

</body>
</html>
