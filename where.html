<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>入口</title>

<style>
:root{
  --bg-1:#0b0c10;
  --bg-2:#14161b;
  --text:#ece8df;
  --muted:rgba(236,232,223,.66);
}

*{ box-sizing:border-box; }

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 38%, rgba(95,105,120,.10), transparent 30%),
    radial-gradient(circle at 50% 50%, #1a1d24 0%, var(--bg-2) 38%, var(--bg-1) 100%);
  color:var(--text);
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
}

.scene{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
}

/* ===== 背景エフェクト ===== */

.serpent{
  position:absolute;
  pointer-events:none;
  opacity:.12;
  filter:blur(24px);
  border-radius:999px;
  background:linear-gradient(90deg,
    transparent,
    rgba(110,125,160,.25),
    transparent
  );
}

.serpent1{
  width:75vw;
  height:36px;
  left:-15vw;
  bottom:18vh;
  animation:slither1 23s infinite;
}

.serpent2{
  width:65vw;
  height:30px;
  right:-20vw;
  top:24vh;
  animation:slither2 31s infinite;
}

@keyframes slither1{
  0%{ transform:translateX(0) rotate(5deg);}
  100%{ transform:translateX(32vw) rotate(6deg);}
}

@keyframes slither2{
  0%{ transform:translateX(0) rotate(-6deg);}
  100%{ transform:translateX(-30vw) rotate(-6deg);}
}

/* ===== 本文 ===== */

.intro{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:7vh 6vw;
}

.introText{
  writing-mode:vertical-rl;
  font-size:clamp(17px, 4vw, 25px);
  line-height:1.9;
  letter-spacing:.07em;
  animation:breath 5s ease-in-out infinite;
}

@keyframes breath{
  50%{ transform:translateY(-2px); opacity:.92; }
}

/* ===== 選択肢 ===== */

.choice{
  position:absolute;
  opacity:0;
  transform:translateY(10px);
  transition:.4s;
  background:none;
  border:none;
  color:var(--text);
}

.choice.show{
  opacity:1;
  transform:translateY(0);
}

.choice .label{
  display:block;
  margin-top:16px;
  font-size:12px;
  text-align:center;
}

/* 左 */
.voiceChoice{
  left:15vw;
  top:44%;
}

/* 右 */
.signChoice{
  right:14vw;
  top:44%;
}

/* 下（紙） */
.paperChoice{
  left:50%;
  bottom:4vh;
  transform:translateX(-50%);
}

.paperChoice .label{
  margin-top:26px; /* ←ここ触れば距離変わる */
}

/* ===== モバイル ===== */

@media (max-width:640px){

  .voiceChoice{
    left:7vw;
  }

  .signChoice{
    right:7vw;
  }

  .paperChoice{
    bottom:6vh;
  }

  .paperChoice .label{
    margin-top:24px;
  }
}
</style>
</head>

<body>
<main class="scene">

<div class="serpent serpent1"></div>
<div class="serpent serpent2"></div>

<section class="intro">
  <div class="introText">
気が付くと、知らない場所に立っていた。

「……此処は？」

辺りを見回すと、いくつかの違和感がある。
  </div>
</section>

<!-- 選択肢 -->
<button class="choice voiceChoice show">
  <div>))</div>
  <span class="label">耳を澄ます</span>
</button>

<button class="choice signChoice show">
  <div>|__|</div>
  <span class="label">看板を見る</span>
</button>

<button class="choice paperChoice show">
  <div style="width:60px;height:80px;border:1px solid #aaa;transform:rotate(-8deg);"></div>
  <span class="label">紙を拾う</span>
</button>

</main>
</body>
</html>
