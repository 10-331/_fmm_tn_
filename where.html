<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>入口</title>
<style>
  :root{
    --bg-1:#0b0c10;
    --bg-2:#14161b;
    --text:#ece8df;
    --muted:rgba(236,232,223,.58);
    --line:rgba(236,232,223,.14);
    --glow:rgba(236,232,223,.08);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 42%, rgba(95,105,120,.08), transparent 34%),
      radial-gradient(circle at 50% 50%, #1a1d24 0%, var(--bg-2) 38%, var(--bg-1) 100%);
    color:var(--text);
    font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(to bottom, rgba(255,255,255,.03), transparent 20%, transparent 80%, rgba(255,255,255,.02)),
      radial-gradient(circle at 50% 20%, rgba(255,255,255,.03), transparent 24%);
    opacity:.55;
  }

  .scene{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    isolation:isolate;
  }

  /* 中央の縦書きテキスト */
  .intro{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:7vh 6vw;
    transition:opacity .7s ease, transform .7s ease, filter .7s ease;
    z-index:3;
  }

  .introText{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    font-size:clamp(20px, 4.8vw, 30px);
    line-height:2.15;
    letter-spacing:.12em;
    max-height:76vh;
    text-shadow:0 0 12px rgba(255,255,255,.05);
    white-space:pre-wrap;
  }

  .intro.dim{
    opacity:.18;
    filter:blur(1px);
    transform:scale(.985);
  }

  /* 空間にあるもの */
  .worldObject{
    position:absolute;
    opacity:0;
    transform:translateY(8px);
    transition:opacity .6s ease, transform .6s ease, filter .6s ease;
    z-index:2;
    pointer-events:none;
    filter:blur(.4px);
  }

  .worldObject.show{
    opacity:1;
    transform:translateY(0);
  }

  .bell{
    left:10vw;
    top:50%;
    width:28px;
    height:86px;
  }

  .bell::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    width:1px;
    height:26px;
    background:rgba(255,255,255,.2);
    transform:translateX(-50%);
  }

  .bell::after{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    width:26px;
    height:38px;
    border:1px solid rgba(255,255,255,.28);
    border-radius:50% 50% 42% 42%;
    transform:translateX(-50%);
    box-shadow:0 0 20px rgba(255,255,255,.04);
  }

  .sign{
    right:9vw;
    top:46%;
    width:76px;
    height:120px;
  }

  .sign::before{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    width:2px;
    height:70px;
    background:rgba(255,255,255,.18);
    transform:translateX(-50%);
  }

  .sign::after{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    width:70px;
    height:44px;
    border:1px solid rgba(255,255,255,.22);
    transform:translateX(-50%) rotate(-2deg);
    box-shadow:0 0 18px rgba(255,255,255,.03);
  }

  .paper{
    left:50%;
    bottom:13vh;
    width:72px;
    height:92px;
    transform:translateX(-50%) rotate(-8deg) translateY(10px);
    border:1px solid rgba(255,255,255,.2);
    background:linear-gradient(to bottom, rgba(255,255,255,.04), rgba(255,255,255,.015));
    box-shadow:0 0 20px rgba(255,255,255,.03);
  }

  .paper.show{
    transform:translateX(-50%) rotate(-8deg) translateY(0);
  }

  /* 当たり判定 */
  .hotspot{
    position:absolute;
    z-index:5;
    background:transparent;
    border:none;
    padding:0;
    margin:0;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  .hotspot:focus-visible{
    outline:1px solid rgba(255,255,255,.35);
    outline-offset:-1px;
  }

  .leftZone{
    left:0;
    top:0;
    width:34%;
    height:100%;
  }

  .rightZone{
    right:0;
    top:0;
    width:34%;
    height:100%;
  }

  .backZone{
    left:30%;
    bottom:0;
    width:40%;
    height:26%;
  }

  .paperZone{
    left:50%;
    bottom:11vh;
    width:110px;
    height:120px;
    transform:translateX(-50%);
    display:none;
  }

  .paperZone.active{
    display:block;
  }

  /* うっすら出るヒント */
  .hint{
    position:absolute;
    font-size:12px;
    letter-spacing:.12em;
    color:var(--muted);
    opacity:0;
    transform:translateY(6px);
    transition:opacity .45s ease, transform .45s ease;
    pointer-events:none;
    z-index:4;
  }

  .hint.show{
    opacity:1;
    transform:translateY(0);
  }

  .hint.left{
    left:6vw;
    top:50%;
  }

  .hint.right{
    right:6vw;
    top:50%;
    text-align:right;
  }

  .hint.back{
    left:50%;
    bottom:7vh;
    transform:translateX(-50%) translateY(6px);
    text-align:center;
  }

  .hint.back.show{
    transform:translateX(-50%) translateY(0);
  }

  .status{
    position:absolute;
    left:50%;
    top:7vh;
    transform:translateX(-50%);
    font-size:12px;
    letter-spacing:.16em;
    color:rgba(236,232,223,.45);
    z-index:4;
    transition:opacity .5s ease;
  }

  .status.hide{
    opacity:0;
  }

  .veil{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle at center, transparent 18%, rgba(0,0,0,.18) 72%, rgba(0,0,0,.45) 100%);
    z-index:1;
  }

  @media (max-width: 640px){
    .introText{
      font-size:clamp(18px, 5vw, 24px);
      line-height:2.05;
      max-height:72vh;
    }

    .bell{
      left:7vw;
      width:24px;
    }

    .sign{
      right:7vw;
      width:68px;
    }

    .paperZone{
      width:96px;
      height:110px;
    }
  }
</style>
</head>
<body>
  <main class="scene" aria-label="神隠しの後の入口">
    <div class="veil"></div>

    <div class="status" id="status">左へ、右へ、あるいは振り返る</div>

    <section class="intro" id="intro">
      <div class="introText">
気づくと、知らない場所に立っていた。

風はないのに、
どこかで何かが揺れている。

「……ここ、どこ？」

視線の先に、
いくつかの違和感がある。
      </div>
    </section>

    <div class="worldObject bell" id="bellObj" aria-hidden="true"></div>
    <div class="worldObject sign" id="signObj" aria-hidden="true"></div>
    <div class="worldObject paper" id="paperObj" aria-hidden="true"></div>

    <div class="hint left" id="hintLeft">鈴の音がする</div>
    <div class="hint right" id="hintRight">古びた看板がある</div>
    <div class="hint back" id="hintBack">足元に紙が落ちている</div>

    <button class="hotspot leftZone" id="goStory" aria-label="左へ向く。鈴の音がする方へ進む"></button>
    <button class="hotspot rightZone" id="goWorld" aria-label="右へ向く。古びた看板を読む"></button>
    <button class="hotspot backZone" id="turnBack" aria-label="振り返る"></button>
    <button class="hotspot paperZone" id="goGallery" aria-label="落ちている紙を見る"></button>
  </main>

<script>
  const intro = document.getElementById('intro');
  const status = document.getElementById('status');

  const bellObj = document.getElementById('bellObj');
  const signObj = document.getElementById('signObj');
  const paperObj = document.getElementById('paperObj');

  const hintLeft = document.getElementById('hintLeft');
  const hintRight = document.getElementById('hintRight');
  const hintBack = document.getElementById('hintBack');

  const goStory = document.getElementById('goStory');
  const goWorld = document.getElementById('goWorld');
  const turnBack = document.getElementById('turnBack');
  const goGallery = document.getElementById('goGallery');

  let turned = false;

  function softenIntro() {
    intro.classList.add('dim');
    status.classList.add('hide');
  }

  goStory.addEventListener('mouseenter', () => {
    bellObj.classList.add('show');
    hintLeft.classList.add('show');
    softenIntro();
  });

  goStory.addEventListener('mouseleave', () => {
    bellObj.classList.remove('show');
    hintLeft.classList.remove('show');
    if (!turned) {
      intro.classList.remove('dim');
      status.classList.remove('hide');
    }
  });

  goWorld.addEventListener('mouseenter', () => {
    signObj.classList.add('show');
    hintRight.classList.add('show');
    softenIntro();
  });

  goWorld.addEventListener('mouseleave', () => {
    signObj.classList.remove('show');
    hintRight.classList.remove('show');
    if (!turned) {
      intro.classList.remove('dim');
      status.classList.remove('hide');
    }
  });

  turnBack.addEventListener('mouseenter', () => {
    if (!turned) {
      hintBack.classList.add('show');
      softenIntro();
    }
  });

  turnBack.addEventListener('mouseleave', () => {
    if (!turned) {
      hintBack.classList.remove('show');
      intro.classList.remove('dim');
      status.classList.remove('hide');
    }
  });

  turnBack.addEventListener('click', () => {
    turned = true;
    intro.classList.add('dim');
    status.textContent = '落ちている紙に気づく';
    status.classList.remove('hide');

    hintBack.classList.add('show');
    paperObj.classList.add('show');
    goGallery.classList.add('active');
  });

  goGallery.addEventListener('mouseenter', () => {
    if (turned) {
      hintBack.textContent = '拾い上げて、見る';
    }
  });

  goGallery.addEventListener('mouseleave', () => {
    if (turned) {
      hintBack.textContent = '足元に紙が落ちている';
    }
  });

  goStory.addEventListener('click', () => {
    window.location.href = 'story.html';
  });

  goWorld.addEventListener('click', () => {
    window.location.href = 'worldbuilding.html';
  });

  goGallery.addEventListener('click', () => {
    window.location.href = 'gallery.html';
  });

  /* モバイル向けに軽い触覚的ヒント */
  function flashHint(targetObj, targetHint) {
    targetObj.classList.add('show');
    targetHint.classList.add('show');
    intro.classList.add('dim');
    setTimeout(() => {
      if (!turned || targetObj === paperObj) return;
      targetObj.classList.remove('show');
      targetHint.classList.remove('show');
      intro.classList.remove('dim');
    }, 900);
  }

  goStory.addEventListener('touchstart', () => flashHint(bellObj, hintLeft), { passive: true });
  goWorld.addEventListener('touchstart', () => flashHint(signObj, hintRight), { passive: true });
  turnBack.addEventListener('touchstart', () => {
    if (!turned) {
      hintBack.classList.add('show');
      intro.classList.add('dim');
    }
  }, { passive: true });
</script>
</body>
</html>
