<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>入口</title>
<style>
  :root{
    --bg-1:#0b0c10;
    --bg-2:#14161b;
    --text:#ece8df;
    --muted:rgba(236,232,223,.62);
    --line:rgba(236,232,223,.18);
    --soft:rgba(236,232,223,.08);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 42%, rgba(95,105,120,.08), transparent 34%),
      radial-gradient(circle at 50% 50%, #1a1d24 0%, var(--bg-2) 38%, var(--bg-1) 100%);
    color:var(--text);
    font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(to bottom, rgba(255,255,255,.03), transparent 20%, transparent 80%, rgba(255,255,255,.02)),
      radial-gradient(circle at 50% 20%, rgba(255,255,255,.03), transparent 24%);
    opacity:.55;
  }

  .scene{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    isolation:isolate;
  }

  .veil{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle at center, transparent 18%, rgba(0,0,0,.18) 72%, rgba(0,0,0,.45) 100%);
    z-index:1;
  }

  .intro{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:7vh 6vw;
    z-index:3;
    transition:opacity .7s ease, transform .7s ease, filter .7s ease;
  }

  .intro.dim{
    opacity:.2;
    filter:blur(1px);
    transform:scale(.985);
  }

  .introText{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    font-size:clamp(20px, 4.8vw, 30px);
    line-height:2.15;
    letter-spacing:.12em;
    max-height:76vh;
    white-space:pre-wrap;
    text-shadow:0 0 12px rgba(255,255,255,.05);
  }

  .tapStart{
    position:absolute;
    inset:0;
    z-index:8;
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    border:none;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  .tapGuide{
    position:absolute;
    bottom:7vh;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    letter-spacing:.16em;
    color:rgba(236,232,223,.52);
    transition:opacity .5s ease;
    pointer-events:none;
  }

  .tapStart.hidden{
    pointer-events:none;
  }

  .tapStart.hidden .tapGuide{
    opacity:0;
  }

  .choiceObjects{
    position:absolute;
    inset:0;
    z-index:4;
    pointer-events:none;
  }

  .choice{
    position:absolute;
    opacity:0;
    transform:translateY(10px);
    transition:opacity .55s ease, transform .55s ease, filter .55s ease;
    pointer-events:auto;
    background:transparent;
    border:none;
    color:var(--text);
    padding:0;
    margin:0;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  .choice.show{
    opacity:1;
    transform:translateY(0);
  }

  .choice:focus-visible{
    outline:1px solid rgba(255,255,255,.35);
    outline-offset:6px;
  }

  .choice .shape{
    position:relative;
    display:block;
    filter:drop-shadow(0 0 14px rgba(255,255,255,.03));
  }

  .choice .label{
    margin-top:10px;
    font-size:12px;
    letter-spacing:.12em;
    color:rgba(236,232,223,.72);
    white-space:nowrap;
    text-align:center;
    opacity:.9;
    transition:opacity .35s ease;
  }

  .choice.active .label{
    opacity:1;
  }

  /* 鈴 */
  .bellChoice{
    left:9vw;
    top:46%;
  }

  .bellShape{
    width:30px;
    height:90px;
  }

  .bellShape::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    width:1px;
    height:28px;
    background:rgba(255,255,255,.22);
    transform:translateX(-50%);
  }

  .bellShape::after{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    width:28px;
    height:40px;
    border:1px solid rgba(255,255,255,.30);
    border-radius:50% 50% 42% 42%;
    transform:translateX(-50%);
  }

  /* 看板 */
  .signChoice{
    right:8vw;
    top:42%;
  }

  .signShape{
    width:78px;
    height:124px;
  }

  .signShape::before{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    width:2px;
    height:74px;
    background:rgba(255,255,255,.20);
    transform:translateX(-50%);
  }

  .signShape::after{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    width:72px;
    height:46px;
    border:1px solid rgba(255,255,255,.24);
    transform:translateX(-50%) rotate(-2deg);
  }

  /* 紙 */
  .paperChoice{
    left:50%;
    bottom:12vh;
    transform:translateX(-50%) translateY(10px);
  }

  .paperChoice.show{
    transform:translateX(-50%) translateY(0);
  }

  .paperShape{
    width:74px;
    height:94px;
    border:1px solid rgba(255,255,255,.22);
    background:linear-gradient(to bottom, rgba(255,255,255,.04), rgba(255,255,255,.015));
    transform:rotate(-8deg);
  }

  .description{
    position:absolute;
    top:8vh;
    left:50%;
    transform:translateX(-50%);
    width:min(88vw, 420px);
    min-height:48px;
    text-align:center;
    font-size:13px;
    line-height:1.9;
    letter-spacing:.08em;
    color:var(--muted);
    z-index:6;
    opacity:0;
    transition:opacity .35s ease;
    pointer-events:none;
  }

  .description.show{
    opacity:1;
  }

  .description strong{
    display:block;
    font-weight:500;
    color:var(--text);
    margin-bottom:4px;
  }

  @media (max-width:640px){
    .introText{
      font-size:clamp(18px, 5vw, 24px);
      line-height:2.05;
      max-height:72vh;
    }

    .bellChoice{ left:7vw; }
    .signChoice{ right:7vw; }
  }
</style>
</head>
<body>
<main class="scene" aria-label="神隠しの後の入口">
  <div class="veil"></div>

  <section class="intro" id="intro">
    <div class="introText">
気づくと、知らない場所に立っていた。

風はないのに、
どこかで何かが揺れている。

「……ここ、どこ？」

視線の先に、
いくつかの違和感がある。
    </div>
  </section>

  <button class="tapStart" id="tapStart" aria-label="画面に触れる">
    <span class="tapGuide">触れる</span>
  </button>

  <div class="description" id="description" aria-live="polite"></div>

  <div class="choiceObjects" id="choiceObjects" aria-hidden="false">
    <button class="choice bellChoice" id="storyChoice" aria-label="鈴の音がする方へ">
      <span class="shape bellShape"></span>
      <span class="label">鈴</span>
    </button>

    <button class="choice signChoice" id="worldChoice" aria-label="古びた看板を読む">
      <span class="shape signShape"></span>
      <span class="label">看板</span>
    </button>

    <button class="choice paperChoice" id="galleryChoice" aria-label="落ちている紙を見る">
      <span class="shape paperShape"></span>
      <span class="label">紙</span>
    </button>
  </div>
</main>

<script>
  const tapStart = document.getElementById('tapStart');
  const intro = document.getElementById('intro');
  const description = document.getElementById('description');

  const storyChoice = document.getElementById('storyChoice');
  const worldChoice = document.getElementById('worldChoice');
  const galleryChoice = document.getElementById('galleryChoice');

  const choices = [storyChoice, worldChoice, galleryChoice];
  let started = false;
  let activeChoice = null;

  const choiceData = {
    storyChoice: {
      title: '鈴の音がする方へ',
      text: 'かすかに聞こえる音を追う。物語へ進む。',
      href: 'story.html'
    },
    worldChoice: {
      title: '古びた看板を読む',
      text: 'この場所について知る。世界観や資料を見る。',
      href: 'worldbuilding.html'
    },
    galleryChoice: {
      title: '落ちている紙を見る',
      text: '誰かが残したものに触れる。イラストや展示を見る。',
      href: 'gallery.html'
    }
  };

  function showChoices() {
    intro.classList.add('dim');
    tapStart.classList.add('hidden');
    choices.forEach((choice, i) => {
      setTimeout(() => choice.classList.add('show'), i * 120);
    });
    started = true;
  }

  function activateChoice(choice) {
    choices.forEach(c => c.classList.remove('active'));
    choice.classList.add('active');
    activeChoice = choice;

    const data = choiceData[choice.id];
    description.innerHTML = `<strong>${data.title}</strong>${data.text}`;
    description.classList.add('show');
  }

  function handleChoiceClick(choice) {
    if (!started) return;

    if (activeChoice !== choice) {
      activateChoice(choice);
      return;
    }

    const data = choiceData[choice.id];
    window.location.href = data.href;
  }

  tapStart.addEventListener('click', showChoices);

  choices.forEach(choice => {
    choice.addEventListener('click', () => handleChoiceClick(choice));
    choice.addEventListener('mouseenter', () => {
      if (started) activateChoice(choice);
    });
  });
</script>
</body>
</html>
