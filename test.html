<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg-color: #ffffff;
    --text-main: #333;
    --text-sub: #999;
    --accent: #a0c0e0;
  }

  body {
    background-color: var(--bg-color);
    margin: 0; padding: 0;
    font-family: "Hiragino Mincho ProN", serif;
    overflow-x: hidden;
  }

  .profile-container {
    display: flex;
    flex-direction: row-reverse; /* 右から左へ流れる */
    width: 100vw;
    height: 100vh;
    padding: 10vh 8vw;
    box-sizing: border-box;
    writing-mode: vertical-rl; /* 縦書きの継続 */
  }

  /* 名前：圧倒的な余白の中の核 */
  .name-section {
    margin-left: 5rem;
  }

  .name-main {
    font-size: 2.2rem;
    letter-spacing: 0.6em;
    font-weight: normal;
    color: var(--text-main);
  }

  .name-ruby {
    font-family: sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: var(--text-sub);
    margin-top: 1rem;
  }

  /* 記録の断片 */
  .data-fragments {
    display: flex;
    flex-direction: row;
    gap: 3rem;
    margin-right: 2rem;
  }

  .fragment-block {
    height: auto;
    max-height: 60vh;
  }

  .label {
    font-family: sans-serif;
    font-size: 0.6rem;
    color: var(--accent);
    margin-bottom: 2rem;
    letter-spacing: 0.2em;
  }

  .content {
    font-size: 0.85rem;
    line-height: 2.5;
    letter-spacing: 0.2em;
    color: var(--text-main);
  }

  /* イラスト：背景に溶け込ませる */
  .visual-area {
    position: fixed;
    left: 10vw;
    bottom: 0;
    width: 40vw;
    height: 80vh;
    z-index: -1;
    opacity: 0.6;
    /* 友人のイラストを想定したプレースホルダ */
    background: linear-gradient(to top, rgba(255,255,255,0), rgba(255,255,255,1));
    mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
  }

  /* アニメーション：プロローグと同じ「上から」 */
  .fade-down {
    animation: fadeDown 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }

  @keyframes fadeDown {
    0% { opacity: 0; transform: translateY(-20px); filter: blur(10px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
</style>
</head>
<body>

<div class="profile-container">
  <section class="name-section fade-down" style="animation-delay: 0.5s;">
    <h1 class="name-main">笹井 綾</h1>
    <div class="name-ruby">AYA SASAI</div>
  </section>

  <div class="data-fragments">
    <section class="fragment-block fade-down" style="animation-delay: 1.2s;">
      <div class="label">OBSERVATION_01</div>
      <div class="content">
        感情の起伏が、冬の海に似ている。<br>
        静かで、冷たく、けれど確実にそこに何かを隠している。
      </div>
    </section>

    <section class="fragment-block fade-down" style="animation-delay: 1.8s;">
      <div class="label">OBSERVATION_02</div>
      <div class="content">
        「私たちが、」<br>
        彼女がそう言ったとき、<br>
        世界がわずかに揺れた気がした。
      </div>
    </section>
  </div>

  <div class="visual-area">
    </div>
</div>

</body>
</html>
