<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Fragment // AYA</title>
<style>
  :root {
    --fog: rgba(210, 230, 255, 0.1);
    --accent: #b8dfff;
    --warn: #ffb8d1;
    --bg: #050810;
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: #eef;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    height: 100dvh; width: 100%;
    overflow: hidden;
  }

  /* --- 1. 幻想的な背景：揺らぐ霧 --- */
  .fog-wrapper {
    position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(circle at 50% 50%, #101a30 0%, #050810 100%);
  }

  .fog-aura {
    position: absolute;
    width: 150%; height: 150%;
    top: -25%; left: -25%;
    background: url('https://www.transparenttextures.com/patterns/p6.png'), 
                radial-gradient(circle at 30% 40%, rgba(100, 150, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(200, 100, 255, 0.05) 0%, transparent 50%);
    filter: blur(40px);
    animation: drift 20s infinite alternate ease-in-out;
  }

  @keyframes drift {
    from { transform: rotate(0deg) scale(1); }
    to { transform: rotate(5deg) scale(1.1); }
  }

  /* --- 2. 解析ログ：水面に広がるような波紋演出 --- */
  #terminal {
    height: 100dvh;
    padding: 50px 30px;
    box-sizing: border-box;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .log-line {
    font-size: 0.9rem;
    line-height: 1.8;
    letter-spacing: 0.15em;
    opacity: 0;
    filter: blur(10px);
    transform: translateY(10px);
    animation: rippleReveal 1.2s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  @keyframes rippleReveal {
    to { opacity: 1; filter: blur(0); transform: translateY(0); }
  }

  .loader-text {
    font-size: 0.7rem;
    color: var(--accent);
    opacity: 0.6;
    margin-bottom: -10px;
  }

  .accent { color: var(--accent); text-shadow: 0 0 15px rgba(184, 223, 255, 0.5); }
  .warn { color: var(--warn); text-shadow: 0 0 15px rgba(255, 184, 209, 0.4); }

  /* 彼女の画像：霧の中から現れる */
  .char-img {
    display: block;
    max-width: 80%;
    margin: 30px auto;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.1)) brightness(0.9);
    opacity: 0;
    mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    animation: apparition 3s 1s forwards ease-in-out;
  }

  @keyframes apparition {
    to { opacity: 1; filter: brightness(1.1) drop-shadow(0 0 40px rgba(255,255,255,0.15)); }
  }

  /* 最初の入り口 */
  #entry {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 1000;
    transition: opacity 2s ease;
  }

  .entry-msg {
    font-size: 0.9rem;
    letter-spacing: 0.4em;
    color: var(--accent);
    cursor: pointer;
    padding: 20px;
  }

</style>
</head>
<body>

<div class="fog-wrapper"><div class="fog-aura"></div></div>

<div id="entry" onclick="begin()">
  <div class="entry-msg">── 彼女の記憶に触れる</div>
</div>

<div id="terminal"></div>

<script>
  const terminal = document.getElementById('terminal');
  const entry = document.getElementById('entry');

  const scenario = [
    { type: "dim", text: "接続... 意識の深層セクターへ。" },
    { type: "accent", text: "対象特定：笹井 綾" },
    { type: "load", text: "Scanning Physical Data..." },
    { type: "normal", text: "22歳。145cm。柔らかな輪郭の奥に、冷徹な回路。" },
    { type: "load", text: "Analyzing Memories..." },
    { type: "warn", text: "注意：極度の方向把握困難。彼女は常に「迷子」の中にいる。" },
    { type: "warn", text: "警告：神隠しに似たデータの欠落を確認。境界が溶けている。" },
    { type: "load", text: "Restoring Visual Fragment..." },
    { type: "img", src: "assets/profile/aya2.PNG" },
    { type: "accent", text: "── 溶けて、そのまま雲隠れ。" }
  ];

  async function begin() {
    entry.style.opacity = '0';
    setTimeout(() => entry.style.display = 'none', 2000);

    for (const line of scenario) {
      const el = document.createElement('div');
      if (line.type === 'load') {
        el.className = 'loader-text';
        el.textContent = line.text;
      } else if (line.type === 'img') {
        const img = document.createElement('img');
        img.src = line.src;
        img.className = 'char-img';
        el.appendChild(img);
      } else {
        el.className = 'log-line ' + line.type;
        el.textContent = line.text;
      }
      
      terminal.appendChild(el);
      terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' });
      
      // 次の行へのウェイト（少しゆっくり、余韻を持たせて）
      await new Promise(r => setTimeout(r, line.type === 'load' ? 1200 : 2000));
    }
  }
</script>

</body>
</html>
