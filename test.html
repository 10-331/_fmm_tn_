<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg-color: #ffffff;
    --text-main: #333;
    --text-sub: #aaa;
    --accent: #a0c0e0;
  }

  body {
    background-color: var(--bg-color);
    margin: 0; padding: 0;
    font-family: "Hiragino Mincho ProN", serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }

  /* 画面全体のステージ */
  .profile-stage {
    position: relative;
    width: 100%; height: 100%;
    writing-mode: vertical-rl;
    padding: 10vh 5vw;
    box-sizing: border-box;
  }

  /* 【右】名前エリア */
  .name-block {
    position: absolute;
    right: 8vw;
    top: 15vh;
  }
  .name-main { font-size: 2.2rem; letter-spacing: 0.5em; }
  .name-id { font-family: sans-serif; font-size: 0.7rem; color: var(--text-sub); margin-top: 1rem; letter-spacing: 0.3em; }

  /* 【中央】浮遊するステータス（断片） */
  .status-fragment {
    position: absolute;
    font-size: 0.75rem;
    color: var(--text-sub);
    letter-spacing: 0.2em;
    opacity: 0;
  }
  /* 座標を散らして配置 */
  #stat-1 { top: 20vh; right: 25vw; }
  #stat-2 { top: 55vh; right: 35vw; }
  #stat-3 { top: 30vh; right: 45vw; }

  /* 【左】立ち絵と詳細テキスト */
  .visual-group {
    position: absolute;
    left: 5vw;
    bottom: 0;
    width: 45vw;
    height: 90vh;
    display: flex;
    align-items: flex-start;
  }

  .character-illust {
    height: 100%;
    width: auto;
    object-fit: contain;
    mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    opacity: 0.8;
  }

  .observation-log {
    margin-right: 2rem;
    height: 60vh;
    border-right: 1px solid #eee;
    padding-right: 1.5rem;
  }

  .log-label { font-family: sans-serif; font-size: 0.6rem; color: var(--accent); margin-bottom: 2rem; }
  .log-text { font-size: 0.85rem; line-height: 2.8; color: var(--text-main); }

  /* アニメーション：プロローグの「滲み落ち」を継承 */
  .fade-in-down {
    animation: fadeInDown 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes fadeInDown {
    0% { opacity: 0; transform: translateY(-15px); filter: blur(8px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
</style>
</head>
<body>

<div class="profile-stage">
  <div class="name-block fade-in-down" style="animation-delay: 0.5s;">
    <div class="name-main">笹井 綾</div>
    <div class="name-id">SUBJECT_AYA_0814</div>
  </div>

  <div class="status-fragment fade-in-down" id="stat-1" style="animation-delay: 1.2s;">
    <span style="color:var(--accent)">●</span> AGE: 19 / HEIGHT: 158cm
  </div>
  <div class="status-fragment fade-in-down" id="stat-2" style="animation-delay: 1.5s;">
    <span style="color:var(--accent)">●</span> HOBBY: CLOUD_WATCHING
  </div>
  <div class="status-fragment fade-in-down" id="stat-3" style="animation-delay: 1.8s;">
    <span style="color:var(--accent)">●</span> BIRTH: AUGUST_14
  </div>

  <div class="visual-group">
    <div class="observation-log fade-in-down" style="animation-delay: 2.2s;">
      <div class="log-label">OBSERVATION_RECORD</div>
      <div class="log-text">
        彼女は、自分を「溶けかけのアイスクリーム」に例えたことがある。<br>
        形を失っていくことを、恐怖ではなく、<br>
        ある種の救いのように感じているフシがある。
      </div>
    </div>
    
    <img src="aya_stand_illust.png" class="character-illust fade-in-down" style="animation-delay: 1s;" alt="笹井綾 立ち絵">
  </div>
</div>

</body>
</html>
