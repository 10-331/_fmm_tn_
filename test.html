<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BATTERY_CONNECT</title>
<style>
  :root { --bg: #f8faff; --accent: #8eb8ff; }
  body { margin: 0; background: var(--bg); font-family: "Hiragino Mincho ProN", serif; height: 100dvh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  
  #monitor {
    width: 250px; height: 120px; border: 1px solid #ddd;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: #fff; position: relative;
  }
  .loading-bar { width: 0%; height: 2px; background: var(--accent); position: absolute; bottom: 0; left: 0; transition: 1s; }
  #status-text { font-size: 0.7rem; color: #999; margin-top: 10px; }
  #battery-val { font-size: 2rem; color: var(--accent); font-weight: bold; }
  
  .scan-btn {
    margin-top: 30px; padding: 10px 20px; border: 1px solid var(--accent);
    background: none; color: var(--accent); cursor: pointer; font-size: 0.8rem;
  }
</style>
</head>
<body>

<div id="monitor">
  <div id="battery-val">--%</div>
  <div id="status-text">DEVICE_NOT_LINKED</div>
  <div class="loading-bar" id="bar"></div>
</div>

<button class="scan-btn" onclick="syncBattery()">[ 端末のバイオメトリクスを同期 ]</button>

<script>
async function syncBattery() {
  const valEl = document.getElementById('battery-val');
  const textEl = document.getElementById('status-text');
  const bar = document.getElementById('bar');

  textEl.textContent = "SYNCING...";
  bar.style.width = "100%";

  try {
    // getBatteryがサポートされているか確認
    if (navigator.getBattery) {
      const battery = await navigator.getBattery();
      updateUI(battery);
      
      // リアルタイム監視（充電器に刺した時など）
      battery.addEventListener('levelchange', () => updateUI(battery));
    } else {
      // iOSなどの非対応ブラウザへのフォールバック
      throw new Error("API_NOT_SUPPORTED");
    }
  } catch (e) {
    valEl.textContent = "ERR";
    valEl.style.color = "#ff8e8e";
    textEl.textContent = "アクセス拒否。ブラウザの制限を確認してください。";
  }
}

function updateUI(battery) {
  const level = Math.floor(battery.level * 100);
  document.getElementById('battery-val').textContent = level + "%";
  
  let comment = "";
  if (level > 80) comment = "「……十分だね。解析、続けよう」";
  else if (level > 20) comment = "「" + level + "%……。充電器、探したほうがいいかも」";
  else comment = "「消えちゃう……。急いで、記録を保存して」";
  
  document.getElementById('status-text').textContent = comment;
}
</script>
</body>
</html>
