<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    /* 横スクロールを許容する構成 */
    overflow-x: auto; 
    overflow-y: hidden;
    background: linear-gradient(90deg, #f8e9e9 0%, #f1ecf6 100%);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  }

  /* 横に長いコンテナ */
  .horizontal-wrapper {
    display: flex;
    width: 300vw; /* 3画面分くらいの長さ */
    height: 100vh;
  }

  /* セクション：縦書きプロローグ */
  .section-intro {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center; /* 水平中央 */
    align-items: flex-start; /* 上揃え */
    padding-top: 15vh;
  }

  .vertical-text {
    writing-mode: vertical-rl;
    line-height: 3;
    letter-spacing: 0.2em;
    color: #444;
    transition: opacity 1s ease;
  }

  .tag {
    margin-top: 3em;
    font-size: 0.8em;
    color: #88a0b8;
    font-family: sans-serif;
  }

  /* 次のセクション（例：現在のアーカイブ） */
  .section-main {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.2);
  }

</style>
</head>
<body>

<div class="horizontal-wrapper" id="scrollContainer">
  <section class="section-intro">
    <div class="vertical-text">
      <p>これは、</p>
      <p>迷子になった私を助けてくれた彼と</p>
      <p>たくさん笑って、ふざけあって、</p>
      <p>恋人になった私たちは</p>
      <br>
      <p>また、他人に戻るまでのお話。</p>
      <div class="tag">#溶けてそのまま雲隠れ</div>
    </div>
  </section>

  <section class="section-main">
    <div style="font-size: 0.9em; letter-spacing: 0.1em; color: #666;">
      [ ARCHIVE: 22yo / ENGINEER / HAMA ]
    </div>
  </section>
</div>

<script>
  window.addEventListener('load', () => {
    // 2秒待機
    setTimeout(() => {
      // 左（横方向）へスクロール開始
      // スムーズに1画面分(window.innerWidth)移動させる
      window.scrollTo({
        left: window.innerWidth,
        behavior: 'smooth'
      });
    }, 2000); 
  });
</script>

</body>
</html>
