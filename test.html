<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYA SASAI // ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Noto+Sans+JP:wght@300;600&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #fff9e6 0%, #ffffff 100%);
            --accent: #ffd700;
            --text: #2c2c2c;
            --glass: rgba(255, 255, 255, 0.7);
            --blur: 15px;
        }

        body.is-filler {
            --bg-gradient: radial-gradient(circle at center, #1a0505 0%, #000000 100%);
            --accent: #c71585;
            --text: #e0e0e0;
            --glass: rgba(0, 0, 0, 0.6);
            --blur: 20px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* 背景に溶け込む大きなタイポグラフィ */
        .bg-text {
            position: fixed;
            font-size: 15vw;
            font-weight: 900;
            opacity: 0.03;
            z-index: -1;
            white-space: nowrap;
            user-select: none;
        }

        /* グラスモルフィズムを採用したナビ */
        nav {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(var(--blur));
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1rem;
            transition: color 0.3s;
        }
        nav a:hover { color: var(--accent); }

        /* キャラクター配置：浮遊感 */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            align-items: center;
            padding: 0 10%;
        }

        .visual-area {
            position: relative;
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .standing-picture {
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.1));
            transition: all 1s ease;
        }

        /* 情報エリア：サクサク読める整理されたレイアウト */
        .content-area {
            padding-left: 5%;
            z-index: 10;
        }

        .content-area h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: -0.1rem;
        }

        .description {
            font-size: 1rem;
            line-height: 1.8;
            max-width: 400px;
            margin-top: 2rem;
            font-weight: 300;
        }

        /* 状態切り替えスイッチ（さりげなく、でも意図的に） */
        .world-shifter {
            position: fixed;
            bottom: 3rem;
            right: 3rem;
            width: 50px;
            height: 50px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        .world-shifter::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
        }
        .world-shifter:hover { background: var(--accent); box-shadow: 0 0 20px var(--accent); }

        /* ノイズエフェクト（Fillerモード時のみ） */
        .noise-overlay {
            position: fixed;
            inset: 0;
            background: url('https://loading.io/asset/521744') ; /* ダミー、実際はノイズ素材 */
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: overlay;
        }
        body.is-filler .noise-overlay { opacity: 0.05; }

    </style>
</head>
<body>

<div class="bg-text" id="bg-name">SASAI AYA</div>
<div class="noise-overlay"></div>

<nav>
    <a href="#about">ABOUT</a>
    <a href="#novel">NOVEL</a>
    <a href="#game">GAME</a>
    <a href="#data">DATA</a>
</nav>

<div class="main-container">
    <div class="visual-area">
        <img src="assets/img/aya_22.png" id="main-chara" class="standing-picture">
    </div>

    <div class="content-area">
        <div id="label" style="font-size: 0.8rem; color: var(--accent); font-weight: 600;">ACTIVE ENGINEER</div>
        <h1 id="name">笹井 綾</h1>
        <p class="description" id="bio">
            「思い立ったが吉日！」を地で行く、HAMAの新人エンジニア。<br>
            2055年の春、新しい名前と新しい人生を持って、この街にやってきた。
        </p>
    </div>
</div>

<div class="world-shifter" onclick="shiftWorld()"></div>

<script>
    function shiftWorld() {
        const body = document.body;
        const img = document.getElementById('main-chara');
        const name = document.getElementById('name');
        const bio = document.getElementById('bio');
        const label = document.getElementById('label');
        const bg = document.getElementById('bg-name');

        body.classList.toggle('is-filler');

        if(body.classList.contains('is-filler')) {
            img.src = 'assets/img/aya_filler.png';
            name.innerText = 'filler';
            label.innerText = 'RECOVERY TARGET';
            bio.innerHTML = '感情の異常発達を確認。回収対象。<br>360名の村から消失。名前は、もうない。';
            bg.innerText = '■■■■■■';
        } else {
            img.src = 'assets/img/aya_22.png';
            name.innerText = '笹井 綾';
            label.innerText = 'ACTIVE ENGINEER';
            bio.innerHTML = '「思い立ったが吉日！」を地で行く、HAMAの新人エンジニア。<br>2055年の春、新しい名前と新しい人生を持って、この街にやってきた。';
            bg.innerText = 'SASAI AYA';
        }
    }
</script>

</body>
</html>
