<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root { --bg: #000205; --line: rgba(142, 184, 255, 0.05); }
  body {
    margin: 0; background: var(--bg); color: #7889a0;
    font-family: "Courier New", "Yu Gothic", sans-serif;
    height: 100dvh; overflow: hidden; touch-action: none;
  }

  /* 1. 物理的な「走査線」と「モアレ」のシミュレーション */
  #overlay {
    position: fixed; inset: 0; z-index: 100; pointer-events: none;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 2px, 3px 100%;
  }

  /* 2. 深度のある背景：流体ノイズ */
  #canvas-container {
    position: fixed; inset: 0; filter: contrast(1.2) brightness(0.8);
    transition: filter 3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* 3. 無機質なシステムログ */
  #kernel-log {
    position: fixed; bottom: 20px; left: 20px;
    font-size: 10px; line-height: 1.4; opacity: 0.4;
    letter-spacing: 0.05em; z-index: 10;
  }

  /* 被写体：光の粒子として存在 */
  #subject {
    position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
    width: 90%; max-width: 300px; opacity: 0;
    filter: blur(40px) brightness(1.5);
    transition: opacity 5s, filter 5s;
    mix-blend-mode: screen;
  }
</style>
</head>
<body>

<div id="overlay"></div>
<div id="kernel-log"></div>

<div id="canvas-container">
  <img src="assets/profile/aya2.PNG" id="subject">
</div>

<script>
  const log = document.getElementById('kernel-log');
  const subject = document.getElementById('subject');
  const container = document.getElementById('canvas-container');
  
  let accessTimer;
  let isAccessing = false;

  // システムログの自動生成
  function addLog(msg) {
    const line = document.createElement('div');
    line.textContent = `[${new Date().toISOString().split('T')[1].slice(0,-1)}] ${msg}`;
    log.appendChild(line);
    if (log.childNodes.length > 8) log.removeChild(log.firstChild);
  }

  // ログインプロトコル（長押し）
  window.addEventListener('touchstart', (e) => {
    isAccessing = true;
    addLog("INTERRUPT_SIGNAL_RECEIVED...");
    addLog("SYNCHRONIZING_PHASE...");
    
    accessTimer = setTimeout(() => {
      if(isAccessing) {
        addLog("BOUNDARY_COLLAPSE_SUCCESS");
        subject.style.opacity = "0.7";
        subject.style.filter = "blur(2px) brightness(1.1)";
        container.style.filter = "contrast(1.0) brightness(1.0)";
        // 微細な振動
        shakeEffect();
      }
    }, 3000); // 3秒間の沈黙
  });

  window.addEventListener('touchend', () => {
    isAccessing = false;
    clearTimeout(accessTimer);
    addLog("CONNECTION_LOST_IMMEDIATELY");
    subject.style.opacity = "0";
    subject.style.filter = "blur(40px) brightness(1.5)";
    container.style.filter = "contrast(1.2) brightness(0.8)";
  });

  function shakeEffect() {
    if(!isAccessing) return;
    document.body.style.transform = `translate(${Math.random()*0.5}px, ${Math.random()*0.5}px)`;
    setTimeout(shakeEffect, 50);
  }

  // 初期ログ
  setInterval(() => {
    if(!isAccessing) addLog("STATUS: SEARCHING_FRAGMENTS...");
  }, 4000);
</script>
</body>
</html>
