<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: #fdfcf7; /* すべてを包み込む単一の色 */
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    color: #333;
  }

  .mv-stage {
    display: flex;
    flex-direction: row-reverse; /* 右（過去・導入）から左（未来・アーカイブ）へ */
    width: 400vw; /* 圧倒的な余白のための広大な横幅 */
    height: 100vh;
    position: absolute;
    right: 0;
    will-change: transform;
  }

  /* MVのカット（セクション） */
  section {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 20vh;
    box-sizing: border-box;
  }

  .vertical-lyrics {
    writing-mode: vertical-rl;
    line-height: 4.5;      /* 歌詞のようなゆったりとした行間 */
    letter-spacing: 0.4em; /* 一文字ずつを噛みしめる間隔 */
    font-size: 1.1rem;
  }

  /* 「私たちが」の後にくる、物理的かつ絶望的な空白 */
  .the-void {
    height: 60vh; 
    display: block;
  }

  .hashtag {
    margin-top: 10em;
    font-size: 0.8em;
    color: #b0b0b0;
    font-family: sans-serif;
    letter-spacing: 0.2em;
    opacity: 0.6;
  }

  /* 何も映らない、ただ時間が流れるだけの空間（MVの間の部分） */
  .spacer-cloud {
    width: 150vw; 
  }

  /* 最後に辿り着く、他人に戻った後のデータ */
  .section-end {
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* フェードイン演出 */
  .lyric-fade {
    animation: lyricAppear 5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }

  @keyframes lyricAppear {
    0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
</style>
</head>
<body>

<div class="mv-stage" id="camera">
  <section class="section-end">
    <div style="letter-spacing: 0.5em; color: #ccc; font-size: 0.8em;">
      AYA SASAI ARCHIVE // DATA LOADED.
    </div>
  </section>

  <div class="spacer-cloud"></div>

  <section class="lyric-fade">
    <div class="vertical-lyrics">
      <p>これは、</p>
      <p>迷子になった私を助けてくれた彼と</p>
      <p>たくさん笑って、ふざけあって、</p>
      <p>恋人になった私たちが</p>
      
      <span class="the-void"></span>
      
      <p>また、他人に戻るまでのお話。</p>
      <div class="hashtag">#溶けてそのまま雲隠れ</div>
    </div>
  </section>
</div>

<script>
  const camera = document.getElementById('camera');

  window.addEventListener('load', () => {
    // 最初の「私たちが」を読み終え、余韻に浸るまでの5秒
    setTimeout(() => {
      // 20秒かけて、視界から文字がフェードアウトし、
      // 長い空白を経て次のデータへ辿り着く「カメラワーク」
      camera.style.transition = "transform 20s cubic-bezier(0.37, 0, 0.63, 1)"; 
      camera.style.transform = "translateX(300vw)";
    }, 5000);
  });
</script>

</body>
</html>
