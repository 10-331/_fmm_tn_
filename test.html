<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>FRAGMENT_SCAN // AYA</title>
<style>
  :root {
    --bg: #fdfeff;
    --accent: #7abfff;
    --text: #4a5568;
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Mincho ProN", serif;
    height: 100%; width: 100%;
    overflow: hidden; touch-action: none; /* スクロールを禁止して干渉に集中 */
  }

  /* --- 背面：解析された「真実」のレイヤー --- */
  #underlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 40px;
    z-index: 1;
  }

  .char-img {
    max-width: 80%; height: auto;
    filter: brightness(1.1) saturate(0.8);
    mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
  }

  .secret-log {
    margin-top: 20px;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    line-height: 2;
    text-align: center;
    color: var(--accent);
  }

  /* --- 前面：白い霧（キャンバス） --- */
  #fogCanvas {
    position: fixed; inset: 0;
    z-index: 10;
    cursor: crosshair;
  }

  /* UI演出 */
  .guide {
    position: fixed; bottom: 40px; width: 100%;
    text-align: center; z-index: 20;
    font-size: 0.7rem; color: #aaa;
    letter-spacing: 0.3em;
    pointer-events: none;
    animation: blink 2s infinite;
  }

  @keyframes blink { 50% { opacity: 0.3; } }

  .side-code {
    position: fixed; top: 20px; left: 20px;
    font-family: monospace; font-size: 0.6rem;
    opacity: 0.2; z-index: 5;
  }
</style>
</head>
<body>

<div class="side-code">ERR_DATA_CORRUPTION // RECOVERING_VIA_TOUCH...</div>
<div class="guide">指先で、霧を拭ってください</div>

<div id="underlay">
  <img src="assets/profile/aya2.PNG" alt="Aya" class="char-img">
  <div class="secret-log">
    【 笹井 綾 / AYA_SASAI 】<br>
    エンジニア。22歳。<br>
    ── 霧が晴れても、彼女はそこにいない。
  </div>
</div>

<canvas id="fogCanvas"></canvas>

<script>
  const canvas = document.getElementById('fogCanvas');
  const ctx = canvas.getContext('2d');
  let isDrawing = false;

  // キャンバスサイズを画面に合わせる
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    fillFog();
  }

  // 霧（白いレイヤー）で塗りつぶす
  function fillFog() {
    ctx.fillStyle = '#fff'; // 完全に真っ白な霧
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // わずかに質感を出すためのノイズ（ダサさを消す隠し味）
    for (let i = 0; i < 500; i++) {
      ctx.fillStyle = `rgba(200, 220, 255, ${Math.random() * 0.05})`;
      ctx.beginPath();
      ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 「拭う」処理：透明な円を描く（destination-out）
  function scratch(x, y) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    // ぼかしを効かせて「柔らかく」拭う
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, 40);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = gradient;
    ctx.arc(x, y, 40, 0, Math.PI * 2);
    ctx.fill();
  }

  // イベントリスナー（スマホ・PC両対応）
  function getPos(e) {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }

  canvas.addEventListener('touchstart', (e) => { isDrawing = true; const p = getPos(e); scratch(p.x, p.y); });
  canvas.addEventListener('touchmove', (e) => { if (isDrawing) { const p = getPos(e); scratch(p.x, p.y); } });
  canvas.addEventListener('touchend', () => isDrawing = false);

  canvas.addEventListener('mousedown', (e) => { isDrawing = true; const p = getPos(e); scratch(p.x, p.y); });
  canvas.addEventListener('mousemove', (e) => { if (isDrawing) { const p = getPos(e); scratch(p.x, p.y); } });
  canvas.addEventListener('mouseup', () => isDrawing = false);

  window.addEventListener('resize', resize);
  resize();
</script>

</body>
</html>
