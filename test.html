<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SYS_RECOVERY // AYA</title>
<style>
  :root {
    --bg: #0d0d0d;
    --accent: #a8c1d9;
    --text: #fff;
  }

  html, body {
    margin: 0; padding: 0;
    font-family: monospace; /* エンジニアらしい無機質なフォント */
    background: var(--bg);
    color: var(--text);
    height: 100%; overflow: hidden;
    user-select: none; -webkit-touch-callout: none;
  }

  /* --- 背景：ノイズ混じりの彼女 --- */
  .visual-layer {
    position: fixed; inset: 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 1;
    transition: filter 0.5s ease, transform 0.5s ease;
    /* 初期状態：激しいノイズとボケ */
    filter: blur(20px) brightness(0.3) grayscale(1);
    transform: scale(1.1);
  }

  .char-img {
    height: 90%; width: auto; object-fit: contain;
    object-position: center 20%;
  }

  /* --- 修復中のUI層 --- */
  .ui-layer {
    position: relative; z-index: 10;
    height: 100%; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 20px; text-align: center;
    pointer-events: none; /* 下の長押しを邪魔しない */
  }

  .status-msg {
    font-size: 0.7rem; letter-spacing: 0.3em;
    color: var(--accent); margin-bottom: 10px;
    opacity: 0.8;
  }

  .hold-instruction {
    font-size: 0.9rem; border: 1px solid var(--accent);
    padding: 15px 30px; border-radius: 2px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; } 50% { opacity: 1; }
  }

  /* --- プロフィール：修復完了時に浮かび上がる --- */
  .profile-overlay {
    position: absolute; bottom: 15%; left: 0; width: 100%;
    opacity: 0; transform: translateY(20px);
    transition: all 0.6s ease;
  }

  .profile-data {
    display: inline-block; text-align: left;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    padding: 20px; border-left: 2px solid var(--accent);
    font-family: "Hiragino Mincho ProN", serif;
  }

  /* --- アクティブ状態（長押し中）の演出 --- */
  body.is-repairing .visual-layer {
    filter: blur(0) brightness(1) grayscale(0);
    transform: scale(1);
  }
  body.is-repairing .profile-overlay {
    opacity: 1; transform: translateY(0);
  }
  body.is-repairing .hold-instruction {
    display: none;
  }
</style>
</head>
<body>

<div class="visual-layer" id="visual">
  <img src="assets/profile/aya2.PNG" alt="Aya" class="char-img">
</div>

<div class="ui-layer">
  <div class="status-msg">MEMORY_ID: 2054_AYA_S</div>
  <div class="hold-instruction">長押しして修復</div>

  <div class="profile-overlay">
    <div class="profile-data">
      <div style="font-size: 1.2rem; margin-bottom: 10px;">笹井 綾 / AYA SASAI</div>
      <div style="font-size: 0.8rem; line-height: 1.8; opacity: 0.9;">
        AGE: 22<br>
        JOB: ENGINEER<br>
        MEMO: 極度の方向音痴。AIに詳しいが冷淡。<br>
        一部の記憶にノイズ。
      </div>
    </div>
  </div>
</div>

<script>
  const body = document.body;

  // スマホの長押し体験をJSで制御
  const startRepair = (e) => {
    e.preventDefault();
    body.classList.add('is-repairing');
  };

  const stopRepair = () => {
    body.classList.remove('is-repairing');
  };

  // タッチイベント（スマホ用）
  window.addEventListener('touchstart', startRepair);
  window.addEventListener('touchend', stopRepair);

  // マウスイベント（PC確認用）
  window.addEventListener('mousedown', startRepair);
  window.addEventListener('mouseup', stopRepair);
</script>

</body>
</html>
