<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Aya Sasai // Profile</title>
<style>
  :root {
    --bg-base: #fdfdfd;
    --accent: #e74c74;
    --text-main: #333;
    --glass: rgba(255, 255, 255, 0.7);
  }

  html, body {
    margin: 0; padding: 0;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background: var(--bg-base);
    color: var(--text-main);
    overflow-x: hidden;
  }

  /* 背景のグラデーションを薄く固定 */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: linear-gradient(180deg, #f8e9e9 0%, #f1ecf6 50%, #e8f0f8 100%);
    opacity: 0.5; z-index: -1;
  }

  /* --- 1. ビジュアル：画面いっぱいの存在感 --- */
  .hero-visual {
    width: 100%;
    height: 90vh; /* スマホで見たとき、少しだけ下のコンテンツが見える絶妙な高さ */
    position: relative;
    overflow: hidden;
    background: #fff;
    display: flex;
    justify-content: center;
  }

  .char-img {
    height: 110%; /* 縦長画像に合わせる */
    width: auto;
    object-fit: cover;
    object-position: center 15%; /* 最初は顔を中心に */
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.1));
    transition: transform 0.3s ease-out;
  }

  /* 画面に重なる名前（浮遊感） */
  .hero-name {
    position: absolute;
    bottom: 10%;
    left: 8%;
    z-index: 10;
    writing-mode: vertical-rl;
    letter-spacing: 0.5em;
  }
  .hero-name h1 { font-size: 1.8rem; font-weight: normal; margin: 0; text-shadow: 0 0 15px #fff; }
  .hero-name span { font-size: 0.7rem; opacity: 0.5; margin-top: 10px; letter-spacing: 0.2em; }

  /* --- 2. プロフィール部：下から迫り上がる「圧」 --- */
  .container {
    position: relative;
    z-index: 20;
    margin-top: -10vh; /* 画像に少し被せる */
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .profile-card {
    width: min(500px, 100%);
    background: var(--glass);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 20px 60px rgba(0,0,0,0.05);
    padding: 35px 25px;
    border-radius: 2px;
  }

  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding-bottom: 30px;
  }

  .status-item label {
    display: block;
    font-size: 0.6rem;
    color: #999;
    letter-spacing: 0.2em;
    margin-bottom: 5px;
  }

  .status-item span {
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }

  .bio-section {
    line-height: 2.1;
    font-size: 0.9rem;
    color: #444;
    text-align: justify;
  }

  /* 記憶の曖昧さへの導線 */
  .secret-trigger {
    display: inline-block;
    margin-top: 20px;
    font-size: 0.8rem;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 2px;
    opacity: 0.7;
    transition: 0.3s;
  }
  .secret-trigger:hover { opacity: 1; letter-spacing: 0.1em; }

  /* メニュー（元の位置を考慮しつつ最小限に） */
  .nav-btn {
    position: fixed; top: 20px; right: 20px;
    z-index: 100;
    mix-blend-mode: difference; /* 背景が白でも黒でも見える魔法 */
    cursor: pointer;
  }
  .nav-btn span { display: block; width: 25px; height: 1px; background: #fff; margin: 8px; }

  @media (max-width: 480px) {
    .hero-name h1 { font-size: 1.5rem; }
    .profile-card { padding: 30px 20px; }
    .status-grid { gap: 15px; }
  }
</style>
</head>
<body>

<div class="nav-btn"><span></span><span></span></div>

<section class="hero-visual">
  <img src="assets/profile/aya2.PNG" alt="Aya Sasai" class="char-img" id="heroImg">
  <div class="hero-name">
    <h1>笹井 綾</h1>
    <span>AYA SASAI</span>
  </div>
</section>

<div class="container">
  <article class="profile-card">
    <div class="status-grid">
      <div class="status-item"><label>BIRTH</label><span>09.20</span></div>
      <div class="status-item"><label>AGE</label><span>22</span></div>
      <div class="status-item"><label>HEIGHT</label><span>145cm</span></div>
      <div class="status-item"><label>OCCUPATION</label><span>Engineer</span></div>
      <div class="status-item" style="grid-column: span 2;"><label>PARTNER</label><span>叢雲 添</span></div>
    </div>

    <div class="bio-section">
      <p>転職に伴い、2054年の冬が終わる頃にHAMAにやってきた女性。メタバース企業に勤めているが、本人は技術には詳しく、方向音痴で、どこか浮世離れしている。
      <br><br>
      箱入り娘ゆえの世間知らずさと、AIに対する妙に冷めた視線。そのギャップの理由は、彼女自身も気づいていない「曖昧な記憶」にあるのかもしれない。</p>
      
      <a href="Secret.html" class="secret-trigger">▶ 記憶の深層へアクセス</a>
    </div>
  </article>
</div>

<footer>
  <p style="text-align: center; font-size: 0.7rem; color: #aaa; padding: 40px 0;">#溶けて、そのまま雲隠れ</p>
</footer>

<script>
  // スクロールに合わせて画像をわずかにズーム、または移動させる演出
  // これで「静止画」に「圧」が出る
  window.addEventListener('scroll', () => {
    const scroll = window.scrollY;
    const img = document.getElementById('heroImg');
    // 下にスクロールするほど、画像がゆっくり拡大される
    img.style.transform = `scale(${1 + scroll / 5000}) translateY(${scroll / 20}px)`;
  });
</script>

</body>
</html>
