<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>#溶けてそのまま雲隠れ</title>
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #333;
    --accent-blue: #a0c0e0;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: var(--bg-color);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  }

  #mv-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    box-sizing: border-box;
  }

  /* 各行の配置：MVのように少しずつ位置をずらして「間」を作る */
  .line {
    position: absolute;
    font-size: 0.85rem; /* さらに一回り小さく */
    letter-spacing: 0.2em;
    line-height: 1.8;
    white-space: nowrap;
    color: var(--text-color);
  }

  /* 配置の指定（MV的なレイアウト） */
  #l1 { top: 20%; left: 15%; }
  #l2 { top: 30%; left: 18%; }
  #l3 { top: 40%; left: 21%; }
  #l4 { top: 50%; left: 24%; }
  
  /* 最後の一文は少し離れた場所に、静かに */
  #l5 { top: 70%; left: 30%; }

  /* 一文字ずつの出現（上から滲み落ちる） */
  .char {
    display: inline-block;
    opacity: 0;
    filter: blur(6px);
    transform: translateY(-8px);
    transition: opacity 1.2s ease-out, filter 1.5s ease-out, transform 1.2s ease-out;
  }

  .char.is-visible {
    opacity: 1;
    filter: blur(0px);
    transform: translateY(0);
  }

  #to-archive {
    opacity: 0;
    text-decoration: none;
    color: #ccc;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    border-bottom: 1px solid #eee;
    padding-bottom: 4px;
    position: absolute;
    bottom: 8vh;
    right: 15%;
    transition: opacity 3s ease;
    font-family: sans-serif;
  }

  @media (max-width: 600px) {
    .line { font-size: 0.75rem; letter-spacing: 0.15em; }
    #l1 { left: 10%; }
    #l2 { left: 12%; }
    #l3 { left: 14%; }
    #l4 { left: 16%; }
    #l5 { left: 20%; }
  }
</style>
</head>
<body>

<div id="mv-stage">
  <div class="line" id="l1">これは、</div>
  <div class="line" id="l2">迷子になった私を助けてくれた彼と</div>
  <div class="line" id="l3">たくさん笑って、ふざけあって、</div>
  <div class="line" id="l4">恋人になった私たちが</div>
  
  <div class="line" id="l5">また、他人に戻るまでのお話。</div>

  <a href="archive.html" id="to-archive">ENTER_ARCHIVE</a>
</div>

<script>
  function splitText(elementId) {
    const el = document.getElementById(elementId);
    const text = el.innerText;
    el.innerHTML = '';
    text.split('').forEach(char => {
      const span = document.createElement('span');
      span.className = 'char';
      span.innerText = char;
      el.appendChild(span);
    });
  }

  async function animateLine(elementId, charSpeed = 70) {
    const el = document.getElementById(elementId);
    const chars = el.querySelectorAll('.char');
    for (let char of chars) {
      char.classList.add('is-visible');
      await new Promise(r => setTimeout(r, charSpeed));
    }
  }

  window.addEventListener('load', async () => {
    ['l1', 'l2', 'l3', 'l4', 'l5'].forEach(splitText);
    
    await new Promise(r => setTimeout(r, 1500)); 

    // 前の文章を残したまま、階段状に現れる
    await animateLine('l1', 100);
    await new Promise(r => setTimeout(r, 400));
    
    await animateLine('l2', 70);
    await new Promise(r => setTimeout(r, 400));
    
    await animateLine('l3', 70);
    await new Promise(r => setTimeout(r, 400));
    
    await animateLine('l4', 70);

    // 「私たちが」のあとの、ほどよい空白（MV的なテンポ）
    await new Promise(r => setTimeout(r, 2500)); 

    await animateLine('l5', 100);

    await new Promise(r => setTimeout(r, 1500));
    document.getElementById('to-archive').style.opacity = "1";
  });
</script>

</body>
</html>
