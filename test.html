<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#溶けてそのまま雲隠れ</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: #fdfcf7; /* ローディングから一貫した静かな色 */
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    color: #333;
  }

  .world-container {
    display: flex;
    flex-direction: row-reverse;
    width: 300vw; /* さらに広大な「間」を確保 */
    height: 100vh;
    position: absolute;
    right: 0;
    will-change: transform;
  }

  /* プロローグセクション */
  .section-prologue {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 15vh;
  }

  .vertical-text {
    writing-mode: vertical-rl;
    line-height: 4; /* 行間をさらに広げ、呼吸を深く */
    letter-spacing: 0.35em;
  }

  /* 「私たちが」から「他人に戻る」までの物理的な断絶 */
  .void-space {
    height: 50vh; /* 画面の半分以上を何もない空白に */
    display: block;
  }

  .tag {
    margin-top: 8em;
    font-size: 0.75em;
    color: #a0a0a0;
    font-family: sans-serif;
    letter-spacing: 0.1em;
  }

  /* 次の世界へ行くまでの広大な空白 */
  .section-spacer {
    width: 100vw; /* 1画面分まるごと「無」の空間 */
  }

  .section-archive {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .archive-placeholder {
    font-size: 0.8em;
    letter-spacing: 0.4em;
    color: #ccc;
    font-family: sans-serif;
  }

  /* 最初の出現もゆっくりと */
  .fade-in {
    animation: fadeInText 4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeInText {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="world-container" id="stage">
  <section class="section-archive">
    <div class="archive-placeholder">RECONSTRUCTION_IN_PROGRESS...</div>
  </section>

  <div class="section-spacer"></div>

  <section class="section-prologue fade-in">
    <div class="vertical-text">
      <p>これは、</p>
      <p>迷子になった私を助けてくれた彼と</p>
      <p>たくさん笑って、ふざけあって、</p>
      <p>恋人になった私たちが</p>
      
      <span class="void-space"></span>
      
      <p>また、他人に戻るまでのお話。</p>
      <div class="tag">#溶けてそのまま雲隠れ</div>
    </div>
  </section>
</div>

<script>
  const stage = document.getElementById('stage');

  window.addEventListener('load', () => {
    // 最初の文字を読ませる時間をたっぷりと（4.5秒）
    setTimeout(() => {
      // 12秒かけて、歩くよりも遅いスピードで世界を流す
      // cubic-bezierの数値を調整し、動き出しをさらに「ためる」
      stage.style.transition = "transform 12s cubic-bezier(0.4, 0, 0.2, 1)"; 
      stage.style.transform = "translateX(200vw)"; /* スペーサー分を含めて移動 */
    }, 4500);
  });
</script>

</body>
</html>
