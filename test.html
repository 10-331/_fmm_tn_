<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --bg-color: #ffffff;
    --text-main: #333;
    --text-sub: #888;
    --accent: #a0c0e0;
  }

  body {
    background-color: var(--bg-color);
    margin: 0; padding: 0;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }

  .profile-wrapper {
    display: flex;
    flex-direction: row-reverse;
    width: 100%;
    height: 100%;
  }

  /* 右側：テキストエリア（縦書き） */
  .text-content-area {
    writing-mode: vertical-rl;
    height: 100%;
    padding: 10vh 5vw;
    display: flex;
    flex-direction: row;
    flex-grow: 1;
    z-index: 20; /* 文字を画像より上に（重なる場合のみ） */
  }

  .section-symbol { margin-left: 5rem; flex-shrink: 0; }
  .name-large { font-size: 2.2rem; letter-spacing: 0.5em; line-height: 1.2; }
  .name-en { 
    writing-mode: horizontal-tb;
    font-family: sans-serif; font-size: 0.7rem; color: var(--text-sub); 
    margin-top: 1.2rem; letter-spacing: 0.3em; 
  }
  .catch-copy { margin-top: 2rem; font-size: 0.8rem; color: var(--text-sub); letter-spacing: 0.1em; }

  .section-status { margin-left: 4.5rem; border-right: 1px solid #f2f2f2; padding-right: 2.5rem; }
  .status-item { margin-bottom: 2.5rem; }
  .status-label { font-size: 0.6rem; color: var(--accent); margin-bottom: 1.2rem; display: block; font-family: sans-serif; }
  .status-value { font-size: 0.9rem; letter-spacing: 0.05em; }

  .section-story { margin-left: 3rem; max-width: 32vw; }
  .story-text { font-size: 0.88rem; line-height: 2.8; letter-spacing: 0.08em; text-align: justify; }

  .memory-link {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }

  /* 左側：立ち絵聖域 */
  .illust-area {
    width: 45vw;
    height: 100%;
    position: relative;
    flex-shrink: 0;
  }

  .illust-image {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 95vh;
    object-fit: contain;
    object-position: bottom left;
    /* 足元の透過処理 */
    mask-image: linear-gradient(to top, transparent, black 15%);
    -webkit-mask-image: linear-gradient(to top, transparent, black 15%);
    z-index: 10;
  }

  .fade {
    animation: fadeAnim 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  @keyframes fadeAnim {
    0% { opacity: 0; transform: translateY(-10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  footer {
    position: fixed; bottom: 25px; right: 35px;
    font-size: 0.75rem; color: #eee; letter-spacing: 0.2em;
    writing-mode: horizontal-tb;
  }
</style>
</head>
<body>

<div class="profile-wrapper">
  <div class="text-content-area">
    <header class="section-symbol fade" style="animation-delay: 0.4s;">
      <h1 class="name-large">笹井 綾</h1>
      <div class="name-en">SUBJECT_AYA_0814</div>
      <p class="catch-copy">今がすべての方向音痴なムードメーカー</p>
    </header>

    <div class="section-status fade" style="animation-delay: 1s;">
      <div class="status-item">
        <span class="status-label">BIRTH / AGE</span>
        <span class="status-value">08.14 / 19</span>
      </div>
      <div class="status-item">
        <span class="status-label">HEIGHT</span>
        <span class="status-value">158cm</span>
      </div>
      <div class="status-item">
        <span class="status-label">OCCUPATION</span>
        <span class="status-value">エンジニア</span>
      </div>
      <div class="status-item">
        <span class="status-label">PARTNER</span>
        <span class="status-value">叢雲 添</span>
      </div>
    </div>

    <div class="section-story fade" style="animation-delay: 1.6s;">
      <div class="story-text">
        転職に伴い、2054年の冬が終わる頃にHAMAへやってきた女性。
        メタバース企業に勤めているが、自部署は業務内容が異なるため関連知識は乏しい。<br><br>
        交友関係は広く外出も多いが、極度の方向音痴のため街中でよく途方に暮れている。
        一般常識に疎い箱入り娘だが、なぜかAIについては異様に博識。<br><br>
        <span class="memory-link" onclick="location.href='Secret.html'">一部の記憶が曖昧</span>だが、本人は「身軽でいい」と笑っている。
      </div>
    </div>
  </div>

  <div class="illust-area">
    <img src="assets/profile/aya2.PNG" class="illust-image fade" style="animation-delay: 0.8s;" alt="笹井 綾">
  </div>
</div>

<footer>#溶けてそのまま雲隠れ</footer>

</body>
</html>
