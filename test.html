<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #333;
    --menu-color: #999;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: var(--bg-color);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  }

  #mv-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    padding: 12vh 10vw;
    box-sizing: border-box;
    writing-mode: vertical-rl;
  }

  .line {
    display: inline-block;
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    line-height: 3.2;
    white-space: nowrap;
    color: var(--text-color);
    margin-left: 2.2rem;
    position: relative;
  }

  #l5 { margin-right: 4.5rem; }

  /* 文字のアニメーション（出現と溶解） */
  .char {
    display: inline-block;
    opacity: 0;
    filter: blur(8px);
    transform: translateY(-8px);
    transition: opacity 1.5s ease, filter 2s ease, transform 1.5s ease;
  }

  .char.is-visible {
    opacity: 1; filter: blur(0px); transform: translateY(0);
  }

  /* 溶けて消える時：上ではなく、さらに奥（あるいは下）へ沈む */
  .char.is-dissolving {
    opacity: 0 !important;
    filter: blur(12px) !important;
    transform: scale(0.9) translateY(10px) !important;
    transition: all 1.8s ease-in;
  }

  /* メニュー：プロローグの「跡地」に浮かび上がる */
  .menu-layer {
    writing-mode: horizontal-tb; /* メニューは読みやすく横書きで */
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 3rem;
    opacity: 0;
    transition: opacity 4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .nav-item {
    text-decoration: none;
    color: var(--menu-color);
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    font-family: sans-serif;
    position: relative;
    padding: 10px;
    transition: color 0.5s;
  }

  .nav-item:hover { color: #333; }

  @media (max-width: 600px) {
    #mv-stage { padding: 15vh 10vw; }
    .line { font-size: 0.8rem; line-height: 2.6; margin-left: 1.5rem; }
    #l5 { margin-right: 2rem; }
  }
</style>
</head>
<body>

<div id="mv-stage">
  <div class="line" id="l1">これは、</div>
  <div class="line" id="l2">迷子になった私を助けてくれた彼と</div>
  <div class="line" id="l3">たくさん笑って、ふざけあって、</div>
  <div class="line" id="l4">恋人になった私たちが</div>
  <div class="line" id="l5">また、他人に戻るまでのお話。</div>
</div>

<div class="menu-layer">
  <nav class="nav-list" id="main-nav">
    <a href="./novels.html" class="nav-item">NOVELS</a>
    <a href="./profile.html" class="nav-item">PROFILE</a>
    <a href="./gallery.html" class="nav-item">GALLERY</a>
  </nav>
</div>

<script>
  function splitText(elementId) {
    const el = document.getElementById(elementId);
    const text = el.innerText;
    el.innerHTML = '';
    text.split('').forEach(char => {
      const span = document.createElement('span');
      span.className = 'char';
      span.innerText = char;
      el.appendChild(span);
    });
  }

  async function animateLine(elementId, speed = 80) {
    const chars = document.getElementById(elementId).querySelectorAll('.char');
    for (let char of chars) {
      char.classList.add('is-visible');
      await new Promise(r => setTimeout(r, speed));
    }
  }

  window.addEventListener('load', async () => {
    ['l1', 'l2', 'l3', 'l4', 'l5'].forEach(splitText);
    await new Promise(r => setTimeout(r, 1500));

    // 1. プロローグの出現
    await animateLine('l1', 120); await new Promise(r => setTimeout(r, 500));
    await animateLine('l2', 90);  await new Promise(r => setTimeout(r, 500));
    await animateLine('l3', 90);  await new Promise(r => setTimeout(r, 500));
    await animateLine('l4', 90);
    await new Promise(r => setTimeout(r, 2000)); // 私たちの余韻
    await animateLine('l5', 130);

    // 2. 静かな余韻（読み終わった後の時間）
    await new Promise(r => setTimeout(r, 4000));

    // 3. 雲隠れ（文字が溶ける）
    const allChars = document.querySelectorAll('.char');
    allChars.forEach(char => char.classList.add('is-dissolving'));

    // 4. 現実の浮上（メニュー）
    await new Promise(r => setTimeout(r, 1500));
    const nav = document.getElementById('main-nav');
    nav.style.opacity = "1";
    nav.style.pointerEvents = "auto";
  });
</script>

</body>
</html>
