<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DEVICE_SYNC // AYA</title>
<style>
  :root { --bg: #f4f7f9; --accent: #8eb8ff; --text: #4a5568; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Hiragino Mincho ProN", serif;
    height: 100dvh; overflow: hidden; touch-action: none;
  }

  /* 重力で動くデータの破片 */
  .particle {
    position: absolute; width: 40px; height: 40px;
    background: rgba(142, 184, 255, 0.1);
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.5rem; pointer-events: none;
  }

  /* キャラクターメッセージ */
  #msg-box {
    position: fixed; bottom: 100px; width: 80%; left: 10%;
    background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
    padding: 20px; border-radius: 15px; border: 1px solid var(--accent);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    z-index: 100; opacity: 0; transform: translateY(20px);
    transition: 0.5s;
  }

  /* 画面全体のノイズ（シェイクで消える） */
  #noise-layer {
    position: fixed; inset: 0; z-index: 50;
    background: url('https://www.transparenttextures.com/patterns/p6.png');
    opacity: 0.3; pointer-events: none;
  }

  .status-bar {
    position: fixed; top: 20px; right: 20px; font-family: monospace; font-size: 0.7rem;
  }
</style>
</head>
<body>

<div id="noise-layer"></div>
<div class="status-bar" id="battery-ui">BATTERY: --%</div>

<div id="msg-box">
  <div id="char-name" style="font-size: 0.7rem; color: var(--accent); margin-bottom: 5px;">AYA_SASAI</div>
  <div id="text">......接続を確認。</div>
</div>

<script>
  const msgBox = document.getElementById('msg-box');
  const textEl = document.getElementById('text');
  const noise = document.getElementById('noise-layer');
  const batteryUi = document.getElementById('battery-ui');

  // 1. バッテリー読み取り & セリフ
  async function checkBattery() {
    if (!navigator.getBattery) return;
    const battery = await navigator.getBattery();
    const level = Math.floor(battery.level * 100);
    batteryUi.textContent = `BATTERY: ${level}%`;

    let quote = "";
    if (level > 80) quote = `${level}%......。元気な端末。これなら長時間の解析も耐えられそう。`;
    else if (level > 40) quote = `${level}%？ 中途半端......。今のうちに、充電するか悩むね。`;
    else quote = `残り${level}%......。消えちゃう前に、私を見つけて。`;
    
    showMsg(quote);
  }

  function showMsg(txt) {
    textEl.textContent = txt;
    msgBox.style.opacity = "1";
    msgBox.style.transform = "translateY(0)";
  }

  // 2. 重力シミュレーション（簡易版）
  const particles = [];
  function createParticles() {
    for(let i=0; i<5; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = "DATA";
      document.body.appendChild(p);
      particles.push({ el: p, x: Math.random()*300, y: Math.random()*500, vx: 0, vy: 0 });
    }
  }

  // 3. ジャイロ・加速度センサー（シェイク & 傾き）
  let lastX, lastY, lastZ;
  let moveCount = 0;

  window.addEventListener('devicemotion', (e) => {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;

    // 重力で粒子を動かす
    particles.forEach(p => {
      p.vx += acc.x * 0.1;
      p.vy -= acc.y * 0.1;
      p.x += p.vx; p.y += p.vy;
      // 壁バウンド
      if(p.x < 0 || p.x > window.innerWidth - 40) p.vx *= -0.5;
      if(p.y < 0 || p.y > window.innerHeight - 40) p.vy *= -0.5;
      p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
    });

    // シェイク検知（ノイズを飛ばす）
    let delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY);
    if (delta > 20) {
      moveCount++;
      if (moveCount > 5) {
        noise.style.opacity = "0"; // 振るとノイズが晴れる
        showMsg("......ん、端末を振った？ ノイズが、少し消えたみたい。");
        vibrate(50);
      }
    }
    lastX = acc.x; lastY = acc.y; lastZ = acc.z;
  });

  // バイブレーション（Android & 一部ブラウザ。iOSは現在制限が厳しい）
  function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  // 4. フリップ（画面を伏せるとリセット/隠す）
  window.addEventListener('deviceorientation', (e) => {
    if (Math.abs(e.beta) < 20 && Math.abs(e.gamma) < 20) {
        // 画面が水平（伏せられた/置かれた）
        msgBox.style.opacity = "0";
    }
  });

  // iOSのための権限リクエストボタン
  document.body.onclick = () => {
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission();
    }
    checkBattery();
    createParticles();
  };
</script>
</body>
</html>
