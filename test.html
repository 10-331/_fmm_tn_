<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPATIAL_SCAN // 0.0.1</title>
<style>
  :root { --bg: #fdfeff; --accent: #8eb8ff; }
  body {
    margin: 0; background: var(--bg); color: #4a5568;
    font-family: "Hiragino Mincho ProN", serif;
    height: 100dvh; width: 100vw; overflow: hidden; touch-action: none;
  }

  /* 360度空間のコンテナ（ジャイロで動く） */
  #stage {
    position: fixed; width: 300vw; height: 300vh;
    top: -100vh; left: -100vw;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s linear;
    pointer-events: none;
  }

  /* 背景のノイズ層（遠景） */
  .void-grid {
    position: absolute; inset: 0;
    background-image: 
      radial-gradient(circle at 50% 50%, rgba(142, 184, 255, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.5;
  }

  /* 彼女の断片（中景：特定の位置にのみ存在） */
  #subject-wrapper {
    position: absolute;
    transform: translate(60vw, -30vh); /* 初期位置を画面外にオフセット */
    text-align: center;
    filter: blur(15px); opacity: 0;
    transition: filter 2s, opacity 2s;
  }

  #subject-img {
    width: 280px; height: auto;
    mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
  }

  /* UI演出 */
  #reticle {
    position: fixed; top: 50%; left: 50%;
    width: 40px; height: 40px; border: 1px solid rgba(0,0,0,0.1);
    transform: translate(-50%, -50%); border-radius: 50%;
    z-index: 100; pointer-events: none;
  }

  #status-ui {
    position: fixed; bottom: 40px; left: 0; width: 100%;
    text-align: center; font-size: 0.65rem; letter-spacing: 0.3em;
    opacity: 0.4; z-index: 100;
  }

  /* 許可ボタン（iOS Safari用） */
  #permission-overlay {
    position: fixed; inset: 0; background: #fff; z-index: 1000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .btn {
    padding: 15px 30px; border: 1px solid var(--accent); color: var(--accent);
    background: none; letter-spacing: 0.2em; font-size: 0.8rem;
  }
</style>
</head>
<body>

<div id="permission-overlay">
  <div style="margin-bottom: 30px; font-size: 0.7rem; color: #999;">ENVIRONMENTAL_SCAN_START</div>
  <button class="btn" onclick="requestAccess()">観測を開始する</button>
</div>

<div id="reticle"></div>
<div id="status-ui">SEARCHING_FOR_SIGNALS... <span id="coords">0, 0</span></div>

<div id="stage">
  <div class="void-grid"></div>
  <div id="subject-wrapper">
    <img src="assets/profile/aya2.PNG" id="subject-img">
    <div style="margin-top: 10px; font-size: 0.8rem; letter-spacing: 0.2em; color: var(--accent);">
      DETECTED: AYA_SASAI
    </div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const wrapper = document.getElementById('subject-wrapper');
  const coordText = document.getElementById('coords');
  const statusText = document.getElementById('status-ui');

  function requestAccess() {
    // iOS Safariでのジャイロ許可
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(permissionState => {
          if (permissionState === 'granted') {
            initSensor();
          }
        });
    } else {
      initSensor();
    }
    document.getElementById('permission-overlay').style.display = 'none';
  }

  function initSensor() {
    window.addEventListener('deviceorientation', (e) => {
      // 端末の傾きを移動量に変換
      const x = e.gamma; // 左右 (-90 to 90)
      const y = e.beta;  // 前後 (-180 to 180)
      
      // ステージを動かす（感度調整）
      const moveX = x * 10;
      const moveY = (y - 45) * 10; // 45度くらいを水平の基準にする
      
      stage.style.transform = `translate(${-moveX}px, ${-moveY}px)`;
      coordText.textContent = `${Math.floor(x)}, ${Math.floor(y)}`;

      // 彼女のいる座標（60vw, -30vh周辺）に近づいたら「発見」演出
      checkDetection(x, y);
    });
  }

  function checkDetection(x, y) {
    // 特定の角度範囲に入ったら
    if (x > 15 && x < 40 && y > 10 && y < 35) {
      wrapper.style.filter = "blur(0px)";
      wrapper.style.opacity = "1";
      statusText.innerHTML = "<span style='color:var(--accent)'>SIGNAL_LOCKED // 笹井 綾 を捕捉</span>";
    } else {
      wrapper.style.filter = "blur(15px)";
      wrapper.style.opacity = "0.2";
      statusText.textContent = "SEARCHING_FOR_SIGNALS...";
    }
  }
</script>

</body>
</html>
