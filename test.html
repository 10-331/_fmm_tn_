<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>OBSERVATION_UNIT_01</title>
<style>
  :root {
    --bg: #fdfeff;
    --accent: #8eb8ff;
    --warn: #ff8e8e;
  }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100dvh;
    background: var(--bg); color: #444;
    font-family: "Hiragino Mincho ProN", serif;
    overflow: hidden; touch-action: none;
  }

  /* 1. ジャイロ連動レイヤー（パララックス） */
  #world {
    position: fixed; inset: 0;
    display: flex; justify-content: center; align-items: center;
    transition: transform 0.1s ease-out;
  }

  /* 彼女の姿（中景） */
  .subject {
    position: absolute; width: 80%; height: auto;
    filter: brightness(1.1) contrast(0.9);
    mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
    z-index: 2;
    transition: transform 0.2s ease-out;
  }

  /* 解析ログ（遠景） */
  #log-stream {
    position: absolute; width: 100%; height: 100%;
    padding: 20px; box-sizing: border-box;
    font-family: monospace; font-size: 0.6rem; color: var(--accent);
    opacity: 0.3; z-index: 1;
    display: flex; flex-direction: column; gap: 4px;
  }

  /* 2. 前面の霧（スクラッチ用） */
  #fogCanvas {
    position: fixed; inset: 0; z-index: 10;
  }

  /* 3. 長押しゲージ */
  #hold-ring {
    position: fixed; width: 80px; height: 80px;
    border: 2px solid var(--accent); border-radius: 50%;
    display: none; z-index: 100; pointer-events: none;
    transform: translate(-50%, -50%);
  }
  #hold-fill {
    width: 100%; height: 100%; background: var(--accent);
    border-radius: 50%; transform: scale(0); opacity: 0.3;
  }

  /* ガイド表示 */
  .ui-overlay {
    position: fixed; bottom: 30px; width: 100%;
    text-align: center; z-index: 50;
    font-size: 0.7rem; letter-spacing: 0.2em; color: #999;
  }
</style>
</head>
<body>

<div id="log-stream"></div>

<div id="world">
  <img src="assets/profile/aya2.PNG" class="subject" id="subject">
</div>

<canvas id="fogCanvas"></canvas>

<div id="hold-ring"><div id="hold-fill"></div></div>

<div class="ui-overlay" id="guide">
  傾けて覗き、指で霧を払い、<br>彼女を長押しして解析を完遂せよ
</div>

<script>
  const canvas = document.getElementById('fogCanvas');
  const ctx = canvas.getContext('2d');
  const subject = document.getElementById('subject');
  const logStream = document.getElementById('log-stream');
  const ring = document.getElementById('hold-ring');
  const fill = document.getElementById('hold-fill');
  const guide = document.getElementById('guide');

  let isTouching = false;
  let holdTimer = null;
  let holdProgress = 0;

  // 初期化
  function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 背景ログのダミー生成
    for(let i=0; i<50; i++) {
      const line = document.createElement('div');
      line.textContent = `SCANNING_SECTOR_${Math.random().toString(16).substr(2,5)}... OK`;
      logStream.appendChild(line);
    }
  }

  // 1. スクラッチ演出
  function scratch(x, y) {
    ctx.globalCompositeOperation = 'destination-out';
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 40);
    grad.addColorStop(0, 'rgba(255,255,255,1)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, 40, 0, Math.PI*2);
    ctx.fill();
  }

  // 2. ジャイロ（傾き）連動
  window.addEventListener('deviceorientation', (e) => {
    const x = e.beta / 5;  // 前後
    const y = e.gamma / 5; // 左右
    subject.style.transform = `translate(${y}px, ${x}px) scale(1.05)`;
    logStream.style.transform = `translate(${-y}px, ${-x}px)`;
  });

  // 3. 長押し解析
  function startHold(x, y) {
    ring.style.display = 'block';
    ring.style.left = x + 'px';
    ring.style.top = y + 'px';
    holdProgress = 0;
    
    holdTimer = setInterval(() => {
      holdProgress += 2;
      fill.style.transform = `scale(${holdProgress / 100})`;
      if (holdProgress >= 100) {
        completeAnalysis();
        clearInterval(holdTimer);
      }
    }, 20);
  }

  function completeAnalysis() {
    guide.innerHTML = "<span style='color:var(--accent)'>ANALYSIS COMPLETE: 笹井 綾 を観測しました</span>";
    document.body.style.backgroundColor = "#eef4ff";
    // 画面全体をクリアにする
    ctx.clearRect(0,0,canvas.width, canvas.height);
  }

  function stopHold() {
    clearInterval(holdTimer);
    ring.style.display = 'none';
    fill.style.transform = `scale(0)`;
  }

  // イベント登録
  canvas.addEventListener('touchstart', (e) => {
    isTouching = true;
    const p = e.touches[0];
    scratch(p.clientX, p.clientY);
    startHold(p.clientX, p.clientY);
  });

  canvas.addEventListener('touchmove', (e) => {
    if(!isTouching) return;
    const p = e.touches[0];
    scratch(p.clientX, p.clientY);
    // 動いたら長押しキャンセル（精密な操作を要求）
    if (holdProgress < 90) stopHold(); 
  });

  canvas.addEventListener('touchend', stopHold);

  window.onload = init;
</script>
</body>
</html>
