<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#溶けてそのまま雲隠れ // ARCHIVE</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #f8e9e9 0%, #f1ecf6 100%);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    color: #333;
  }

  /* 右方向にコンテンツを広げるため、
     flex-directionをrow-reverseにするか、配置を工夫します。
  */
  .world-container {
    display: flex;
    flex-direction: row-reverse; /* 右側に「次」を配置 */
    width: 200vw;
    height: 100vh;
    position: absolute;
    right: 0; /* 最初は右端（プロローグ）を表示 */
    will-change: transform;
  }

  /* セクション：プロローグ */
  .section-prologue {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 15vh;
  }

  .vertical-text {
    writing-mode: vertical-rl;
    line-height: 3;
    letter-spacing: 0.25em;
  }

  .tag {
    margin-top: 4em;
    font-size: 0.8em;
    color: #88a0b8;
    font-family: sans-serif;
  }

  /* セクション：メインアーカイブ（プロローグの右側に隠れている） */
  .section-archive {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.2);
  }

  .archive-placeholder {
    font-size: 0.9em;
    letter-spacing: 0.2em;
    color: #999;
  }
</style>
</head>
<body>

<div class="world-container" id="stage">
  <section class="section-archive">
    <div class="archive-placeholder">
      [ SCROLL_TO_DATA... ]
    </div>
  </section>

  <section class="section-prologue">
    <div class="vertical-text">
      <p>これは、</p>
      <p>迷子になった私を助けてくれた彼と</p>
      <p>たくさん笑って、ふざけあって、</p>
      <p>恋人になった私たちは</p>
      <br>
      <p>また、他人に戻るまでのお話。</p>
      <div class="tag">#溶けてそのまま雲隠れ</div>
    </div>
  </section>
</div>

<script>
  const stage = document.getElementById('stage');

  window.addEventListener('load', () => {
    // 2秒の「静寂」
    setTimeout(() => {
      // 右方向（正の方向）へ滑らかにスライド
      // ease-in-out を使うことで、動き出しと止まり際に「しなり」を持たせる
      stage.style.transition = "transform 4.5s cubic-bezier(0.45, 0, 0.55, 1)"; 
      stage.style.transform = "translateX(100vw)";
    }, 2000);
  });
</script>

</body>
</html>
