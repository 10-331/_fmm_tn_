<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>個体識別ログ // 笹井 綾</title>
<style>
  :root {
    --bg: #0a0c10;
    --accent: #50b7f5; /* 落ち着いた解析ブルー */
    --warning: #f5a623;
    --text: #e0e0e0;
  }

  html, body {
    margin: 0; padding: 0;
    font-family: "Hiragino Sans", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh; width: 100%;
    overflow: hidden;
    user-select: none; -webkit-touch-callout: none;
  }

  /* グリッド背景 */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: 
      linear-gradient(rgba(80, 183, 245, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(80, 183, 245, 0.05) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: -1;
  }

  #terminal {
    height: 100dvh;
    padding: 30px 20px 120px;
    box-sizing: border-box;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-line {
    font-size: 0.85rem;
    line-height: 1.6;
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateY(10px);
    animation: reveal 0.3s ease forwards;
    border-left: 2px solid transparent;
    padding-left: 10px;
  }

  @keyframes reveal {
    to { opacity: 1; transform: translateY(0); }
  }

  /* 解析状態に応じた色分け */
  .info { border-left-color: var(--accent); color: var(--accent); }
  .warn { border-left-color: var(--warning); color: var(--warning); font-weight: bold; }
  .data { border-left-color: #fff; background: rgba(255,255,255,0.05); padding: 10px; }

  .char-img {
    display: block;
    max-width: 90%;
    margin: 15px auto;
    filter: drop-shadow(0 0 10px var(--accent));
    opacity: 0.9;
    border: 1px solid rgba(80, 183, 245, 0.3);
  }

  .guide {
    position: fixed;
    bottom: 25px; left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #000;
    padding: 10px 30px;
    font-size: 0.8rem;
    font-weight: bold;
    border-radius: 2px;
    z-index: 1000;
    box-shadow: 0 0 20px rgba(80, 183, 245, 0.5);
  }
</style>
</head>
<body>

<div id="terminal">
  <div class="log-line info">システム起動... 接続完了。</div>
  <div class="log-line info">対象個体の外部データをスキャン中。</div>
</div>

<div class="guide" id="guide">画面をタップして解析</div>

<script>
  const terminal = document.getElementById('terminal');
  const guide = document.getElementById('guide');
  
  const logData = [
    { text: ">>> データベース照合中...", type: "info" },
    { text: "対象を特定：笹井 綾（AYA SASAI）", type: "data" },
    { text: "年齢：22歳 / 身長：145cm", type: "data" },
    { text: "職業：エンジニア（HAMAメタバース関連企業）", type: "data" },
    { text: ">>> 傾向分析を開始...", type: "info" },
    { text: "特記事項：極度の方向音痴。ナビゲーション能力に欠陥あり。", type: "warn" },
    { text: "特記事項：AI技術への深い造詣を確認。ただし、対ペットロボットへの反応は「冷淡」と記録あり。", type: "warn" },
    { text: "注意：セクターCにおける記憶データに著しい欠落（ノイズ）を検出。", type: "warn" },
    { text: ">>> 視覚情報を復元します...", type: "info" },
    { isImage: true, src: "assets/profile/aya2.PNG" },
    { text: "全ての情報の抽出が完了しました。接続を維持します。", type: "info" }
  ];

  let current = 0;

  function next() {
    if (current >= logData.length) {
      guide.textContent = "解析完了";
      guide.style.background = "#555";
      return;
    }

    const item = logData[current];
    const div = document.createElement('div');
    div.className = 'log-line ' + (item.type || '');

    if (item.isImage) {
      const img = document.createElement('img');
      img.src = item.src;
      img.className = 'char-img';
      div.appendChild(img);
    } else {
      div.textContent = item.text;
    }

    terminal.appendChild(div);
    terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' });
    current++;
  }

  document.body.addEventListener('touchstart', (e) => { e.preventDefault(); next(); }, { passive: false });
  document.body.addEventListener('mousedown', next);
</script>
</body>
</html>
