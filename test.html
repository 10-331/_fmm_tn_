<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>#溶けてそのまま雲隠れ</title>
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #333;
    --accent-blue: #a0c0e0;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: var(--bg-color);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  }

  /* 画面全体を小説の1ページのように扱う */
  #mv-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    padding: 10vh 10vw;
    box-sizing: border-box;
    /* 縦書き設定：右から左へ行が進む */
    writing-mode: vertical-rl;
  }

  .line {
    display: inline-block;
    font-size: 0.85rem; /* 小さく、儚く */
    letter-spacing: 0.3em;
    line-height: 3;    /* 行間を広げて余白を強調 */
    white-space: nowrap;
    color: var(--text-color);
    margin-left: 2rem; /* 行同士の物理的な距離 */
  }

  /* 特定の行にだけ特別な余白（「私たちが」の後の空白） */
  #l5 {
    margin-right: 4rem; /* 縦書きなので右側に余白を作る＝前の行との間を空ける */
  }

  /* 一文字ずつの出現アニメーション（上から滲み落ちる） */
  .char {
    display: inline-block;
    opacity: 0;
    filter: blur(6px);
    transform: translateY(-10px);
    transition: opacity 1.5s ease-out, filter 2s ease-out, transform 1.5s ease-out;
  }

  .char.is-visible {
    opacity: 1;
    filter: blur(0px);
    transform: translateY(0);
  }

  #to-archive {
    writing-mode: horizontal-tb; /* ボタンは横書き */
    opacity: 0;
    text-decoration: none;
    color: #ccc;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    border-bottom: 1px solid #eee;
    padding-bottom: 4px;
    position: absolute;
    bottom: 8vh;
    left: 10vw; /* 縦書きの終わり（左側）に配置 */
    transition: opacity 3s ease;
    font-family: sans-serif;
  }

  @media (max-width: 600px) {
    #mv-stage { padding: 12vh 8vw; }
    .line { font-size: 0.8rem; line-height: 2.5; margin-left: 1.2rem; }
    #l5 { margin-right: 2.5rem; }
  }
</style>
</head>
<body>

<div id="mv-stage">
  <div class="line" id="l1">これは、</div>
  <div class="line" id="l2">迷子になった私を助けてくれた彼と</div>
  <div class="line" id="l3">たくさん笑って、ふざけあって、</div>
  <div class="line" id="l4">恋人になった私たちが</div>
  
  <div class="line" id="l5">また、他人に戻るまでのお話。</div>

  <a href="archive.html" id="to-archive">ENTER_ARCHIVE</a>
</div>

<script>
  function splitText(elementId) {
    const el = document.getElementById(elementId);
    const text = el.innerText;
    el.innerHTML = '';
    text.split('').forEach(char => {
      const span = document.createElement('span');
      span.className = 'char';
      span.innerText = char;
      el.appendChild(span);
    });
  }

  async function animateLine(elementId, charSpeed = 80) {
    const el = document.getElementById(elementId);
    const chars = el.querySelectorAll('.char');
    for (let char of chars) {
      char.classList.add('is-visible');
      await new Promise(r => setTimeout(r, charSpeed));
    }
  }

  window.addEventListener('load', async () => {
    // 1. テキスト分解
    ['l1', 'l2', 'l3', 'l4', 'l5'].forEach(splitText);
    
    // 2. 最初の静寂
    await new Promise(r => setTimeout(r, 1500)); 

    // 3. 右上から順に、前の文字を残したまま現れる
    await animateLine('l1', 120);
    await new Promise(r => setTimeout(r, 600));
    
    await animateLine('l2', 90);
    await new Promise(r => setTimeout(r, 600));
    
    await animateLine('l3', 90);
    await new Promise(r => setTimeout(r, 600));
    
    await animateLine('l4', 90);

    // 4. 「私たちが」のあとの、少しだけ長い沈黙
    await new Promise(r => setTimeout(r, 2000)); 

    // 5. 左下（縦書きの終端）に向かって最後の一文
    await animateLine('l5', 130);

    // 6. 余韻のあと、ボタンを表示
    await new Promise(r => setTimeout(r, 2500));
    document.getElementById('to-archive').style.opacity = "1";
  });
</script>

</body>
</html>
