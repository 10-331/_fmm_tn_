<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #333;
    --accent-blue: #a0c0e0;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: var(--bg-color);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  }

  #mv-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .lyrics-container {
    writing-mode: vertical-rl;
    font-size: 1.1rem;
    letter-spacing: 0.35em;
    line-height: 2.8;
    height: 65vh;
    opacity: 0;
    position: absolute;
    transition: opacity 0.8s ease-in-out; /* 消える時は少し早めに */
    white-space: nowrap;
    pointer-events: none;
  }

  .is-active { opacity: 1; }

  /* 一文字ずつの出現アニメーション（速度向上） */
  .char {
    display: inline-block;
    opacity: 0;
    filter: blur(4px);
    transform: translateY(3px);
    transition: opacity 0.8s ease-out, filter 0.8s ease-out, transform 0.8s ease-out;
  }

  .char.is-visible {
    opacity: 1;
    filter: blur(0px);
    transform: translateY(0);
  }

  /* 「私たちが」の後の空白：物理的な距離 */
  .the-void {
    display: block;
    height: 15rem; 
  }

  #to-archive {
    opacity: 0;
    text-decoration: none;
    color: #ccc;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    border-bottom: 1px solid #eee;
    padding-bottom: 4px;
    position: absolute;
    bottom: 8vh;
    transition: opacity 2s ease;
    font-family: sans-serif;
  }

  @media (max-width: 600px) {
    .lyrics-container { font-size: 1.05rem; line-height: 2.4; }
  }
</style>
</head>
<body>

<div id="mv-stage">
  <div class="lyrics-container" id="l1">これは、</div>
  <div class="lyrics-container" id="l2">迷子になった私を助けてくれた彼と</div>
  <div class="lyrics-container" id="l3">たくさん笑って、ふざけあって、</div>
  <div class="lyrics-container" id="l4">恋人になった私たちが</div>
  <div class="lyrics-container" id="l5">また、他人に戻るまでのお話。</div>
  <a href="archive.html" id="to-archive">ENTER_ARCHIVE</a>
</div>

<script>
  function splitText(elementId) {
    const el = document.getElementById(elementId);
    const text = el.innerText;
    el.innerHTML = '';
    text.split('').forEach(char => {
      const span = document.createElement('span');
      span.className = 'char';
      span.innerText = char;
      el.appendChild(span);
    });
  }

  async function showLine(elementId, charSpeed = 120, lineWait = 1200) {
    const el = document.getElementById(elementId);
    const chars = el.querySelectorAll('.char');
    el.classList.add('is-active');
    
    for (let char of chars) {
      char.classList.add('is-visible');
      await new Promise(r => setTimeout(r, charSpeed)); // 1文字出す速度
    }
    await new Promise(r => setTimeout(r, lineWait)); // 出し切った後の「間」
    el.classList.remove('is-active');
    await new Promise(r => setTimeout(r, 600)); // 消えてから次に行くまでの「間」
  }

  window.addEventListener('load', async () => {
    ['l1', 'l2', 'l3', 'l4', 'l5'].forEach(splitText);
    
    await new Promise(r => setTimeout(r, 1000)); // 起動時の静寂

    await showLine('l1', 100, 800);
    await showLine('l2', 80, 1000);
    await showLine('l3', 80, 1000);
    await showLine('l4', 80, 1500); // 「私たちが」

    // 【重要】ここが二人の空白
    // 物理的な距離はCSS（the-void）ではなく、この「時間」で表現
    await new Promise(r => setTimeout(r, 4500)); 

    await showLine('l5', 120, 3000); // 最後は少しだけ丁寧に

    document.getElementById('to-archive').style.opacity = "1";
  });
</script>

</body>
</html>
