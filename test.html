<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>CONNECTION_ESTABLISHED</title>
<style>
  :root {
    --accent: #00f2ff;
    --sub-accent: #7000ff;
    --bg: #030509;
    --glass: rgba(255, 255, 255, 0.03);
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: #fff;
    font-family: "Hiragino Sans", "Meiryo", sans-serif;
    height: 100%; overflow: hidden;
  }

  /* --- 近未来演出：背景レイヤー --- */
  .bg-effects {
    position: fixed; inset: 0; z-index: -1;
  }
  /* 微細なグリッド */
  .grid {
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle, black 30%, transparent 80%);
  }
  /* 浮遊する光の粒子 */
  .orb {
    position: absolute; width: 300px; height: 300px;
    background: var(--sub-accent);
    filter: blur(100px); opacity: 0.2;
    animation: floating 15s infinite alternate;
  }

  @keyframes floating {
    0% { transform: translate(-10%, -10%); }
    100% { transform: translate(20%, 20%); }
  }

  /* --- テキストエリア（一人称視点） --- */
  #scene {
    height: 100dvh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 0 40px;
    transition: all 1s ease;
  }

  .narration {
    font-size: 0.95rem;
    line-height: 2.2;
    letter-spacing: 0.15em;
    margin-bottom: 50px;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
    text-align: center;
  }

  /* --- 近未来的なボタン（Glass UI） --- */
  .choice-box {
    display: flex; flex-direction: column;
    gap: 20px; width: 100%; max-width: 280px;
    opacity: 0; transform: translateY(20px);
    transition: all 0.8s 0.5s ease forwards;
  }

  .cyber-btn {
    position: relative;
    padding: 18px;
    background: var(--glass);
    border: 1px solid rgba(0, 242, 255, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--accent);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-align: center;
    cursor: pointer;
    overflow: hidden;
  }

  .cyber-btn::before {
    content: "";
    position: absolute; top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.2), transparent);
    transition: 0.5s;
  }

  .cyber-btn:active::before {
    left: 100%;
    transition: 0.3s;
  }

  /* 角の装飾 */
  .corner {
    position: absolute; width: 6px; height: 6px;
    border: 1px solid var(--accent);
  }
  .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .br { bottom: 0; right: 0; border-left: none; border-top: none; }

</style>
</head>
<body>

<div class="bg-effects">
  <div class="grid"></div>
  <div class="orb"></div>
</div>

<main id="scene">
  <div class="narration" id="textTarget"></div>
  
  <div class="choice-box" id="choices">
    <div class="cyber-btn" onclick="connect('DIRECT')">
      <div class="corner tl"></div><div class="corner br"></div>
      [ 落ちている端末に触れる ]
    </div>
    <div class="cyber-btn" onclick="connect('SCAN')">
      <div class="corner tl"></div><div class="corner br"></div>
      [ 周囲の残留思念をスキャン ]
    </div>
  </div>
</main>

<script>
  const narrationText = "視界が、青白いノイズに染まる。\n\n冷たい空気が、肌を刺した。\n目の前には、誰の物ともしれない『記憶の器』が横たわっている。";
  let charIndex = 0;

  function type() {
    const target = document.getElementById('textTarget');
    if (charIndex < narrationText.length) {
      const char = narrationText.charAt(charIndex);
      target.innerHTML += (char === "\n") ? "<br>" : char;
      charIndex++;
      setTimeout(type, 80);
    } else {
      document.getElementById('choices').style.opacity = "1";
      document.getElementById('choices').style.transform = "translateY(0)";
    }
  }

  function connect(mode) {
    const scene = document.getElementById('scene');
    scene.style.filter = "blur(20px) brightness(2)";
    scene.style.opacity = "0";
    
    setTimeout(() => {
      // 次の「解析ページ」へ
      alert(mode === 'DIRECT' ? "Direct Link Established." : "Peripheral Data Scanning...");
      // window.location.href = "test_hack_loading.html";
    }, 1000);
  }

  window.onload = type;
</script>

</body>
</html>
