<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Aya // Whiteout</title>
<style>
  :root {
    --bg: #fdfeff;
    --accent: #a5d8ff;
    --text: #4a5568;
    --glass: rgba(255, 255, 255, 0.6);
  }

  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    height: 100dvh; width: 100%;
    overflow: hidden;
  }

  /* --- 幻想的な背景：白昼夢のような光 --- */
  .white-fog {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
  }

  /* 画面を漂う白い粒子（雪や塵、あるいはデータの欠片） */
  .particles {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(165, 216, 255, 0.05) 0%, transparent 70%);
    animation: pulse 8s infinite alternate ease-in-out;
  }

  @keyframes pulse {
    from { opacity: 0.3; transform: scale(1); }
    to { opacity: 0.8; transform: scale(1.2); }
  }

  #terminal {
    height: 100dvh;
    padding: 60px 25px;
    box-sizing: border-box;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 25px;
  }

  .log-line {
    font-size: 0.95rem;
    line-height: 2;
    letter-spacing: 0.15em;
    opacity: 0;
    filter: blur(8px);
    animation: whiteReveal 1.5s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  @keyframes whiteReveal {
    to { opacity: 1; filter: blur(0); }
  }

  .loader-tag {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: -15px;
    font-weight: bold;
  }

  /* 画像：光の中に溶け込ませる */
  .char-img {
    display: block;
    max-width: 85%;
    margin: 20px auto;
    opacity: 0;
    /* 下の方から光に溶けるように */
    mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
    filter: brightness(1.05) saturate(0.9);
    animation: fadeInImg 3s 1s forwards ease-in-out;
  }

  @keyframes fadeInImg {
    to { opacity: 1; }
  }

  /* 最初のボタン：極限までシンプルに */
  #entry {
    position: fixed; inset: 0;
    background: #fff;
    display: flex; justify-content: center; align-items: center;
    z-index: 1000;
    transition: opacity 2s ease;
  }

  .entry-btn {
    font-size: 0.85rem;
    letter-spacing: 0.5em;
    color: #999;
    cursor: pointer;
    border: none; background: none;
    padding: 30px;
  }

</style>
</head>
<body>

<div class="white-fog"><div class="particles"></div></div>

<div id="entry" onclick="begin()">
  <button class="entry-btn">── 記憶の深層へ ──</button>
</div>

<div id="terminal"></div>

<script>
  const terminal = document.getElementById('terminal');
  const entry = document.getElementById('entry');

  const scenario = [
    { type: "dim", text: "System_Link established... 深い霧の向こうへ。" },
    { type: "accent", text: "対象特定：笹井 綾（AYA_SASAI）" },
    { type: "load", text: "CONNECTING..." },
    { type: "normal", text: "22歳。145cm。HAMAの空気に、彼女はまだ馴染めない。" },
    { type: "load", text: "ACCESSING_MEMORIES..." },
    { type: "normal", text: "地図を持たない。道を見失うのが、彼女の『日常』。" },
    { type: "normal", text: "「ここがどこか、もうわからなくていい」" },
    { type: "load", text: "RESTORE_VISUAL..." },
    { type: "img", src: "assets/profile/aya2.PNG" },
    { type: "accent", text: "── 溶けて、そのまま雲隠れ。" }
  ];

  async function begin() {
    entry.style.opacity = '0';
    setTimeout(() => entry.style.display = 'none', 2000);

    for (const line of scenario) {
      const el = document.createElement('div');
      if (line.type === 'load') {
        el.className = 'loader-tag';
        el.textContent = line.text;
      } else if (line.type === 'img') {
        const img = document.createElement('img');
        img.src = line.src;
        img.className = 'char-img';
        el.appendChild(img);
      } else {
        el.className = 'log-line';
        if (line.type === 'accent') el.style.color = '#7abfff';
        el.textContent = line.text;
      }
      
      terminal.appendChild(el);
      terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' });
      await new Promise(r => setTimeout(r, 1800));
    }
  }
</script>

</body>
</html>
