<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SCRAPING_LOG // AYA_S</title>
<style>
  :root {
    --bg: #050505;
    --accent-g: #00ff41;
    --accent-r: #ff2d55;
    --text: #c0c0c0;
  }

  html, body {
    margin: 0; padding: 0;
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg);
    color: var(--text);
    height: 100%; width: 100%;
    overflow: hidden;
    user-select: none; -webkit-touch-callout: none;
  }

  /* 走査線エフェクト（常に表示） */
  body::after {
    content: " ";
    position: fixed; inset: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 2px, 3px 100%;
    pointer-events: none; z-index: 1000;
  }

  /* ログ表示エリア */
  #terminal {
    height: 100dvh;
    padding: 25px 20px 100px;
    box-sizing: border-box;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .log-line {
    font-size: 0.8rem;
    word-break: break-all;
    line-height: 1.4;
    opacity: 0;
    transform: translateX(-5px);
    animation: slideIn 0.1s forwards;
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* 強調カラー */
  .green { color: var(--accent-g); text-shadow: 0 0 5px var(--accent-g); }
  .red { color: var(--accent-r); text-shadow: 0 0 5px var(--accent-r); }

  /* 彼女の画像：ノイズを乗せる */
  .char-img {
    display: block;
    max-width: 80%;
    height: auto;
    margin: 20px auto;
    filter: grayscale(1) contrast(1.2) brightness(0.8);
    opacity: 0.7;
    border: 1px solid var(--accent-g);
  }

  /* 操作ガイド */
  .guide {
    position: fixed;
    bottom: 0; left: 0; width: 100%;
    background: rgba(0,0,0,0.8);
    padding: 15px;
    text-align: center;
    font-size: 0.7rem;
    color: var(--accent-g);
    z-index: 500;
    border-top: 1px solid var(--accent-g);
  }

</style>
</head>
<body id="body">

<div id="terminal">
  <div class="log-line green">ACCESS_GRANTED: USER_UNIDENTIFIED</div>
  <div class="log-line">SYSTEM_INITIALIZED... READY_TO_EXTRACT</div>
</div>

<div class="guide" id="guide">TAP_SCREEN_TO_FETCH_DATA</div>

<script>
  const terminal = document.getElementById('terminal');
  const guide = document.getElementById('guide');
  
  // 抽出するデータ配列
  const logData = [
    { text: ">>> CONNECTING_TO_REMOTE_SERVER...", color: "white" },
    { text: ">>> SEARCHING_FOR: AYA_SASAI", color: "white" },
    { text: "SUCCESS: TARGET_FOUND [ID:2054_0920]", color: "green" },
    { text: "---", color: "white" },
    { text: "NAME: 笹井 綾 (AYA SASAI)", color: "white" },
    { text: "AGE: 22 / HEIGHT: 145cm", color: "white" },
    { text: "OCCUPATION: Engineer (HAMA_Metax)", color: "white" },
    { text: "---", color: "white" },
    { text: "NOTICE: Directional sensory impairment detected.", color: "red" },
    { text: "NOTICE: High proficiency in AI systems.", color: "green" },
    { text: "WARNING: PARTIAL_MEMORY_LOSS [Sector_C]", color: "red" },
    { text: ">>> EXTRACTING_VISUAL_DATA...", color: "white" },
    { type: "image", src: "assets/profile/aya2.PNG" },
    { text: ">>> SCRAPING_COMPLETE. CONNECTION_CLOSED.", color: "green" }
  ];

  let currentLine = 0;

  function addLogLine() {
    if (currentLine >= logData.length) {
      guide.textContent = "SYSTEM_HALTED: NO_MORE_DATA";
      return;
    }

    const data = logData[currentLine];
    const div = document.createElement('div');
    div.className = 'log-line';

    if (data.type === "image") {
      const img = document.createElement('img');
      img.src = data.src;
      img.className = 'char-img';
      div.appendChild(img);
    } else {
      div.textContent = data.text;
      if (data.color === "green") div.classList.add('green');
      if (data.color === "red") div.classList.add('red');
    }

    terminal.appendChild(div);
    
    // 常に最新のログ（下端）へスクロール
    terminal.scrollTo({
      top: terminal.scrollHeight,
      behavior: 'smooth'
    });

    currentLine++;
  }

  // 画面全体、どこを触っても反応するように
  // touchstart（スマホ）とmousedown（PC）両方をカバー
  const handleInput = (e) => {
    e.preventDefault();
    addLogLine();
  };

  document.body.addEventListener('touchstart', handleInput, { passive: false });
  document.body.addEventListener('mousedown', handleInput);

</script>
</body>
</html>
