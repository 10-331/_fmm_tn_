<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#溶けてそのまま雲隠れ - AYA SASAI</title>
<style>
  :root {
    --bg-color: #ffffff;
    --text-main: #333;
    --text-sub: #888;
    --accent: #a0c0e0;
  }

  body {
    background-color: var(--bg-color);
    margin: 0; padding: 0;
    font-family: "Hiragino Mincho ProN", serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    color: var(--text-main);
  }

  /* 画面全体のステージ */
  .container {
    display: flex;
    flex-direction: row-reverse; /* 右から左へ流れる */
    width: 100%; height: 100%;
    padding: 12vh 5vw; /* 上下の余白 */
    box-sizing: border-box;
    writing-mode: vertical-rl; /* 縦書きの継続 */
  }

  /* --- [1] 右端：シンボルエリア（名前） --- */
  .section-symbol {
    margin-left: 5rem;
    flex-shrink: 0;
  }
  .name-large { font-size: 2.4rem; letter-spacing: 0.6em; }
  .name-en { font-family: sans-serif; font-size: 0.8rem; color: var(--text-sub); margin-top: 1.5rem; letter-spacing: 0.4em; }

  /* --- [2] 中央左：物語エリア（立ち絵の隣に） --- */
  .section-story {
    margin-left: 4rem;
    height: 70vh;
    display: flex;
    justify-content: flex-end; /* 上揃え */
    padding-right: 2rem;
    border-right: 1px solid #f0f0f0; /* 区切り線 */
  }
  .story-text {
    font-size: 0.85rem;
    line-height: 2.8;
    letter-spacing: 0.15em;
  }

  /* --- [3] 中央：ステータスエリア --- */
  .section-status {
    margin-left: auto; /* 立ち絵との間に広大な余白を */
    padding-right: 3rem;
  }
  .status-item { margin-bottom: 2.8rem; line-height: 1.5; }
  .status-label {
    font-family: sans-serif;
    font-size: 0.65rem;
    color: var(--accent);
    margin-bottom: 1.2rem;
    display: block;
  }
  .status-value { font-size: 0.9rem; letter-spacing: 0.1em; }


  /* --- [4] 左端：立ち絵エリア（絶対に被らせない） --- */
  .section-illust {
    position: fixed;
    left: 0; bottom: 0;
    width: 38vw; /* 立ち絵専用の領域（ここに文字は入らない） */
    height: 90vh;
    display: flex;
    justify-content: flex-end; /* 下揃え */
    z-index: 10; /* 最前面へ */
  }
  
  .illust-image {
    width: 100%; height: 100%;
    object-fit: contain; /* アスペクト比を保つ */
    /* 顔周りはクリアに、足元だけを溶け込ませる */
    mask-image: linear-gradient(to top, transparent, black 15%);
  }


  /* アニメーション（右上から順に） */
  .fade {
    animation: fadeAnim 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  @keyframes fadeAnim {
    0% { opacity: 0; transform: translateY(-10px); filter: blur(4px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
</style>
</head>
<body>

<div class="container">
  <header class="section-symbol fade" style="animation-delay: 0.5s;">
    <h1 class="name-large">笹井 綾</h1>
    <div class="name-en">SASAI AYA</div>
  </header>

  <div class="section-story fade" style="animation-delay: 1.5s;">
    <div class="story-text">
      「逃げ場は、いつだって白紙の中にあった」<br><br>
      彼女の言葉は、いつもどこか遠い場所を指している。<br>
      2055年の熱気から逃れるように、<br>
      彼女はただ、空の色が溶けるのを待っていた。
    </div>
  </div>

  <div class="section-status fade" style="animation-delay: 1s;">
    <div class="status-item">
      <span class="status-label">AGE / BIRTH</span>
      <span class="status-value">19 / 08.14</span>
    </div>
    <div class="status-item">
      <span class="status-label">HEIGHT</span>
      <span class="status-value">158cm</span>
    </div>
    <div class="status-item">
      <span class="status-label">FAVORITE</span>
      <span class="status-value">雲の観察、微炭酸</span>
    </div>
  </div>

  <div class="section-illust fade" style="animation-delay: 0.8s;">
    <img src="aya_stand_illust.png" class="illust-image" alt="笹井綾 立ち絵">
  </div>
</div>

</body>
</html>
