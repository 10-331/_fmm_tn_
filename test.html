<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>#溶けてそのまま雲隠れ</title>
<style>
  :root {
    --bg-color: #ffffff;
    --text-color: #333;
    --accent-blue: #a0c0e0;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: var(--bg-color);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  }

  #mv-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center; /* 横方向中央 */
    align-items: flex-start;  /* 上揃え */
    padding-top: 15vh;
    box-sizing: border-box;
  }

  /* 全体コンテナ：縦書き・右から左へ行が並ぶ */
  .lyrics-wrapper {
    writing-mode: vertical-rl;
    height: 70vh;
    display: flex;
    flex-direction: row; /* 縦書き設定下では右から左へ並ぶ */
  }

  .line {
    display: block;
    font-size: 0.95rem; /* もう一回り小さく */
    letter-spacing: 0.35em;
    line-height: 3.2;    /* 行間を広めに取って「間」を作る */
    white-space: nowrap;
    opacity: 1; /* 行自体は常に存在させる */
  }

  /* 一文字ずつの出現アニメーション（上から滲み落ちる） */
  .char {
    display: inline-block;
    opacity: 0;
    filter: blur(6px);
    transform: translateY(-5px);
    transition: opacity 1.2s ease-out, filter 1.5s ease-out, transform 1.2s ease-out;
  }

  .char.is-visible {
    opacity: 1;
    filter: blur(0px);
    transform: translateY(0);
  }

  /* 「私たちが」の後の物理的な「行」としての空白 */
  .spacer-line {
    width: 4rem; /* 画面上の横方向の空白 */
  }

  #to-archive {
    opacity: 0;
    text-decoration: none;
    color: #ccc;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    border-bottom: 1px solid #eee;
    padding-bottom: 4px;
    position: absolute;
    bottom: 8vh;
    left: 50%;
    transform: translateX(-50%);
    transition: opacity 3s ease;
    font-family: sans-serif;
  }

  @media (max-width: 600px) {
    .line { font-size: 0.9rem; line-height: 2.8; }
    .spacer-line { width: 3rem; }
  }
</style>
</head>
<body>

<div id="mv-stage">
  <div class="lyrics-wrapper">
    <div class="line" id="l1">これは、</div>
    <div class="line" id="l2">迷子になった私を助けてくれた彼と</div>
    <div class="line" id="l3">たくさん笑って、ふざけあって、</div>
    <div class="line" id="l4">恋人になった私たちが</div>
    
    <div class="spacer-line"></div>
    
    <div class="line" id="l5">また、他人に戻るまでのお話。</div>
  </div>

  <a href="archive.html" id="to-archive">ENTER_ARCHIVE</a>
</div>

<script>
  function splitText(elementId) {
    const el = document.getElementById(elementId);
    const text = el.innerText;
    el.innerHTML = '';
    text.split('').forEach(char => {
      const span = document.createElement('span');
      span.className = 'char';
      span.innerText = char;
      el.appendChild(span);
    });
  }

  async function animateLine(elementId, charSpeed = 90) {
    const el = document.getElementById(elementId);
    const chars = el.querySelectorAll('.char');
    for (let char of chars) {
      char.classList.add('is-visible');
      await new Promise(r => setTimeout(r, charSpeed));
    }
  }

  window.addEventListener('load', async () => {
    // 初期化：全行を分解
    ['l1', 'l2', 'l3', 'l4', 'l5'].forEach(splitText);
    
    await new Promise(r => setTimeout(r, 1500)); // 最初の静寂

    // 既に出た文字は残したまま、次々に現れる
    await animateLine('l1', 100);
    await new Promise(r => setTimeout(r, 500));
    
    await animateLine('l2', 80);
    await new Promise(r => setTimeout(r, 500));
    
    await animateLine('l3', 80);
    await new Promise(r => setTimeout(r, 500));
    
    await animateLine('l4', 80);

    // 「私たちが」のあとの、物語的な沈黙
    await new Promise(r => setTimeout(r, 3000)); 

    await animateLine('l5', 120);

    // 余韻のあと、ボタンを表示
    await new Promise(r => setTimeout(r, 2000));
    document.getElementById('to-archive').style.opacity = "1";
  });
</script>

</body>
</html>
