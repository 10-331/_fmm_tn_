<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>LOST_POSITION // AYA</title>
<style>
  :root {
    --accent: #e74c74;
    --grid-color: rgba(120, 110, 150, 0.1);
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden; /* 通常のスクロールを殺す */
    background: #fdfdfd;
    font-family: "Hiragino Mincho ProN", serif;
  }

  /* 巨大なキャンバス（スマホの3〜4画面分くらいの広さ） */
  #viewport {
    position: absolute;
    width: 300vw;
    height: 300vh;
    /* 初期位置を中央に（迷子の始まり） */
    top: -100vh;
    left: -100vw;
    background: 
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 50px 50px; /* 方眼紙のようなグリッド */
    cursor: grab;
    will-change: transform;
  }

  /* 空間に散らばった断片たち */
  .fragment {
    position: absolute;
    user-select: none;
    pointer-events: none;
  }

  /* 彼女：どこかに立っている */
  .char-img {
    top: 130vh; left: 140vw;
    height: 60vh; width: auto;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.05));
  }

  /* 断片テキスト：あちこちに浮いている */
  .text-box {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(5px);
    padding: 15px;
    border: 1px solid #eee;
    font-size: 0.8rem;
    line-height: 1.6;
    letter-spacing: 0.1em;
    width: 200px;
  }

  .pos-1 { top: 110vh; left: 90vw; }
  .pos-2 { top: 160vh; left: 170vw; }
  .pos-3 { top: 145vh; left: 110vw; }

  /* UI：固定の案内 */
  .guide-ui {
    position: fixed; bottom: 30px; left: 0; width: 100%;
    text-align: center; z-index: 100;
    pointer-events: none;
    opacity: 0.5; font-size: 0.7rem; letter-spacing: 0.2em;
  }

  /* 現在地を示すレーダーのようなもの */
  .radar {
    position: fixed; top: 25px; left: 25px;
    width: 40px; height: 40px;
    border: 1px solid #ccc; border-radius: 50%;
    z-index: 100;
  }
  .dot {
    position: absolute; width: 4px; height: 4px;
    background: var(--accent); border-radius: 50%;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

</style>
</head>
<body>

<div class="guide-ui">スワイプして、彼女を見つける</div>
<div class="radar"><div class="dot" id="radarDot"></div></div>

<div id="viewport">
  <img src="assets/profile/aya2.PNG" alt="Aya" class="fragment char-img">

  <div class="fragment text-box pos-1">
    <b>NAME: 笹井 綾</b><br>
    エンジニア。22歳。<br>
    最近HAMAに来た。
  </div>

  <div class="fragment text-box pos-2">
    <b>MEMO:</b><br>
    AIには詳しいが、<br>
    ペットロボには冷たい。
  </div>

  <div class="fragment text-box pos-3">
    <b>WARNING:</b><br>
    極度の方向音痴。<br>
    現在地を見失いやすい。
  </div>
</div>

<script>
  const viewport = document.getElementById('viewport');
  const dot = document.getElementById('radarDot');
  let isDragging = false;
  let startX, startY;
  let scrollLeft, scrollTop;

  // タッチ操作（スワイプ）の実装
  const onStart = (e) => {
    isDragging = true;
    const touch = e.touches ? e.touches[0] : e;
    startX = touch.pageX - viewport.offsetLeft;
    startY = touch.pageY - viewport.offsetTop;
  };

  const onMove = (e) => {
    if (!isDragging) return;
    const touch = e.touches ? e.touches[0] : e;
    const x = touch.pageX - startX;
    const y = touch.pageY - startY;
    
    // 境界制限（これがないと無限に飛んでいく）
    const limitX = Math.max(Math.min(x, 0), -window.innerWidth * 2);
    const limitY = Math.max(Math.min(y, 0), -window.innerHeight * 2);

    viewport.style.left = limitX + 'px';
    viewport.style.top = limitY + 'px';

    // レーダーのドットを逆に動かす
    dot.style.transform = `translate(${-limitX/20 - 50}%, ${-limitY/20 - 50}%)`;
  };

  const onEnd = () => { isDragging = false; };

  window.addEventListener('touchstart', onStart);
  window.addEventListener('touchmove', onMove);
  window.addEventListener('touchend', onEnd);
  
  // PCマウス用
  window.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
</script>

</body>
</html>
