<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASAI AYA - OFFICIAL ARCHIVE</title>
    <style>
        :root {
            --color-bg: #fff;
            --color-text: #333;
            --color-accent: #FFD700; /* 現在の綾：イエロー */
            --font-main: 'Helvetica Neue', Arial, sans-serif;
            --transition: 0.5s ease;
        }

        /* 過去（Filler）モードの変数 */
        body.is-glitch {
            --color-bg: #1a1a1a;
            --color-text: #eee;
            --color-accent: #B22222; /* フィラー：レッド */
            --font-main: 'Courier New', monospace;
        }

        body {
            margin: 0;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        /* ヘッダー：サクサク移動できるナビ */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: inherit;
            font-weight: bold;
            border-bottom: 2px solid transparent;
        }
        nav a:hover { border-bottom-color: var(--color-accent); }

        /* メインビジュアル：立ち絵と情報の融合 */
        main {
            display: flex;
            height: 80vh;
            align-items: center;
            justify-content: space-around;
            padding: 0 5%;
        }

        .chara-view {
            position: relative;
            width: 40%;
            height: 100%;
        }

        .chara-img {
            max-height: 100%;
            position: absolute;
            bottom: 0;
            transition: opacity var(--transition), transform 0.3s ease;
            cursor: pointer;
        }

        /* 驚かせない程度のギミック：ホバーで視線や影が動く */
        .chara-img:hover { transform: scale(1.02); }

        #img-filler { opacity: 0; pointer-events: none; }
        body.is-glitch #img-present { opacity: 0; }
        body.is-glitch #img-filler { opacity: 1; pointer-events: auto; }

        .info-panel {
            width: 40%;
            border-left: 4px solid var(--color-accent);
            padding-left: 30px;
        }

        /* 隠しスイッチ：びっくりさせない小さなボタン */
        .system-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            opacity: 0.3;
            cursor: pointer;
        }
        .system-toggle:hover { opacity: 1; color: var(--color-accent); }

        /* ログ領域：静かに情報を出す */
        #console-log {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: var(--color-accent);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SASAI AYA</div>
    <nav>
        <a href="#profile">Profile</a>
        <a href="#library">Library</a>
        <a href="#games">Experience</a>
    </nav>
</header>

<main>
    <div class="chara-view">
        <img src="assets/img/aya_22.png" id="img-present" class="chara-img" alt="笹井綾">
        <img src="assets/img/aya_filler.png" id="img-filler" class="chara-img" alt="Filler">
    </div>

    <div class="info-panel">
        <h1 id="disp-name">笹井 綾</h1>
        <p id="disp-bio">HAMAで働く22歳のエンジニア。猪突猛進な性格で、新しい人生を謳歌中。極度の方向音痴。</p>
        
        <div id="status-area">
            <h3>Recent Activities</h3>
            <ul>
                <li>添とのランチ（SS更新）</li>
                <li>落露との共同作業（Feature更新）</li>
            </ul>
        </div>
    </div>
</main>

<div id="console-log">System: Ready...</div>
<div class="system-toggle" onclick="toggleWorld()">[ ACCESS_ENCRYPTED_DATA ]</div>

<script>
    function toggleWorld() {
        const body = document.body;
        const name = document.getElementById('disp-name');
        const bio = document.getElementById('disp-bio');
        const log = document.getElementById('console-log');

        body.classList.toggle('is-glitch');

        if (body.classList.contains('is-glitch')) {
            name.innerText = "■■ / filler";
            bio.innerText = "感情の異常発達を確認。回収対象。360名の村から消失。名前は、もうない。";
            log.innerText = "Warning: Accessing restricted memory...";
        } else {
            name.innerText = "笹井 綾";
            bio.innerText = "HAMAで働く22歳のエンジニア。猪突猛進な性格で、新しい人生を謳歌中。極度の方向音痴。";
            log.innerText = "System: Status Normal.";
        }
    }
</script>

</body>
</html>
