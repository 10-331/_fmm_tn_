<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ANALYSIS_SEQUENCE // AYA_S</title>
<style>
  :root {
    --bg: #020406;
    --accent: #00f2ff;
    --text: #e0faff;
    --warn: #ff3e6c;
  }

  html, body {
    margin: 0; padding: 0;
    font-family: "Hiragino Sans", "Meiryo", monospace;
    background: var(--bg);
    color: var(--text);
    height: 100dvh; width: 100%;
    overflow: hidden;
  }

  /* 画面全体の走査線 */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: linear-gradient(rgba(0, 242, 255, 0.03) 50%, transparent 50%);
    background-size: 100% 4px;
    pointer-events: none; z-index: 100;
  }

  #terminal {
    height: 100dvh;
    padding: 40px 20px 120px;
    box-sizing: border-box;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .log-line {
    font-size: 0.85rem;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(5px);
    animation: fadeIn 0.3s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ローディングバーの演出 */
  .loader {
    display: inline-block;
    width: 150px;
    height: 4px;
    background: rgba(0, 242, 255, 0.1);
    position: relative;
    vertical-align: middle;
    margin-left: 10px;
    overflow: hidden;
  }
  .loader::after {
    content: "";
    position: absolute; left: -100%; top: 0;
    width: 100%; height: 100%;
    background: var(--accent);
    animation: loading 0.8s ease-in-out forwards;
  }
  @keyframes loading {
    100% { left: 0; }
  }

  .accent { color: var(--accent); font-weight: bold; }
  .warn { color: var(--warn); }
  .dim { opacity: 0.4; font-size: 0.75rem; }

  .char-img {
    display: block;
    max-width: 90%;
    margin: 20px auto;
    border: 1px solid var(--accent);
    filter: brightness(1.2) contrast(1.1);
    opacity: 0;
    animation: fadeIn 1s 0.5s forwards;
  }

  /* 最初のボタン */
  #bootOverlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 1000;
  }
  .boot-btn {
    border: 1px solid var(--accent);
    padding: 15px 40px;
    color: var(--accent);
    font-size: 0.9rem;
    cursor: pointer;
    background: transparent;
  }
</style>
</head>
<body>

<div id="bootOverlay">
  <button class="boot-btn" onclick="startAnalysis()">解析プロトコルを実行</button>
</div>

<div id="terminal"></div>

<script>
  const terminal = document.getElementById('terminal');
  const bootOverlay = document.getElementById('bootOverlay');

  const logData = [
    { text: ">>> システム接続中...", type: "dim" },
    { text: "対象：笹井 綾 (AYA_SASAI) を補足", type: "accent" },
    { text: "---", type: "dim" },
    { text: "属性データを解析中... ", hasLoader: true },
    { text: "【個体データ】年齢: 22 / 身長: 145cm", type: "normal" },
    { text: "【所属情報】エンジニア (HAMA Metax)", type: "normal" },
    { text: "---", type: "dim" },
    { text: "行動ログを解析中... ", hasLoader: true },
    { text: "注意：極度の方向音痴。現在地把握能力に欠陥。", type: "warn" },
    { text: "記録：AI技術に博識。対人感情に特異点あり。", type: "warn" },
    { text: "警告：過去ログに深刻なデータの空白を検出。", type: "warn" },
    { text: "---", type: "dim" },
    { text: "外見データを復元中... ", hasLoader: true },
    { isImage: true, src: "assets/profile/aya2.PNG" },
    { text: ">>> 全解析工程が完了しました。", type: "accent" }
  ];

  async function startAnalysis() {
    bootOverlay.style.display = 'none';

    for (const item of logData) {
      const line = document.createElement('div');
      line.className = 'log-line ' + (item.type || '');
      
      if (item.isImage) {
        const img = document.createElement('img');
        img.src = item.src;
        img.className = 'char-img';
        line.appendChild(img);
        terminal.appendChild(line);
        await sleep(1500); // 画像表示前の溜め
      } else {
        line.textContent = item.text;
        if (item.hasLoader) {
          const loader = document.createElement('span');
          loader.className = 'loader';
          line.appendChild(loader);
          terminal.appendChild(line);
          await sleep(1000); // ローディング演出の時間
        } else {
          terminal.appendChild(line);
          await sleep(600); // 次の行へのウェイト
        }
      }
      terminal.scrollTo({ top: terminal.scrollHeight, behavior: 'smooth' });
    }
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
</script>

</body>
</html>
