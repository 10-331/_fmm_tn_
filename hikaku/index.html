<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>身長比較ツール</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>身長比較ツール</h1>
      <p>立ち絵と身長を追加して比較できます。初回アップロード時に透過余白を自動調整し、あとから修正モードで微調整できます。</p>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <section class="panel">
          <h2>キャラ追加</h2>

          <label class="field">
            <span>名前</span>
            <input id="nameInput" type="text" placeholder="例：綾" />
          </label>

          <label class="field">
            <span>身長(cm)</span>
            <input id="heightInput" type="number" min="1" max="300" value="160" />
          </label>

          <label class="field">
            <span>ラベル色</span>
            <input id="labelColorInput" type="color" value="#f2df9b" />
          </label>

          <label class="field">
            <span>画像（PNG推奨）</span>
            <input id="imageInput" type="file" accept="image/*" />
          </label>

          <label class="field">
            <span>表示順</span>
            <select id="insertModeInput">
              <option value="end">末尾に追加</option>
              <option value="heightAsc">身長が低い順で並べる</option>
              <option value="heightDesc">身長が高い順で並べる</option>
            </select>
          </label>

          <button id="addButton" class="btn primary">追加する</button>
        </section>

        <section class="panel">
          <h2>データ操作</h2>
          <div class="button-stack">
            <button id="exportButton" class="btn">JSONを書き出し</button>
            <label class="btn file-btn">
              <input id="importInput" type="file" accept=".json,application/json" hidden />
              JSONを読み込み
            </label>
            <button id="clearButton" class="btn danger">全削除</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-row">
            <h2>登録キャラ</h2>
            <span id="countBadge" class="count-badge">0人</span>
          </div>
          <div id="characterList" class="character-list"></div>
        </section>
      </aside>

      <main class="main">
        <section class="panel stage-panel">
          <div class="panel-row top-align">
            <div>
              <h2>比較ビュー</h2>
              <p class="sub">足元基準で並びます。横スクロール対応。</p>
            </div>

            <label class="field compact">
              <span>最大目盛り</span>
              <select id="maxCmSelect">
                <option value="160">160cm</option>
                <option value="180">180cm</option>
                <option value="200" selected>200cm</option>
                <option value="220">220cm</option>
                <option value="250">250cm</option>
              </select>
            </label>
          </div>

          <div class="stage-scroll">
            <div id="compareStage" class="compare-stage"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
